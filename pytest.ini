[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that need full local data / knowledge base
    live_generation: real in-process GenerationService; set SOZO_AUTOAGENT_LIVE=1 (excluded from default AutoAgent CI)
addopts = -v --tb=short
