papers:

  # ── tDCS + NFB MOTOR IMAGERY ─────────────────────────────────────────────

  - id: "yang_2023_tdcs_nfb_motor_imagery_rct"
    title: "Effects of neurofeedback training combined with transcranial direct current stimulation on motor imagery: A randomized controlled trial"
    authors: "Yang et al."
    year: 2023
    pmid: "36937688"
    pmc: "PMC10017549"
    journal: "Frontiers in Neuroscience"
    evidence_type: "rct"
    url: "https://pubmed.ncbi.nlm.nih.gov/36937688/"
    conditions: [neuroonica_combo, stroke_rehab]
    key_finding: >
      N=20 healthy men (NFB n=10, NFB+tDCS n=10).
      tDCS: 2 mA, 10 min BEFORE NFB, anode C4 (right M1), cathode right upper arm (extracephalic).
      NFB+tDCS: significantly higher mu-ERD during training AND post-training vs NFB alone (p<0.05).
      Motor imagery vividness improved in both groups; no significant between-group difference on VAS.
      Confirms tDCS priming enhances NFB-driven mu-ERD — direct mechanistic support for Neuroonica motor protocol.
    protocol_parameters:
      tdcs_intensity: "2.0 mA"
      tdcs_duration: "10 min (before NFB)"
      tdcs_timing: "pre-NFB (sequential, not simultaneous)"
      tdcs_anode: "C4 (right primary motor cortex)"
      tdcs_cathode: "Right upper arm (extracephalic)"
      tdcs_electrode_anode: "25 cm2"
      tdcs_electrode_cathode: "50 cm2"
      nfb_band: "mu (8-13 Hz)"
      nfb_channel: "C4"
      nfb_feedback: "Real-time visual ERD bar"
      nfb_trials: "60 trials (3 sets x 20)"
    notes: >
      KEY RCT for Neuroonica NNO-MOTOR protocol. Sequential design confirmed effective.
      10 min tDCS pre-NFB sufficient; 20 min may yield larger plasticity window.
      Priority PMID for neuroonica_combo evidence profile.

  - id: "gunduz_2015_tdcs_mu_erd_handedness"
    title: "Transcranial direct current stimulation enhances mu rhythm desynchronization during motor imagery that depends on handedness"
    authors: "Gunduz A et al."
    year: 2015
    pmid: "25599261"
    journal: "PubMed"
    evidence_type: "non_rct_experimental"
    url: "https://pubmed.ncbi.nlm.nih.gov/25599261/"
    conditions: [neuroonica_combo, stroke_rehab]
    key_finding: >
      Anodal M1 tDCS increases mu-ERD during motor imagery — handedness dependent.
      Contralateral M1 stimulation enhances ipsilateral hand motor imagery ERD.
      Supports hemisphere-specific M1 tDCS targeting for motor imagery NFB.

  - id: "varkuti_2012_tdcs_erd_stroke_hemi"
    title: "Modulation of event-related desynchronization during motor imagery with tDCS in patients with chronic hemiparetic stroke"
    authors: "Varkuti B et al."
    year: 2012
    pmid: "22791228"
    journal: "PubMed"
    evidence_type: "non_rct_experimental"
    url: "https://pubmed.ncbi.nlm.nih.gov/22791228/"
    conditions: [stroke_rehab, neuroonica_combo]
    key_finding: >
      tDCS modulates ERD during motor imagery in chronic stroke patients.
      Extends NFB+tDCS motor imagery evidence to clinical stroke population.

  # ── tDCS SAFETY ──────────────────────────────────────────────────────────

  - id: "bikson_2016_safety_update"
    title: "Safety of transcranial direct current stimulation: Evidence based update 2016"
    authors: "Bikson M et al."
    year: 2016
    pmid: "27372845"
    pmc: "PMC5007190"
    journal: "Brain Stimulation"
    citations: 800
    evidence_type: "consensus_statement"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC5007190/"
    conditions: [depression, adhd, ptsd, stroke_rehab, neuroonica_combo, parkinsons, anxiety, ocd]
    key_finding: >
      No evidence of serious adverse effects at standard parameters:
      intensity <=2 mA, duration <=30 min, electrode size <=35 cm2.
      Tissue injury threshold: 25 C/cm2 charge density — far above clinical parameters.
      Home-based use viable with appropriate training and remote supervision.
      Most common AEs: itching 39.3%, tingling 22.2%, headache 14.8% — all mild/transient.
    safety_data:
      itching: "39.3% (active) vs 32.9% (sham)"
      tingling: "22.2% (active) vs 18.3% (sham)"
      headache: "14.8% (active) vs 16.2% (sham)"
      burning: "8.7% (active) vs 10% (sham)"
      severity_mild: "90.6%"
      severity_moderate: "9%"
      severity_severe: "0.4%"
      serious_adverse_events: "none reported at standard parameters"
    notes: "Definitive safety reference. Cite in EVERY condition safety section."

  - id: "antal_2017_tdcs_tacs_adverse"
    title: "Adverse events of tDCS and tACS: A review"
    authors: "Antal A et al."
    year: 2017
    pmc: "PMC6123849"
    journal: "Brain Stimulation"
    evidence_type: "narrative_review"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC6123849/"
    conditions: [depression, adhd, stroke_rehab, neuroonica_combo, home_tdcs_mdd_anxiety]
    key_finding: >
      Home-based tDCS AE rates: tingling 83.5%, skin redness 40.6%, itching 29.3%, burning 26.5%.
      Higher rates in home setting due to self-application variability.
      Selective reporting bias underestimates true AE rates in literature.
      Multi-session safety data (10+ sessions) still limited.

  - id: "krishnan_2015_safety_children_adolescents"
    title: "Systematic Review on the Safety and Tolerability of Transcranial Direct Current Stimulation in Children and Adolescents"
    authors: "Krishnan C et al."
    year: 2015
    pmc: "PMC7916366"
    journal: "Brain Stimulation"
    evidence_type: "systematic_review"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC7916366/"
    conditions: [adhd, neuroonica_combo]
    key_finding: >
      tDCS safe and tolerable in children/adolescents at standard parameters.
      1 mA recommended for paediatric ADHD (smaller head — larger current density at same mA).
      Adverse events comparable to adults: mild, transient.
    protocol_parameters:
      paediatric_intensity: "1 mA (not 2 mA)"

  # ── STROKE REHABILITATION ─────────────────────────────────────────────────

  - id: "elsner_2017_tdcs_stroke_cochrane"
    title: "tDCS for improving capacity in activities and arm function after stroke: a network meta-analysis of RCTs"
    authors: "Elsner B et al."
    year: 2017
    pmid: "28903772"
    pmc: "PMC5598049"
    journal: "Cochrane Review"
    evidence_type: "meta_analysis"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC5598049/"
    conditions: [stroke_rehab, neuroonica_combo]
    key_finding: >
      Network meta-analysis. Anodal, cathodal, and dual tDCS all improve UL function post-stroke.
      Cathodal over non-affected hemisphere may outperform anodal in some outcomes.
      tDCS + task training superior to either alone — supports Neuroonica motor combo.

  - id: "kwon_2023_tdcs_stroke_overview"
    title: "tDCS effects on upper limb motor function in stroke: an overview review of systematic reviews"
    authors: "Kwon et al."
    year: 2023
    pmid: "36617689"
    journal: "PubMed"
    evidence_type: "systematic_review"
    url: "https://pubmed.ncbi.nlm.nih.gov/36617689/"
    conditions: [stroke_rehab]
    key_finding: >
      Overview of 203 studies. Anodal tDCS over affected M1 improves motor function —
      moderate to high quality evidence. Chronic stage shows larger effects than acute.
      Confirms anodal M1 as primary target for stroke UL rehabilitation.

  - id: "wang_2022_tdcs_motor_imagery_stroke_rct"
    title: "Effect of tDCS augmented with motor imagery and upper-limb functional training for upper-limb stroke rehabilitation: A prospective RCT"
    authors: "Wang et al."
    year: 2022
    pmid: "36429924"
    journal: "PubMed"
    evidence_type: "rct"
    url: "https://pubmed.ncbi.nlm.nih.gov/36429924/"
    conditions: [stroke_rehab, neuroonica_combo]
    key_finding: >
      Anodal M1 tDCS over affected hemisphere + motor imagery + UL functional training
      reduces impairment AND disability in chronic stroke patients.
      Triple combination (tDCS + MI + functional training) > tDCS alone or MI alone.
      Direct support for Neuroonica NNO-MOTOR stroke rehabilitation application.
    notes: "Most recent RCT supporting tDCS+motor imagery combination in stroke."

  # ── PARKINSON'S DISEASE ───────────────────────────────────────────────────

  - id: "doruk_2021_tdcs_pd_meta_analysis"
    title: "Transcranial Direct Current Stimulation for Parkinson's Disease: A Systematic Review and Meta-Analysis"
    authors: "Doruk Camsari D et al."
    year: 2021
    pmc: "PMC8584149"
    journal: "Brain Stimulation"
    evidence_type: "meta_analysis"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC8584149/"
    conditions: [parkinsons]
    key_finding: >
      Multi-target tDCS (M1 + DLPFC bilateral) significantly outperforms mono-target:
      mobility improved (p=0.006), balance +50.9%, gait velocity +29%.
      Multi-site stimulation is the recommended approach for PD motor outcomes.
    protocol_parameters:
      recommended_montage: "Multi-target: bilateral M1 + bilateral DLPFC"

  - id: "hassan_2021_tdcs_gait_pd"
    title: "The effects of transcranial direct current stimulation on gait in patients with Parkinson's disease: a systematic review"
    authors: "Hassan M et al."
    year: 2021
    pmid: "34183062"
    journal: "PubMed"
    evidence_type: "systematic_review"
    url: "https://pubmed.ncbi.nlm.nih.gov/34183062/"
    conditions: [parkinsons]
    key_finding: >
      Anodal tDCS over motor areas shows positive effect on gait; non-motor areas less effective.
      Gait speed meta-analysis non-significant (p=0.80) — heterogeneity limits pooling.
      Methodological standardisation needed for PD tDCS gait studies.

  # ── FRONTAL ALPHA ASYMMETRY NFB ───────────────────────────────────────────

  - id: "mennella_2017_alpha_asym_nfb_rct"
    title: "Frontal alpha asymmetry neurofeedback for the reduction of negative affect and anxiety"
    authors: "Mennella R et al."
    year: 2017
    pmid: "28236680"
    journal: "PubMed"
    evidence_type: "rct"
    url: "https://pubmed.ncbi.nlm.nih.gov/28236680/"
    conditions: [anxiety, depression, neuroonica_combo]
    key_finding: >
      N=32 females. Alpha asymmetry NFB vs active control.
      NFB group: significantly increased alpha asymmetry + reduced negative affect AND anxiety.
      Left-dominant frontal alpha (F3 < F4) achieved through operant conditioning.
      Key RCT support for Neuroonica NNO-MDD alpha asymmetry NFB protocol.

  - id: "choi_2019_alpha_hb_nfb_mdd_anxiety"
    title: "The effects of alpha asymmetry and high-beta down-training neurofeedback for patients with MDD and anxiety symptoms"
    authors: "Choi SW et al."
    year: 2019
    pmid: "31302517"
    journal: "PubMed"
    evidence_type: "non_rct_experimental"
    url: "https://pubmed.ncbi.nlm.nih.gov/31302517/"
    conditions: [depression, neuroonica_combo]
    key_finding: >
      Alpha asymmetry + high-beta down-training NFB for MDD: 5 weeks, N=24.
      Increased relative left frontal alpha asymmetry + decreased depressive symptoms.
      Supports combined alpha asymmetry + theta suppression NFB approach in Neuroonica NNO-MDD.

  - id: "peeters_2014_alpha_asym_nfb_depression_pilot"
    title: "Is alpha wave neurofeedback effective with randomized clinical trials in depression? A pilot study"
    authors: "Peeters F et al."
    year: 2014
    pmid: "21063132"
    journal: "PubMed"
    evidence_type: "pilot_study"
    url: "https://pubmed.ncbi.nlm.nih.gov/21063132/"
    conditions: [depression, neuroonica_combo]
    key_finding: >
      Pilot RCT of alpha NFB in MDD. Proof-of-concept for alpha band NFB as depression intervention.
      Evidence base remains preliminary; larger RCT needed.
    notes: "Cited in neuroonica_combo evidence_gaps as key evidence gap."
