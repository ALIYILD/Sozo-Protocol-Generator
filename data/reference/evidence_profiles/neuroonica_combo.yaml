condition_slug: neuroonica_combo
condition_name: "Neuroonica tDCS + Neurofeedback Combination Protocol"
icd10: Z13.88

search_profiles:
  tdcs_nfb_synergy:
    query: >
      transcranial direct current stimulation[Title/Abstract] AND
      neurofeedback[Title/Abstract] AND
      (combination[Title/Abstract] OR synergy[Title/Abstract] OR priming[Title/Abstract])
    filters: [Randomized Controlled Trial, Systematic Review, Meta-Analysis]
    max_results: 20

  adhd_nfb:
    query: >
      ADHD[Title/Abstract] AND
      neurofeedback[Title/Abstract] AND
      (theta beta[Title/Abstract] OR SMR[Title/Abstract] OR sensorimotor rhythm[Title/Abstract])
    filters: [Randomized Controlled Trial, Meta-Analysis, Systematic Review]
    max_results: 25

  adhd_tdcs:
    query: >
      ADHD[Title/Abstract] AND
      transcranial direct current stimulation[Title/Abstract] AND
      (DLPFC[Title/Abstract] OR prefrontal[Title/Abstract])
    filters: [Randomized Controlled Trial, Systematic Review, Meta-Analysis]
    max_results: 20

  mdd_alpha_asymmetry_nfb:
    query: >
      depression[Title/Abstract] AND
      neurofeedback[Title/Abstract] AND
      (alpha asymmetry[Title/Abstract] OR frontal alpha[Title/Abstract])
    filters: [Randomized Controlled Trial, Controlled Clinical Trial]
    max_results: 15

  motor_imagery_tdcs_nfb:
    query: >
      motor imagery[Title/Abstract] AND
      transcranial direct current stimulation[Title/Abstract] AND
      (neurofeedback[Title/Abstract] OR EEG[Title/Abstract] OR mu rhythm[Title/Abstract] OR ERD[Title/Abstract])
    filters: [Randomized Controlled Trial, Non-RCT Experimental]
    max_results: 15

  cognitive_tdcs_enhancement:
    query: >
      transcranial direct current stimulation[Title/Abstract] AND
      (working memory[Title/Abstract] OR cognitive enhancement[Title/Abstract]) AND
      DLPFC[Title/Abstract]
    filters: [Randomized Controlled Trial, Meta-Analysis]
    max_results: 15

  safety:
    query: >
      (transcranial direct current stimulation[Title/Abstract] OR neurofeedback[Title/Abstract]) AND
      safety[Title/Abstract] AND
      (adverse effects[Title/Abstract] OR tolerability[Title/Abstract])
    max_results: 10

priority_pmids:
  # tDCS + NFB motor imagery — Google Scholar confirmed
  - "36937688"   # Yang 2023 — RCT NFB+tDCS: mu-ERD higher in combined group (p<0.05) — KEY
  - "25599261"   # Gunduz 2015 — tDCS enhances mu-ERD handedness-dependent
  - "22791228"   # Varkuti 2012 — tDCS modulates ERD in chronic stroke (clinical extension)

  # NFB ADHD evidence base
  - "19715144"   # Arns 2009 — NFB meta-analysis ADHD (N=1253, large ES)
  - "19207632"   # Gevensleben 2009 — NFB RCT ADHD (N=102, 59% vs 37% response)
  - "28588473"   # Enriquez-Geppert 2017 — EEG-NFB cognitive enhancement review
  - "26652570"   # Ros 2016 — NFB reporting consensus

  # tDCS ADHD
  - "28299499"   # Soff 2017 — tDCS ADHD adolescents
  - "19390237"   # Salehinejad 2019 — tDCS ADHD meta-analysis (inhibitory control, WM)

  # MDD NFB alpha asymmetry
  - "28236680"   # Mennella 2017 — alpha asymmetry NFB RCT: reduced negative affect + anxiety
  - "31302517"   # Choi 2019 — alpha asymmetry + high-beta NFB for MDD

  # tDCS MDD
  - "23945780"   # Brunoni 2013 — SELECT-TDCS (gold standard MDD tDCS RCT)

  # Motor imagery + stroke
  - "36429924"   # Wang 2022 — RCT: anodal M1 tDCS + MI + UL training → stroke rehab

notes: >
  Primary evidence gap: no large RCT of tDCS+NFB combined vs monotherapy for ADHD or MDD.
  Prioritise studies with sequential (tDCS-then-NFB) vs synchronous designs.
  Key biomarkers: mu-ERD, theta/beta ratio, SMR, frontal alpha asymmetry.
  All protocols use tDCS as primary modality (Modality.TDCS) with NFB as
  the adjunct training phase within the plasticity window.
