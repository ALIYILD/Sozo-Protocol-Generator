condition_slug: tbi
condition_name: "Traumatic Brain Injury / Post-Concussion Syndrome"
icd10: S09.90

search_profiles:
  pathophysiology:
    query: >
      traumatic brain injury[Title/Abstract] AND
      (neuroinflammation[Title/Abstract] OR white matter[Title/Abstract] OR
       default mode network[Title/Abstract] OR cognitive impairment[Title/Abstract])
    filters: [Systematic Review, Meta-Analysis]
    max_results: 20

  tdcs_protocols:
    query: >
      traumatic brain injury[Title/Abstract] AND
      (transcranial direct current stimulation[Title/Abstract] OR tDCS[Title/Abstract])
    filters: [Randomized Controlled Trial, Systematic Review]
    max_results: 25

  post_concussion:
    query: >
      post-concussion syndrome[Title/Abstract] AND
      (brain stimulation[Title/Abstract] OR neuromodulation[Title/Abstract] OR
       cognitive rehabilitation[Title/Abstract])
    filters: [Randomized Controlled Trial]
    max_results: 20

  cognitive_outcomes:
    query: >
      traumatic brain injury[Title/Abstract] AND
      (attention[Title/Abstract] OR memory[Title/Abstract] OR
       executive function[Title/Abstract]) AND
      neuromodulation[Title/Abstract]
    max_results: 15

  assessment_scales:
    query: >
      traumatic brain injury[Title/Abstract] AND
      (PCSS[Title/Abstract] OR MoCA[Title/Abstract] OR
       post-concussion symptom[Title/Abstract]) AND validation[Title/Abstract]
    max_results: 10

priority_pmids:
  - "28209484"  # Sacco 2016 tDCS TBI review
  - "29618386"  # Rezaee 2018 tDCS cognitive TBI

notes: >
  Exclude acute TBI (< 3 months) and skull fracture cases.
  Include both mild TBI (mTBI/concussion) and moderate TBI literature.
  Post-concussion syndrome has distinct evidence base from severe TBI.
