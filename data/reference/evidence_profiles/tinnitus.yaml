condition_slug: tinnitus
condition_name: "Chronic Tinnitus"
icd10: H93.1

search_profiles:
  pathophysiology:
    query: >
      tinnitus[Title/Abstract] AND
      (auditory cortex[Title/Abstract] OR thalamocortical dysrhythmia[Title/Abstract] OR
       limbic system[Title/Abstract] OR attention network[Title/Abstract])
    filters: [Systematic Review, Meta-Analysis]
    max_results: 20

  tdcs_protocols:
    query: >
      tinnitus[Title/Abstract] AND
      (transcranial direct current stimulation[Title/Abstract] OR tDCS[Title/Abstract])
    filters: [Randomized Controlled Trial, Systematic Review]
    max_results: 30

  temporal_cortex:
    query: >
      tinnitus[Title/Abstract] AND
      (temporal cortex[Title/Abstract] OR auditory cortex[Title/Abstract]) AND
      (brain stimulation[Title/Abstract] OR cathodal[Title/Abstract])
    filters: [Randomized Controlled Trial]
    max_results: 20

  tavns_tinnitus:
    query: >
      tinnitus[Title/Abstract] AND
      (vagus nerve stimulation[Title/Abstract] OR taVNS[Title/Abstract] OR
       auricular vagus[Title/Abstract])
    max_results: 15

  assessment_scales:
    query: >
      tinnitus[Title/Abstract] AND
      (THI[Title/Abstract] OR Tinnitus Handicap Inventory[Title/Abstract] OR
       TFI[Title/Abstract]) AND validation[Title/Abstract]
    max_results: 10


  tps_protocols:
    query: >
      Tinnitus[Title/Abstract] AND
      (transcranial pulse stimulation[Title/Abstract] OR
       focused ultrasound[Title/Abstract] OR
       low-intensity focused ultrasound[Title/Abstract] OR
       transcranial ultrasound[Title/Abstract])
    max_results: 20

priority_pmids:
  - "23063562"  # Shekhawat 2013 tDCS tinnitus review
  - "22200714"  # Vanneste 2011 tDCS tinnitus bilateral
  - "22898993"  # Lehtimaki 2013 tDCS tinnitus

notes: >
  Inconsistent electrode placement findings in tinnitus tDCS — document this controversy.
  Left temporal cathodal (inhibit hyperactive auditory cortex) is most studied.
  taVNS may target limbic component (distress) rather than auditory phantom.
  Include tinnitus distress and annoyance, not just loudness, as outcomes.

