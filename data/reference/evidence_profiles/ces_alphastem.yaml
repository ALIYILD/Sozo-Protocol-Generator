condition_slug: ces_alphastem
condition_name: "Alpha-Stim CES — Anxiety, Insomnia & Comorbid Depression"
icd10: F41.1

search_profiles:
  ces_anxiety:
    query: >
      cranial electrotherapy stimulation[Title/Abstract] AND
      anxiety[Title/Abstract]
    filters: [Randomized Controlled Trial, Systematic Review, Meta-Analysis]
    max_results: 20

  ces_insomnia:
    query: >
      cranial electrotherapy stimulation[Title/Abstract] AND
      (insomnia[Title/Abstract] OR sleep disorder[Title/Abstract] OR sleep quality[Title/Abstract])
    filters: [Randomized Controlled Trial, Meta-Analysis]
    max_results: 15

  ces_depression:
    query: >
      cranial electrotherapy stimulation[Title/Abstract] AND
      depression[Title/Abstract]
    filters: [Randomized Controlled Trial, Systematic Review]
    max_results: 15

  alpha_stim_clinical:
    query: >
      Alpha-Stim[Title/Abstract] AND
      (anxiety[Title/Abstract] OR depression[Title/Abstract] OR insomnia[Title/Abstract] OR PTSD[Title/Abstract])
    filters: [Randomized Controlled Trial, Controlled Clinical Trial]
    max_results: 15

  ces_mechanism:
    query: >
      cranial electrotherapy stimulation[Title/Abstract] AND
      (mechanism[Title/Abstract] OR EEG[Title/Abstract] OR alpha[Title/Abstract] OR serotonin[Title/Abstract])
    filters: [Systematic Review, Review]
    max_results: 10

  ces_safety:
    query: >
      cranial electrotherapy stimulation[Title/Abstract] AND
      (safety[Title/Abstract] OR adverse events[Title/Abstract] OR tolerability[Title/Abstract])
    max_results: 10

  ces_combination:
    query: >
      cranial electrotherapy stimulation[Title/Abstract] AND
      (transcranial direct current stimulation[Title/Abstract] OR tDCS[Title/Abstract] OR
       combination[Title/Abstract] OR adjunct[Title/Abstract])
    max_results: 10

priority_pmids: []

notes: >
  Alpha-Stim has FDA clearance for anxiety, depression, and insomnia (510k).
  Focus on 0.5 Hz waveform (distinctive Alpha-Stim parameter) and earlobe placement.
  Key evidence: NICE Technology Appraisal MDD guidance.
  Benzodiazepine taper coordination is a key clinical application.
  CES is primarily used as adjunct to tDCS/tVNS in the SOZO protocol stack.
