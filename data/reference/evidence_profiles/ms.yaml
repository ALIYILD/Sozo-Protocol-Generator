condition_slug: ms
condition_name: "Multiple Sclerosis"
icd10: G35

search_profiles:
  pathophysiology:
    query: >
      multiple sclerosis[Title/Abstract] AND
      (demyelination[Title/Abstract] OR neurodegeneration[Title/Abstract] OR
       cortical reorganization[Title/Abstract] OR fatigue[Title/Abstract])
    filters: [Systematic Review, Meta-Analysis]
    max_results: 20

  tdcs_protocols:
    query: >
      multiple sclerosis[Title/Abstract] AND
      (transcranial direct current stimulation[Title/Abstract] OR tDCS[Title/Abstract])
    filters: [Randomized Controlled Trial, Systematic Review]
    max_results: 25

  fatigue_ms:
    query: >
      multiple sclerosis fatigue[Title/Abstract] AND
      (brain stimulation[Title/Abstract] OR neuromodulation[Title/Abstract] OR
       taVNS[Title/Abstract])
    filters: [Randomized Controlled Trial]
    max_results: 20

  cognitive_ms:
    query: >
      multiple sclerosis[Title/Abstract] AND
      (cognitive impairment[Title/Abstract] OR processing speed[Title/Abstract]) AND
      (tDCS[Title/Abstract] OR brain stimulation[Title/Abstract])
    filters: [Randomized Controlled Trial]
    max_results: 15

  assessment_scales:
    query: >
      multiple sclerosis[Title/Abstract] AND
      (EDSS[Title/Abstract] OR FSS[Title/Abstract] OR
       Symbol Digit Modalities[Title/Abstract]) AND validation[Title/Abstract]
    max_results: 10


  tps_protocols:
    query: >
      Multiple Sclerosis[Title/Abstract] AND
      (transcranial pulse stimulation[Title/Abstract] OR
       focused ultrasound[Title/Abstract] OR
       low-intensity focused ultrasound[Title/Abstract] OR
       transcranial ultrasound[Title/Abstract])
    max_results: 20

priority_pmids:
  - "25907210"  # Palm 2014 tDCS MS
  - "28714773"  # Charvet 2017 remote tDCS MS

notes: >
  Avoid stimulation during MS relapse/exacerbation.
  Fatigue (FSS) and cognitive domains have separate evidence bases.
  Remote tDCS delivery (home-based with video supervision) has emerging evidence in MS.

