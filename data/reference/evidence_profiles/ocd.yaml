condition_slug: ocd
condition_name: "Obsessive-Compulsive Disorder"
icd10: F42

search_profiles:
  pathophysiology:
    query: >
      obsessive compulsive disorder[Title/Abstract] AND
      (cortico-striato-thalamo-cortical[Title/Abstract] OR CSTC[Title/Abstract] OR
       orbitofrontal cortex[Title/Abstract] OR caudate[Title/Abstract])
    filters: [Systematic Review, Meta-Analysis]
    max_results: 20

  tdcs_protocols:
    query: >
      OCD[Title/Abstract] AND
      (transcranial direct current stimulation[Title/Abstract] OR tDCS[Title/Abstract])
    filters: [Randomized Controlled Trial, Systematic Review]
    max_results: 25

  sma_stimulation:
    query: >
      OCD[Title/Abstract] AND
      (supplementary motor area[Title/Abstract] OR SMA[Title/Abstract]) AND
      (brain stimulation[Title/Abstract] OR TMS[Title/Abstract] OR tDCS[Title/Abstract])
    max_results: 15

  assessment_scales:
    query: >
      OCD[Title/Abstract] AND
      (Y-BOCS[Title/Abstract] OR Yale-Brown[Title/Abstract] OR OCI-R[Title/Abstract]) AND
      validation[Title/Abstract]
    max_results: 10

  erp_combination:
    query: >
      OCD[Title/Abstract] AND
      (exposure response prevention[Title/Abstract] OR ERP[Title/Abstract]) AND
      neuromodulation[Title/Abstract]
    max_results: 15

priority_pmids:
  - "27527917"  # Mondino 2016 tDCS OCD
  - "26952071"  # Bation 2016 tDCS OCD case series

notes: >
  Right DLPFC cathodal (inhibit hyperactive CSTC loop) has preliminary evidence.
  SMA cathodal reduces compulsion-related motor hyperactivity.
  Most OCD tDCS evidence is small sample — mark as LOW confidence.
