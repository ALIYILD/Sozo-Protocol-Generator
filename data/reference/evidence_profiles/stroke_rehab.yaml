condition_slug: stroke_rehab
condition_name: "Post-Stroke Rehabilitation"
icd10: I63

search_profiles:
  pathophysiology:
    query: >
      stroke rehabilitation[Title/Abstract] AND
      (neuroplasticity[Title/Abstract] OR motor cortex[Title/Abstract] OR
       interhemispheric inhibition[Title/Abstract])
    filters: [Systematic Review, Meta-Analysis]
    max_results: 20

  tdcs_motor:
    query: >
      stroke[Title/Abstract] AND
      transcranial direct current stimulation[Title/Abstract] AND
      (motor function[Title/Abstract] OR upper limb[Title/Abstract] OR
       hemiparesis[Title/Abstract])
    filters: [Randomized Controlled Trial, Systematic Review, Meta-Analysis]
    max_results: 30

  tdcs_aphasia:
    query: >
      stroke[Title/Abstract] AND aphasia[Title/Abstract] AND
      (brain stimulation[Title/Abstract] OR tDCS[Title/Abstract])
    filters: [Randomized Controlled Trial, Systematic Review]
    max_results: 20

  post_stroke_depression:
    query: >
      post-stroke depression[Title/Abstract] AND
      (neuromodulation[Title/Abstract] OR brain stimulation[Title/Abstract])
    filters: [Randomized Controlled Trial]
    max_results: 15

  assessment_scales:
    query: >
      stroke[Title/Abstract] AND
      (Fugl-Meyer[Title/Abstract] OR NIHSS[Title/Abstract] OR
       Barthel index[Title/Abstract]) AND validation[Title/Abstract]
    max_results: 10

priority_pmids:
  - "10869055"  # Nitsche and Paulus 2000 foundational tDCS
  - "17009929"  # Fregni 2006 tDCS stroke motor
  - "15649798"  # Hummel 2005 tDCS stroke

notes: >
  Contraindicated until at least 6 months post-hemorrhagic stroke.
  Distinguish motor (M1 anodal ipsilesional) from inhibitory (cathodal contralesional) paradigms.
  Include transcallosal inhibition evidence.
