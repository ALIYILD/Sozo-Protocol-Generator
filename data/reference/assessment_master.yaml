    Tremor-frequency coherence (4-12 Hz — primary ET qEEG biomarker) in SMA/dlPFC/cerebellum; ↑Low beta (14-21 Hz) desynchronization in SMA during movement; ↑Upper beta (18-30 Hz) ERD in dlPFC; Disrupted sequential network engagement; ↑Cerebellar-thalamic synchrony
    qeeg_key_electrodes: "Cz/FCz (SMA — primary ET tremor coupling site), C3/C4 (motor cortex), F3/F4 (dlPFC), Pz (parietal coherence), Cerebellar electrodes (P9/P10/Oz)"
    qeeg_key_metrics: >
    Tremor frequency coherence (4-12 Hz) at Cz/FCz/C3/C4 (↑ = cerebellar-thalamo-cortical synchrony = ET biomarker); Beta ERD at SMA (FCz) during movement; Corticomuscular coherence (EMG-EEG coupling at tremor frequency); Tremor frequency power spectrum; Alpha/beta ratio motor cortex
    brain_regions_affected: >
    VIM Thalamus (primary ET target — pathological cerebellar-thalamic synchrony), Cerebellum (Lobule VI — origin), SMA (FCz), M1, Posterior Parietal Cortex (PPC), DLPFC, Premotor Cortex
    primary_network_disrupted: >
    Cerebello-Thalamo-Cortical Circuit (pathological synchrony — primary ET circuit), Sensorimotor Network (disrupted beta dynamics), Frontoparietal Network (altered)
    neuroimaging: >
    MRI structural brain (rule out secondary causes); DaTscan (if PD differentiation needed — negative in ET); DTI cerebellar-thalamic tract integrity; fMRI resting-state (cerebellar-thalamic hyperconnectivity in ET); MRI VIM targeting (DBS planning: Lead-DBS software); MRgFUS (H₂¹⁵O PET tracking during HIFU ET)
    physiological_assessments: >
    Accelerometry (wrist — tremor frequency and amplitude quantification, 1-week diary); Spiral/Archimedes spiral drawing (quantitative tremor app — Tremor12); EMG surface (tremor pattern); Weight-sensitive dining assessment; HRV; Bilateral wrist accelerometry during tasks
    functional_assessments: >
    TETRAS or FTM biweekly; Spirography quantitative (app); Daily function (eating, writing, drinking); QUEST QoL; Medication diary (propranolol/primidone effects); DBS/MRgFUS programming log (if applicable); Social impact (embarrassment in public)
    fnon_qeeg_treatment_target: >
    Tremor-frequency coherence ↓ at Cz/FCz (desynchronise CTC circuit); Cerebellar-M1 beta coherence normalisation; VIM thalamus activity modulation
    assessment_rationale: >
    Corticomuscular coherence at tremor frequency is unique ET biomarker — distinguishes CTC circuit involvement. DBS VIM or MRgFUS is gold standard; cerebellar TMS + TPS emerging alternatives.
  asd:
    condition: "Autism Spectrum Disorder (ASD)"
    category: "Neurodevelopmental"
    primary_clinical_scales: >
    ADOS-2 (Autism Diagnostic Observation Schedule — gold standard diagnostic); ADI-R (Autism Diagnostic Interview-Revised — developmental history); SRS-2 (Social Responsiveness Scale); VABS-3 (Vineland Adaptive Behaviour Scales); SCQ (Social Communication Questionnaire); RBS-R (Repetitive Behaviour Scale); CBCL; Sensory Profile-2; PDDBI; ABC (Aberrant Behaviour Checklist)
