    U-shaped power profile: ↑Low-freq (delta/theta) + ↑High-freq (beta/gamma); ↓Midrange alpha + beta; ↓Alpha (eyes-open = ↓ inhibitory control); Excess beta in Dup15q; ↓Long-range connectivity; ↑Local connectivity; ↓Mu (8-12 Hz) suppression (mirror neuron marker)
