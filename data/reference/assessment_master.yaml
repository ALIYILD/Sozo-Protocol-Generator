    qeeg_key_metrics: >
    Mu rhythm suppression at Cz/C3/C4 (↓ = impaired mirror neuron function — key ASD biomarker); Long-range coherence (↓ global connectivity); Local coherence (↑ focal); Frontal alpha asymmetry (Fp1/Fp2); N200/P300 event-related; 40 Hz ASSR (altered in ASD); ERP face processing (N170 at T5/T6); Gamma power (sensory cortices)
    brain_regions_affected: >
    PFC (social inhibition), Temporal Cortex, Fusiform Gyrus (face processing), Amygdala (emotional response), Cerebellum (motor planning, social timing), STS (Superior Temporal Sulcus — biological motion, ToM), Insula
    primary_network_disrupted: >
    Social Brain Network (impaired — STS, fusiform, amygdala, mPFC), DMN (atypical connectivity — over-or under-connected), Mirror Neuron Network (altered — mu suppression deficit), Long-range underconnectivity (frontal-posterior), Short-range overconnectivity
    neuroimaging: >
    MRI structural (brain size/growth trajectories in ASD); DTI long-range white matter tracts (↓ FA fronto-temporal); fMRI social tasks (face processing, ToM — ↓ amygdala/STS activation); fMRI resting-state (atypical DMN); MRS (↓ GABA, ↑ glutamate in social brain areas); EEG mu paradigm (action observation)
    physiological_assessments: >
    Sensory assessment (sensory profile — tactile, auditory, vestibular); HRV (autonomic dysregulation in ASD); Actigraphy (sleep — significant insomnia comorbidity in 70% ASD); GI assessment (gut-brain axis in ASD); Eye tracking (gaze patterns — social preference); Cortisol (HPA in ASD)
    functional_assessments: >
    ADOS-2 social affect + RRB subscores; Vineland adaptive skills; ABC irritability subscale; Sleep diary (critical in ASD); Sensory diary; Social interaction log; School/work participation; CBCL challenging behaviour; Communication progress; Safety assessment (elopement)
    fnon_qeeg_treatment_target: >
    Mu suppression restoration at Cz (mirror neuron circuit); Long-range coherence ↑; 40 Hz gamma normalisation (sensory); Frontal alpha ↑; Social brain network connectivity
    assessment_rationale: >
    Mu suppression is key ASD qEEG biomarker for mirror neuron circuit function. TPS RCT 2023 (Brain Commun, 21 cit) — multi-site frontal+parietal+temporal covers ASD social brain network nodes.
  disorders_of_consciousness_(doc):
    condition: "Disorders of Consciousness (DOC)"
    category: "Neurological — Consciousness"
    primary_clinical_scales: >
    CRS-R (Coma Recovery Scale-Revised — gold standard for DOC differentiation: UWS vs MCS); FOUR (Full Outline of UnResponsiveness Score); WHIM (Wessex Head Injury Matrix); WNSSP (Western Neuro Sensory Stimulation Profile); GCS; Nociception Coma Scale (NCS) — pain assessment; Family/carer burden tools; QoL assessment proxies
    neuropsychological_battery: >
    CRS-R subscales (auditory, visual, motor, oromotor, communication, arousal — primary DOC assessment battery); ERP-based command following (covert command paradigm — BCI-based); P300 cognitive probe paradigm (overt/covert); Motor imagery paradigm (fMRI/EEG); Communication device assessment
    qeeg_key_bands: >
    Generalised delta/theta dominance; Absent/severely ↓ alpha/beta; Loss of normal sleep architecture; ↓EEG complexity/entropy; Absent posterior dominant rhythm (PDR); ↓Reactivity to stimulation; Theta pattern associated with MCS vs delta with UWS
    qeeg_key_electrodes: "Global (all channels — 10-20 full montage required), Fz/Cz/Pz (midline — arousal centres), C3/C4 (sensorimotor), O1/O2 (visual — reactivity testing), T3/T4 (auditory — name-calling responses)"
    qeeg_key_metrics: >
    EEG reactivity index (change with stimulation — primary DOC qEEG measure; absent = worse prognosis); EEG complexity/entropy (↑ = MCS; ↓ = UWS; key prognostic metric); Delta/theta power (global); PDR (posterior dominant rhythm — absence = UWS); Sleep architecture (presence = good prognostic sign); P300 amplitude (command-following ERP); Alpha/delta ratio; Spectral edge frequency
    brain_regions_affected: >
    Thalamus (Intralaminar Nuclei, CL, CM-Pf — consciousness relay), Brainstem Reticular Formation (ARAS), PFC, Precuneus (consciousness), Posterior Cingulate (awareness)
    primary_network_disrupted: >
    ARAS/Ascending Arousal System (severely impaired), Thalamocortical System (disconnected), DMN (disrupted — correlates with consciousness level), Frontoparietal Consciousness Network
    neuroimaging: >
    MRI structural (lesion mapping — TBI/anoxia/vascular cause); fMRI mental imagery paradigm (tennis/house imagery — covert command following); EEG-fMRI simultaneous (low-resource DOC); DWI tractography (thalamocortical tract integrity = prognosis); 18F-FDG PET (metabolism correlates with consciousness level — most sensitive); PET H₂O¹⁵ during sensory stimulation
    physiological_assessments: >
    EEG continuous monitoring (reactivity + sleep-wake cycling — prognostic); HRV (autonomic recovery); Pupillometry (automated — arousal assessment); Serum NfL (neurodegeneration marker); Cortisol circadian rhythm; Skin conductance response (autonomic commands); Respiratory/cardiac monitoring; Temperature regulation
    functional_assessments: >
    CRS-R (weekly); FOUR score; Nociception assessment; Family communication plan; Palliative care needs assessment (in prolonged DOC); Communication device trials; RCP/RCOT guidelines adherence
    fnon_qeeg_treatment_target: >
    EEG reactivity ↑ (primary treatment target); EEG complexity ↑ (entropy increase = MCS emergence); Delta ↓; Thalamocortical connectivity restoration; PDR emergence
    assessment_rationale: >
    EEG complexity (entropy) is primary surrogate biomarker for consciousness level — differentiates UWS from MCS. taVNS + TPS as emerging FNON approaches. CRS-R + qEEG complexity together = best DOC assessment.
  fibromyalgia:
    condition: "Fibromyalgia"
    category: "Pain/Rheumatology"
    primary_clinical_scales: >
    FIQ-R (Fibromyalgia Impact Questionnaire-Revised — primary); FMSS (Fibromyalgia Survey Score); NRS pain; BPI-FM; ACR 2010/2016 diagnostic criteria (WPI + SS); HADS; GAD-7; PHQ-9; CSI (Central Sensitization Inventory — critical for FM); PSQI (sleep); FSS (Fatigue Severity Scale); PCS (Pain Catastrophizing Scale)
    neuropsychological_battery: >
    Processing Speed (DSST/SDMT — 'fibro fog' assessment); TMT-A&B; Stroop; CPT (sustained attention); RAVLT (verbal memory — fibro fog); N-back (WM); Multidimensional Fatigue Inventory (MFI); Computerised cognitive testing (Cambridge Brain Sciences)
    qeeg_key_bands: >
    ↑Theta power (concentrated slowing); ↑Theta/alpha + theta/beta ratios; ↓Delta (R insula); ↑Beta (R middle frontal, midcingulate); ↓Alpha peak frequency; ↓EO/EC reactivity; ↑Centro-parietal theta; Thalamocortical dysrhythmia pattern
    qeeg_key_electrodes: "Cz, C3/C4 (central theta — primary FM site), Fz (frontal slowing), Pz, P3/P4 (parietal theta), T3/T4 (temporal), O1/O2 (alpha peak frequency tracking)"
    qeeg_key_metrics: >
    Central theta (Cz/C3/C4) power (↑ = central sensitisation marker); APF (↓ correlates with FM severity); Thalamocortical coherence (Cz-Pz); EO/EC reactivity (↓ = autonomic dysregulation); Theta/alpha ratio; P300 latency (prolonged in FM); Beta power R-frontal/midcingulate; Gamma (30-80 Hz) C3/C4
    brain_regions_affected: >
    Thalamus (↓ activity — central sensitisation gateway), PFC (grey matter loss), ACC (midcingulate), Anterior Insula (interoception), M1, S1, Midcingulate
    primary_network_disrupted: >
    Pain Matrix/Salience (sensitised — central sensitisation), DMN (disrupted), Thalamocortical Dysrhythmia Circuit, Descending Pain Modulation (impaired), Interoceptive Network (insula)
    neuroimaging: >
    MRI voxel-based morphometry (PFC/thalamus grey matter ↓); fMRI resting-state (hyperconnected pain matrix); fMRI task (↑ pain sensitivity to non-painful stimuli = central sensitisation); PET FDG (thalamic hypometabolism); MRS (↓ GABA in insula/PFC, ↑ Glx)
    physiological_assessments: >
    QST Quantitative Sensory Testing (pressure pain thresholds — primary FM objective measure); CPM (Conditioned Pain Modulation — deficient in FM); HRV (↓ vagal tone — FM biomarker); Morning cortisol; Actigraphy (non-restorative sleep); Step count/activity level; EMG paraspinal; Inflammatory markers (↓ in FM = rules out inflammatory cause)
    functional_assessments: >
    FIQ-R weekly; NRS pain diary (morning/evening); Sleep diary (PSQI); Fatigue diary (FSS); Activity diary; Tender point count (ACR criteria); CSI monthly; Exercise tolerance; Social participation (SF-36)
    fnon_qeeg_treatment_target: >
    Central theta ↓ (Cz/C3/C4 — primary FM target); APF restoration; Thalamocortical coherence normalisation; Insula-pain matrix hyperactivity ↓
    assessment_rationale: >
    Central sensitisation is the core FM mechanism — CSI score combined with qEEG central theta is the FNON biomarker pair. tDCS M1 anodal (Cz/C3) is primary FNON treatment. LIFU thalamus for thalamocortical dysrhythmia.
  multiple_sclerosis:
    condition: "Multiple Sclerosis"
    category: "Neurological — MS"
    primary_clinical_scales: >
    EDSS (Expanded Disability Status Scale — primary MS staging); MSFC (MS Functional Composite: 9-HPT + T25FW + PASAT); MSIS-29 (MS Impact Scale — QoL); FSS (Fatigue Severity Scale — MS fatigue primary complaint); SDMT (Symbol Digit Modalities Test — FDA-accepted cognitive endpoint in MS); MFIS (Modified Fatigue Impact Scale); PDDS; BDI-II; HADS
    neuropsychological_battery: >
    SDMT (primary MS cognitive screen — most sensitive; endorsed by ECTRIMS); PASAT (Paced Auditory Serial Addition Test — MS cognitive test); BVMT-R; RAVLT; WAIS Processing Speed; TMT-A&B; Stroop; LNS; COWA verbal fluency; Brief Visuospatial Memory Test; BRB-N (Brief Repeatable Battery of Neuropsychological Tests)
    qeeg_key_bands: >
    ↑Theta + delta; ↓Alpha; ↓Alpha peak frequency; ↑Theta/alpha ratio; ↓P300 amplitude (cognitive fatigue marker); ↑Frontal theta correlates with cognitive fatigue — MS fatigue biomarker
    qeeg_key_electrodes: "Fz, F3/F4 (frontal theta/fatigue marker — primary MS qEEG site), Pz (posterior alpha ↓), C3/C4 (central — motor correlates), O1/O2 (visual — optic neuritis tracking)"
    qeeg_key_metrics: >
    Frontal theta power Fz/F3/F4 (↑ correlates with MS fatigue severity — primary MS qEEG biomarker); APF (↓ with cognitive decline); P300 amplitude/latency Cz/Pz (cognitive processing deficit); Alpha power Pz; Theta/alpha ratio; VEP (Visual Evoked Potential — optic neuritis marker: ↑ P100 latency)
    brain_regions_affected: >
    Widespread White Matter Lesions, Corpus Callosum (primary MS site), Periventricular Areas, Brainstem (cranial nerves), Cerebellum, Optic Nerves (optic neuritis)
    primary_network_disrupted: >
    Sensorimotor Network (disrupted by demyelination), Executive Network (cognitive fatigue), Visual Network (optic neuritis), Global Connectivity ↓ (lesion load correlation)
    neuroimaging: >
    MRI T2/FLAIR (lesion load — Barkhof criteria); MRI Gd+ (active lesions); Spinal cord MRI; DTI (white matter integrity — corpus callosum FA); Optical Coherence Tomography (OCT — retinal nerve fibre layer = neuroaxonal loss marker); VEP P100 latency; fMRI cortical reorganisation; MRS (NAA/Cr ratio — neuronal integrity)
    physiological_assessments: >
    HRV (autonomic MS neuropathy); Vestibular assessment (dizziness, ataxia); 9-HPT timed (hand function); T25FW timed gait; VEP P100 (optic nerve conduction); Urodynamics (bladder); Heat sensitivity (Uhthoff phenomenon); Step count actigraphy; Fatigue thermometer daily
    functional_assessments: >
    EDSS at baseline/6 monthly; SDMT quarterly (cognitive monitoring); FSS fatigue weekly; T25FW gait; 9-HPT hand function; MRI annually; Relapse diary; JCV index (if Natalizumab); DMT adherence; Bladder/bowel diary; HADS mood
    fnon_qeeg_treatment_target: >
    Frontal theta ↓ Fz (fatigue target); APF restoration; P300 amplitude ↑; Global coherence ↑; Sensorimotor beta restoration (motor symptoms)
    assessment_rationale: >
    SDMT is the FDA-accepted cognitive endpoint for MS clinical trials — use as primary neuropsychological outcome. Frontal theta is the qEEG biomarker for MS fatigue, which is the most disabling symptom in MS.
  dystonia:
    condition: "Dystonia"
    category: "Movement Disorder"
    primary_clinical_scales: >
    BFMDRS (Burke-Fahn-Marsden Dystonia Rating Scale — primary for generalised); TWSTRS (Toronto Western Spasmodic Torticollis Rating Scale — for cervical dystonia); UDRS (Unified Dystonia Rating Scale); Writer's Cramp Rating Scale (task-specific); GDS (Globalised Dystonia Scale); PDQ-39 (if DBS assessment); Quality of Life Dystonia (QoL-EDYS); WSAS
    neuropsychological_battery: >
    MMSE/MoCA (cognitive screen, especially for inherited dystonias); Processing speed battery; TMT-A&B; BVMT-R; Neuropsychological screen for DYT gene-related conditions; Social cognition (some DYT1 carriers); Emotional processing
    qeeg_key_bands: >
    ↓Sensorimotor beta; Abnormal beta rebound post-movement (↓ PMBR); ↑Alpha coherence (motor cortex); Altered sensorimotor integration; ↓Post-movement beta rebound (PMBR — primary dystonia qEEG biomarker); Maladaptive cortical plasticity (↑ LTP-like changes)
    qeeg_key_electrodes: "C3/C4 (sensorimotor beta — primary dystonia site), Cz/FCz (SMA — motor planning), F3/F4 (frontal changes), Pz (parietal); Motor-area specific by body part affected (e.g., C3 for right hand writer's cramp)"
    qeeg_key_metrics: >
    PMBR (post-movement beta rebound) at C3/C4 (↓ in dystonia — primary biomarker; reflects impaired GABAergic inhibition); Beta power C3/C4 (↓); Alpha coherence M1 (↑ = maladaptive plasticity); EMG-EEG coherence (tremulous dystonia); Cortical silent period (↓ = impaired motor inhibition); Sensorimotor integration (N20/P25 — ↑ amplitude = hyperexcitability)
    brain_regions_affected: >
    GPi (pathological low-frequency oscillations), Putamen, SMA, M1, Premotor Cortex, Cerebellum, Sensory Cortex, Thalamus
    primary_network_disrupted: >
    Basal Ganglia-Thalamocortical Loop (impaired inhibition — excess pallidal output), Sensorimotor Network (abnormal plasticity — maladaptive LTP), Cerebellar-M1 Circuit
    neuroimaging: >
    MRI structural brain (rule out secondary dystonia); DaTscan (if parkinsonism overlap); DTI (motor corticospinal tract + pallidothalamic tract integrity); fMRI task-based (affected body part movement — hyperactivation premotor/SMA); MRI GPi/STN targeting (DBS planning: Lead-DBS); Somatosensory evoked potentials (SEP)
    physiological_assessments: >
    EMG (continuous/task-specific dystonia pattern — surface EMG affected muscles); TMS mapping (motor cortex hyperexcitability — lowered rMT); Cortical Silent Period (CSP — ↓ duration = inhibitory deficit); Vibration-induced tremor (VIT assessment); HRV; Botulinum toxin injection response tracking; Kinematic analysis (gait/movement analysis)
    functional_assessments: >
    BFMDRS biweekly; TWSTRS monthly (cervical dystonia); Task-specific assessments (writing, musical instrument); Botulinum toxin injection diary (dose, site, duration); DBS programming log; Pain assessment (dystonia pain comorbidity); Social impact (embarrassment); Occupational therapy ADL
    fnon_qeeg_treatment_target: >
    PMBR ↑ at C3/C4 (restore post-movement beta rebound — primary dystonia target); Beta ↑ sensorimotor; Alpha coherence ↓ M1; GABAergic inhibitory circuit restoration
    assessment_rationale: >
    PMBR deficit is the most reliable qEEG biomarker for dystonia. GPi DBS restores normal motor circuit dynamics. TMS cortical silent period measures inhibitory deficit pre/post intervention.
