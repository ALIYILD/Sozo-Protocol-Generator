    notes: >
    Very preliminary. Alpha PEMF for craving reduction.
  - condition: "Chronic Pain"
    brain_target: "Motor cortex + pain processing areas"
    eeg_position: "C3/C4, Fz"
    protocol_summary: >
    PEMF for chronic pain; various frequencies (1–75 Hz); 15–30 min sessions. Good peripheral and central data.
    intensity: "0.19–1.37 mT"
    frequency: "1–75 Hz"
    duration_per_session: "15–30 min"
    total_sessions: "4–12 weeks"
    pulses_per_session: "N/A"
    devices: "NeoRhythm, ICES, FlexPulse"
    montage: "Motor cortex and/or local pain area placement"
    regulatory_status: "Investigational"
    evidence_level: "RCT, Open-label"
    literature_count: "15+"
    key_references: >
    Sutbeyaz 2009; Thomas 2007
    side_effects: >
    Very minimal. Safe.
    notes: >
    Strong peripheral PEMF evidence for musculoskeletal pain. Central brain PEMF emerging.
