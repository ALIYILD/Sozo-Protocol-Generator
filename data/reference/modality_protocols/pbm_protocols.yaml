# SOZO Brain Center — Photobiomodulation / Low-Level Light Therapy Protocol Reference
# Source: Master with QEEG places.xlsx, April 2026
# 9 condition protocols

modality: "pbm"
name: "Photobiomodulation / Low-Level Light Therapy"

protocols:
  - condition: "Alzheimer's / Dementia"
    brain_target: "DMN nodes, bilateral frontal/temporal/parietal"
    eeg_position: "Fz, F3/F4, T3/T4, Pz"
    protocol_summary: >
    Vielight Neuro Gamma: 810 nm NIR, 40 Hz pulsed, DMN targeting via transcranial + intranasal, 20 min daily, 12 weeks. Targets cytochrome c oxidase in mitochondria.
    intensity: "250 mW/cm²; 810 nm NIR"
    frequency: "40 Hz pulsed"
    duration_per_session: "20 min"
    total_sessions: "Daily × 12 weeks (84 sessions)"
    pulses_per_session: "N/A (continuous light delivery)"
    devices: "Vielight Neuro Gamma (810 nm + intranasal), SYMBYX PDCare"
    montage: "Transcranial helmet + intranasal probe (DMN coverage)"
    regulatory_status: "Investigational (CE marked in some EU countries)"
    evidence_level: "RCT, Open-label"
    literature_count: "20+"
    key_references: >
    Saltmarche 2017; Berman 2017; Proposed Vielight RCT
    side_effects: >
    Very minimal. Mild warmth sensation. Extremely safe profile.
    notes: >
    810 nm: best transcranial penetration. Intranasal reaches hippocampus via cribriform plate. Pulsed 40 Hz for gamma entrainment.
  - condition: "TBI / Concussion"
    brain_target: "Frontal, temporal, parietal (injury areas)"
    eeg_position: "Fz, F3/F4, T3/T4, Pz"
    protocol_summary: >
    810 nm NIR transcranial PBM over affected regions; continuous or pulsed; 20 min/day. Reduces neuroinflammation and promotes neuroregeneration.
    intensity: "250 mW/cm²; 810 nm"
    frequency: "10–40 Hz pulsed or CW"
    duration_per_session: "20 min"
    total_sessions: "20–30 sessions"
    pulses_per_session: "N/A"
    devices: "Vielight Neuro, Thor Photomedicine"
    montage: "Transcranial LED/laser helmet or targeted probes"
    regulatory_status: "Investigational"
    evidence_level: "Open-label, RCT"
    literature_count: "25+"
    key_references: >
    Naeser 2014; Morries 2015; Hipskind 2019
    side_effects: >
    Very minimal. Mild warmth. Extremely safe.
    notes: >
    Addresses mitochondrial dysfunction post-TBI. Reduces oxidative stress. Promotes ATP production.
