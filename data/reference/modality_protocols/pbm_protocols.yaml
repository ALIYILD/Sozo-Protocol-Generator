    frequency: "CW or pulsed"
    duration_per_session: "40 min (NEST protocol)"
    total_sessions: "1–5 sessions (acute intervention)"
    pulses_per_session: "N/A"
    devices: "PhotoThera NeuroThera (NEST trials), Thor"
    montage: "Transcranial helmet over ischemic region"
    regulatory_status: "Investigational (NEST-2 negative, NEST-3 ongoing)"
    evidence_level: "RCT (conflicting results)"
    literature_count: "10+"
    key_references: >
