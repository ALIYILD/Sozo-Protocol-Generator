  - condition: "Parkinson's Disease"
    brain_target: "Motor cortex + intranasal (substantia nigra pathway)"
    eeg_position: "C3/C4 + intranasal"
    protocol_summary: >
    810–1070 nm PBM: transcranial motor cortex + intranasal delivery targeting basal ganglia/substantia nigra pathway. Neuroprotective and anti-inflammatory.
    intensity: "250 mW/cm²; 810–1070 nm"
    frequency: "10–40 Hz pulsed"
    duration_per_session: "20 min"
    total_sessions: "20–30 sessions"
    pulses_per_session: "N/A"
    devices: "Vielight Neuro, SYMBYX PDCare Laser (1070 nm)"
