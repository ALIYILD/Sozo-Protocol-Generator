    Moro 2013; Hamilton 2020 (SYMBYX PD trial)
    side_effects: >
    Very minimal. Mild warmth. Extremely safe.
    notes: >
    Intranasal delivery reaches deeper structures including basal ganglia. Neuroprotective effect on dopaminergic neurons.
