# SOZO Brain Center — Transcutaneous Auricular Vagus Nerve Stimulation Protocol Reference
# Source: Master with QEEG places.xlsx, April 2026
# 11 condition protocols

modality: "tavns"
name: "Transcutaneous Auricular Vagus Nerve Stimulation"

protocols:
  - condition: "Depression (MDD)"
    brain_target: "Left auricular vagus nerve (cymba conchae)"
    eeg_position: "Left ear"
    protocol_summary: >
    taVNS via left ear cymba conchae; 25 Hz, 250 μs pulse width, 0.5–2 mA, 30–60 min/day, 4–12 weeks. Activates NTS-locus coeruleus-PFC circuitry.
    intensity: "0.5–2 mA"
    frequency: "25 Hz"
    duration_per_session: "30–60 min/day"
    total_sessions: "4–12 weeks daily"
    pulses_per_session: "N/A (continuous stimulation)"
    devices: "NEMOS (tVNS Technologies), Parasym"
    montage: "Left ear clip — cymba conchae electrode"
    regulatory_status: "CE Marked (Europe, depression)"
    evidence_level: "RCT, Meta-analysis"
    literature_count: "80+"
    key_references: >
    Hein 2013; Rong 2016; Liu 2020 (meta)
    side_effects: >
    Mild tingling, occasional skin irritation at ear electrode. Very safe.
    notes: >
    Non-invasive alternative to implanted VNS. Activates vagal afferents → NTS → brainstem neuromodulation.
  - condition: "Epilepsy"
    brain_target: "Left auricular vagus nerve (cymba conchae)"
    eeg_position: "Left ear"
    protocol_summary: >
    taVNS for epilepsy adjunct; 25 Hz, 250 μs, 30 min twice daily. Add-on to AEDs.
    intensity: "0.5–2 mA"
    frequency: "25 Hz"
    duration_per_session: "30 min × 2/day"
    total_sessions: "4–12 weeks"
    pulses_per_session: "N/A"
    devices: "NEMOS, Parasym"
    montage: "Left ear cymba conchae"
    regulatory_status: "CE Marked (Europe)"
    evidence_level: "RCT, Open-label"
    literature_count: "50+"
    key_references: >
    Stefan 2012; He 2013; Bauer 2016
    side_effects: >
    Mild tingling, skin irritation. Very safe.
    notes: >
    Mirror of implanted VNS for epilepsy indication. Strong evidence for add-on seizure reduction.
  - condition: "Chronic Pain"
    brain_target: "Left auricular vagus nerve"
    eeg_position: "Left ear"
    protocol_summary: >
    taVNS at higher frequency (100 Hz) for analgesic effect; 250 μs, 3 mA, 30–60 min.
    intensity: "1–3 mA"
    frequency: "100 Hz"
    duration_per_session: "30–60 min"
    total_sessions: "4–8 weeks daily"
    pulses_per_session: "N/A"
    devices: "NEMOS, Parasym, Alpha-Stim"
    montage: "Left ear cymba conchae"
    regulatory_status: "Investigational"
    evidence_level: "RCT, Open-label"
    literature_count: "40+"
    key_references: >
    Laqua 2014; Napadow 2012
    side_effects: >
    Mild tingling. Very safe.
    notes: >
    Higher frequency (100 Hz) preferred for analgesia vs 25 Hz for other indications.
  - condition: "Migraine Prevention"
    brain_target: "Cervical vagus nerve (right side) or left ear"
    eeg_position: "Neck (cervical) or left ear"
    protocol_summary: >
    gammaCore cervical nVNS at migraine onset: 25 Hz, 2-min stimulation × 3 applications. Auricular versions also used for prevention.
    intensity: "0.5–3 mA"
    frequency: "25 Hz"
    duration_per_session: "2 min × 3 per attack"
    total_sessions: "Acute/episodic or daily for prevention"
    pulses_per_session: "N/A"
    devices: "gammaCore (electroCore), NEMOS"
    montage: "Cervical electrode (neck) or left ear"
    regulatory_status: "FDA Cleared (gammaCore — cluster headache, migraine prevention 2018–2019)"
    evidence_level: "RCT"
    literature_count: "30+"
    key_references: >
    Goadsby 2018 (PREVA trial); Silberstein 2016 (EVENT trial)
    side_effects: >
    Mild redness, tingling at neck. Generally very safe.
    notes: >
    gammaCore is FDA cleared for cluster headache (acute) and migraine prevention. Strong evidence.
  - condition: "Inflammatory / Rheumatoid Arthritis"
    brain_target: "Left auricular vagus nerve"
    eeg_position: "Left ear"
    protocol_summary: >
    taVNS for anti-inflammatory effect; cholinergic anti-inflammatory pathway. 25 Hz, ongoing trials.
    intensity: "0.5–2 mA"
    frequency: "25 Hz"
    duration_per_session: "30–60 min/day"
    total_sessions: "4–12 weeks"
    pulses_per_session: "N/A"
    devices: "Parasym, NEMOS"
    montage: "Left ear cymba conchae"
    regulatory_status: "Investigational"
    evidence_level: "Open-label, Trials ongoing"
    literature_count: "20+"
    key_references: >
    Stavrakis 2016; Gupta 2020
    side_effects: >
    Mild tingling. Very safe.
    notes: >
    Anti-inflammatory via spleen-α7nAChR pathway. Also studied in heart failure and Crohn's.
  - condition: "Stroke Rehabilitation"
