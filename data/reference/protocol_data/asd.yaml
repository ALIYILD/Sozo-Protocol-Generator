contraindications_extra:
- - Seizure disorder (common in ASD)
  - All modalities
  - ABSOLUTE if uncontrolled seizures
- - Severe sensory sensitivity to electrodes
  - tDCS
  - ADAPT — use minimal gel, desensitisation protocol
