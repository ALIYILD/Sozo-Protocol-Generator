  - Condition-specific rehabilitation · 30–45 min
  tps_combos:
  - - TPS + tDCS
    - Sequential modulation for Mild TBI / Concussion
    - tDCS 20 min before TPS
    - Mild TBI / Concussion phenotype
    - Emerging
  - - TPS + taVNS
    - Autonomic + cortical dual approach
    - taVNS 15 min pre-TPS
    - Mild TBI / Concussion with autonomic features
    - Experimental
  - - TPS + CES
    - CES stabilisation + TPS modulation
    - CES before TPS sessions
    - Mild TBI / Concussion with sleep/anxiety
    - Weak / supportive
  nontps_combos:
