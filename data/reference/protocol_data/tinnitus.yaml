  - CES 30 min · Stabilise unilateral tonal tinnitus presentation
  - tDCS T5, T6 · 2 mA × 20 min
  - TPS T5, T6, FC3 · 3,000–5,000 pulses
  - Condition-specific rehabilitation · 30–45 min
  tps_combos:
  - - TPS + tDCS
    - Sequential modulation for Unilateral Tonal Tinnitus
    - tDCS 20 min before TPS
    - Unilateral Tonal Tinnitus phenotype
    - Emerging
  - - TPS + taVNS
    - Autonomic + cortical dual approach
    - taVNS 15 min pre-TPS
    - Unilateral Tonal Tinnitus with autonomic features
    - Experimental
  - - TPS + CES
    - CES stabilisation + TPS modulation
    - CES before TPS sessions
    - Unilateral Tonal Tinnitus with sleep/anxiety
    - Weak / supportive
  nontps_combos:
  - - tDCS + rehabilitation
    - Unilateral Tonal Tinnitus
    - Cortical priming + specific rehab
    - tDCS before rehab
    - Moderate adjunctive
  - - CES + standard care
    - Unilateral Tonal Tinnitus with sleep disturbance
    - Sleep restoration adjunct
    - Evening CES
    - Weak / supportive
  - - taVNS + therapy
    - Unilateral Tonal Tinnitus with autonomic features
    - Parasympathetic modulation
    - taVNS daily
    - Emerging
  rationale: 'Clinical Target: Optimise outcomes for Unilateral Tonal Tinnitus phenotype of Chronic Tinnitus.'
