display_name: Chronic Tinnitus
icd10: H93.1
short_name: Tinnitus
tps:
- code: T1
  symptom: Auditory Cortex Hyperactivity
  evidence: Emerging
  targets:
  - T5
  - T6
  - FC3
  params_text: 'TPS: T5, T6, FC3 · 3,000–5,000 pulses · 5 Hz · 0.2 mJ/mm²'
  rationale: TPS targeting of T5, T6, FC3 for auditory cortex hyperactivity in Chronic Tinnitus.
- code: T2
  symptom: Thalamocortical Dysrhythmia
  evidence: Emerging
  targets:
  - T5
  - T6
  params_text: 'TPS: T5, T6 · 3,000 pulses · 5 Hz · 0.2 mJ/mm²'
  rationale: TPS targeting of T5, T6 for thalamocortical dysrhythmia in Chronic Tinnitus.
- code: T3
  symptom: Distress & Limbic Involvement
  evidence: Preliminary
  targets:
  - F3
  - F4
  params_text: 'TPS: F3, F4 · 4,000 pulses · 5 Hz · 0.2 mJ/mm²'
  rationale: TPS targeting of F3, F4 for distress & limbic involvement in Chronic Tinnitus.
- code: T4
  symptom: Attentional Capture
  evidence: Emerging Pilot
  targets:
  - F3
  - F4
  - P3
  params_text: 'TPS: F3, F4, P3 · 3,000 pulses · 5 Hz · 0.2 mJ/mm²'
  rationale: TPS targeting of F3, F4, P3 for attentional capture in Chronic Tinnitus.
- code: T5
  symptom: Sleep & Hyperarousal Overlay
  evidence: Experimental
  targets:
  - Fz
  - F3
  params_text: 'TPS: Fz, F3 · 4,000 pulses · 5 Hz · 0.2 mJ/mm²'
  rationale: TPS targeting of Fz, F3 for sleep & hyperarousal overlay in Chronic Tinnitus.
