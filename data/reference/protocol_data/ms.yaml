    - Emerging
  - - TPS + taVNS
    - Autonomic + cortical dual approach
    - taVNS 15 min pre-TPS
    - Relapsing-Remitting MS (RRMS) with autonomic features
    - Experimental
  - - TPS + CES
    - CES stabilisation + TPS modulation
    - CES before TPS sessions
    - Relapsing-Remitting MS (RRMS) with sleep/anxiety
    - Weak / supportive
  nontps_combos:
