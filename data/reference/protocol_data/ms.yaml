contraindications_extra:
- - Active MS relapse
  - All modalities
  - POSTPONE — wait until stable × 4 weeks
- - Immunomodulatory therapy interaction
  - tDCS
  - RELATIVE — Doctor review
key_outcome_measures: EDSS, T25FW, SDMT (cognition), MFIS (fatigue), MBI
