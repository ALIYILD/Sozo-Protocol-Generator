scales:
  # Motor / Neurological
  updrs:
    name: "Unified Parkinson's Disease Rating Scale"
    abbreviation: "UPDRS / MDS-UPDRS"
    conditions: ["parkinsons"]
    domains: ["motor", "non_motor", "activities_of_daily_living"]
    pmid: "19343477"
    type: "clinician_administered"

  mmse:
    name: "Mini-Mental State Examination"
    abbreviation: "MMSE"
    conditions: ["parkinsons", "alzheimers", "tbi", "ms", "long_covid"]
    domains: ["cognition"]
    pmid: "1202204"
    type: "clinician_administered"

  moca:
    name: "Montreal Cognitive Assessment"
    abbreviation: "MoCA"
    conditions: ["parkinsons", "alzheimers", "tbi", "ms", "stroke_rehab", "long_covid"]
    domains: ["cognition"]
    pmid: "15817019"
    type: "clinician_administered"

  # Depression
  hamd:
    name: "Hamilton Depression Rating Scale"
    abbreviation: "HAM-D / HDRS"
    conditions: ["depression", "parkinsons", "alzheimers"]
    domains: ["mood", "depression"]
    pmid: "14100341"
    type: "clinician_administered"

  madrs:
    name: "Montgomery–Åsberg Depression Rating Scale"
    abbreviation: "MADRS"
    conditions: ["depression", "parkinsons", "tbi", "ms"]
    domains: ["depression"]
    pmid: "444788"
    type: "clinician_administered"

  phq9:
    name: "Patient Health Questionnaire-9"
    abbreviation: "PHQ-9"
    conditions: ["depression", "anxiety", "tbi", "ms", "stroke_rehab", "long_covid", "ptsd"]
    domains: ["depression"]
    pmid: "11556941"
    type: "self_report"

  # Anxiety
  gad7:
    name: "Generalized Anxiety Disorder 7-item Scale"
    abbreviation: "GAD-7"
    conditions: ["anxiety", "ptsd", "ms", "long_covid", "tinnitus"]
    domains: ["anxiety"]
    pmid: "16717171"
    type: "self_report"

  hama:
    name: "Hamilton Anxiety Rating Scale"
    abbreviation: "HAM-A"
    conditions: ["anxiety", "ptsd"]
    domains: ["anxiety"]
    pmid: "13638508"
    type: "clinician_administered"

  # PTSD
  pcl5:
    name: "PTSD Checklist for DSM-5"
    abbreviation: "PCL-5"
    conditions: ["ptsd"]
    domains: ["ptsd_symptoms"]
    pmid: "25891909"
    type: "self_report"

  caps5:
    name: "Clinician-Administered PTSD Scale for DSM-5"
    abbreviation: "CAPS-5"
    conditions: ["ptsd"]
    domains: ["ptsd_symptoms"]
    pmid: "25891909"
    type: "clinician_administered"

  # OCD
  ybocs:
    name: "Yale-Brown Obsessive Compulsive Scale"
    abbreviation: "Y-BOCS"
    conditions: ["ocd"]
    domains: ["ocd_symptoms"]
    pmid: "2543153"
    type: "clinician_administered"

  # ADHD
  asrs:
    name: "Adult ADHD Self-Report Scale"
    abbreviation: "ASRS-v1.1"
    conditions: ["adhd"]
    domains: ["attention", "hyperactivity"]
    pmid: "15841682"
    type: "self_report"

  conners:
    name: "Conners' Adult ADHD Rating Scales"
    abbreviation: "CAARS"
    conditions: ["adhd"]
    domains: ["attention", "hyperactivity", "impulsivity"]
    pmid: "9498418"
    type: "self_report"

  # Pain
  nprs:
    name: "Numeric Pain Rating Scale"
    abbreviation: "NPRS"
    conditions: ["chronic_pain", "tbi", "ms", "parkinsons"]
    domains: ["pain_intensity"]
    type: "self_report"

  fiq:
    name: "Fibromyalgia Impact Questionnaire"
    abbreviation: "FIQ"
    conditions: ["chronic_pain"]
    domains: ["pain", "function", "fatigue"]
    pmid: "1954998"
    type: "self_report"

  bpi:
    name: "Brief Pain Inventory"
    abbreviation: "BPI"
    conditions: ["chronic_pain", "tbi", "ms", "tinnitus"]
    domains: ["pain_intensity", "pain_interference"]
    pmid: "8080219"
    type: "self_report"

  # Sleep
  psqi:
    name: "Pittsburgh Sleep Quality Index"
    abbreviation: "PSQI"
    conditions: ["insomnia", "parkinsons", "depression", "ptsd", "long_covid"]
    domains: ["sleep_quality"]
    pmid: "2748771"
    type: "self_report"

  isi:
    name: "Insomnia Severity Index"
    abbreviation: "ISI"
    conditions: ["insomnia", "depression", "anxiety", "long_covid"]
    domains: ["insomnia_severity"]
    pmid: "11772681"
    type: "self_report"

  # Tinnitus
  thi:
    name: "Tinnitus Handicap Inventory"
    abbreviation: "THI"
    conditions: ["tinnitus"]
    domains: ["tinnitus_severity", "functional_impact"]
    pmid: "8668571"
    type: "self_report"

  tq:
    name: "Tinnitus Questionnaire"
    abbreviation: "TQ"
    conditions: ["tinnitus"]
    domains: ["tinnitus_distress"]
    pmid: "1477600"
    type: "self_report"

  # MS
  edss:
    name: "Expanded Disability Status Scale"
    abbreviation: "EDSS"
    conditions: ["ms"]
    domains: ["disability", "motor"]
    pmid: "7202225"
    type: "clinician_administered"

  # Stroke
  nihss:
    name: "NIH Stroke Scale"
    abbreviation: "NIHSS"
    conditions: ["stroke_rehab"]
    domains: ["stroke_severity", "neurological_deficit"]
    type: "clinician_administered"

  # ASD
  ados2:
    name: "Autism Diagnostic Observation Schedule, 2nd Edition"
    abbreviation: "ADOS-2"
    conditions: ["asd"]
    domains: ["social_communication", "restricted_repetitive_behaviors"]
    pmid: "11055457"
    type: "clinician_administered"

  srs2:
    name: "Social Responsiveness Scale, 2nd Edition"
    abbreviation: "SRS-2"
    conditions: ["asd"]
    domains: ["social_functioning"]
    type: "caregiver_report"

  # Long COVID
  fatigue_severity_scale:
    name: "Fatigue Severity Scale"
    abbreviation: "FSS"
    conditions: ["long_covid", "ms", "tbi", "parkinsons"]
    domains: ["fatigue"]
    pmid: "2803071"
    type: "self_report"

  dsq:
    name: "DePaul Symptom Questionnaire"
    abbreviation: "DSQ"
    conditions: ["long_covid"]
    domains: ["post_exertional_malaise", "multisystem_symptoms"]
    type: "self_report"

  # General function/QoL
  eq5d:
    name: "EuroQol 5-Dimension Quality of Life"
    abbreviation: "EQ-5D"
    conditions: ["parkinsons", "depression", "ms", "stroke_rehab", "tbi", "chronic_pain", "insomnia", "long_covid"]
    domains: ["quality_of_life"]
    pmid: "1634691"
    type: "self_report"

  # ── Additional scales from Assessment Master (April 2026) ──

  cssrs:
    name: "Columbia Suicide Severity Rating Scale"
    abbreviation: "C-SSRS"
    conditions: ["depression", "ptsd", "bipolar"]
    domains: ["safety", "suicidality"]
    type: "clinician_administered"
    threshold: "Any ideation with intent or plan = immediate escalation"
    frequency: "Every session"

  shaps:
    name: "Snaith-Hamilton Pleasure Scale"
    abbreviation: "SHAPS"
    conditions: ["depression", "parkinsons"]
    domains: ["anhedonia"]
    type: "self_report"
    threshold: "Score >= 3 = significant anhedonia"

  wsas:
    name: "Work and Social Adjustment Scale"
    abbreviation: "WSAS"
    conditions: ["depression", "anxiety", "ocd"]
    domains: ["functional_impairment"]
    type: "self_report"
    threshold: "0-10 subclinical; 11-20 moderate; >20 severe impairment"

  caars:
    name: "Conners Adult ADHD Rating Scale"
    abbreviation: "CAARS"
    conditions: ["adhd"]
    domains: ["adhd_severity", "inattention", "hyperactivity"]
    type: "self_report"
    threshold: "T-score >= 65 = clinically significant"

  trs:
    name: "Tinnitus Reaction Scale"
    abbreviation: "TRS"
    conditions: ["tinnitus"]
    domains: ["tinnitus_distress"]
    type: "self_report"
    threshold: ">= 30 = clinically significant distress"

  sdmt:
    name: "Symbol Digit Modalities Test"
    abbreviation: "SDMT"
    conditions: ["ms", "tbi", "stroke_rehab"]
    domains: ["cognitive_speed", "processing_speed"]
    type: "clinician_administered"
    threshold: "Z-score < -1.5 = cognitively impaired; sensitive MS cognitive marker"

  npi:
    name: "Neuropsychiatric Inventory"
    abbreviation: "NPI"
    conditions: ["alzheimers", "parkinsons", "tbi"]
    domains: ["neuropsychiatric_symptoms", "behavioural"]
    type: "carer_reported"
    threshold: "Severity x Frequency per domain; total > 12 = significant NPS burden"

  cdr:
    name: "Clinical Dementia Rating"
    abbreviation: "CDR"
    conditions: ["alzheimers", "mci"]
    domains: ["dementia_staging", "cognition"]
    type: "clinician_administered"
    threshold: "0=Normal; 0.5=MCI; 1=Mild AD; 2=Moderate AD; 3=Severe AD"

  brief_pain:
    name: "Brief Pain Inventory"
    abbreviation: "BPI"
    conditions: ["chronic_pain", "ms", "tbi"]
    domains: ["pain_severity", "pain_interference"]
    type: "self_report"
    threshold: "Severity 0-10; Interference 0-10; > 4 = moderate-severe pain"

  fma:
    name: "Fugl-Meyer Assessment"
    abbreviation: "FMA"
    conditions: ["stroke_rehab"]
    domains: ["motor_function", "stroke_recovery"]
    type: "clinician_administered"
    threshold: "0-66 upper limb; 0-34 lower limb. MCID = 5-6 points"

  zbi:
    name: "Zarit Burden Interview"
    abbreviation: "ZBI"
    conditions: ["alzheimers"]
    domains: ["carer_burden"]
    type: "self_report"
    threshold: "0-20 little/no burden; 21-40 mild-moderate; 41-60 moderate-severe; 61-88 severe"
