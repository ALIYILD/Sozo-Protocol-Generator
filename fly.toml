app = "sozo-protocol-generator"
primary_region = "lhr"

[build]

[env]
  PYTHONPATH = "/app/src"
  DATABASE_URL = "sqlite+aiosqlite:///app/data/sozo.db"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
