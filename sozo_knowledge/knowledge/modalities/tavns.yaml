    severity: "mild"
    typical_duration: "During stimulation only"

  - effect: "Ear redness or irritation at electrode site"
    frequency: "common"
    severity: "mild"
    typical_duration: "Resolves within hours"

  - effect: "Mild headache"
    frequency: "occasional"
    severity: "mild"
    typical_duration: "Resolves within hours"

  - effect: "Dizziness"
    frequency: "occasional"
    severity: "mild"
    typical_duration: "Resolves within minutes"

  - effect: "Coughing or throat sensation"
    frequency: "occasional"
    severity: "mild"
    typical_duration: "During stimulation; resolves when stopped"

  - effect: "Transient heart rate changes"
