  - "Start at lowest perceptible intensity and titrate as needed"
  - "Ear clip electrodes must make good skin contact — use conductive solution if needed"
  - "Monitor for dizziness or lightheadedness during first session"
  - "Ensure device is FDA-cleared model for clinical use"
  - "Obtain informed consent; disclose off-label status for non-cleared conditions"
  - "Monitor for adverse events at every session"
  - "Do not use concurrently with other cranial electrical stimulation devices"
  - "Maintain consistent medication state throughout treatment blocks"

