slug: ces
name: "Cranial Electrotherapy Stimulation"
abbreviation: "CES"
description: >
  Microcurrent stimulation applied to earlobes targeting alpha wave entrainment
  and HPA axis modulation. Delivers sub-milliamp pulsed current to modulate
  brain activity and autonomic function.

mechanism: >
  CES delivers pulsed microcurrent (typically 10-600 microamps) through ear clip
  electrodes. The current passes through the brainstem region, modulating
  reticular activating system activity and hypothalamic-pituitary-adrenal (HPA)
  axis function. Proposed mechanisms include cortical alpha wave entrainment
  (increased alpha activity associated with relaxation), modulation of
  serotonin and norepinephrine levels, reduction of cortisol, and normalisation
  of autonomic balance. EEG studies show increased alpha activity and decreased
  delta activity following CES sessions.

parameters:
  frequency_hz: [0.5, 100]
  intensity_ua: [10, 600]
  duration_min: [20, 60]
  waveform: "Modified square wave or asymmetric biphasic"
  electrode_placement: "Ear clip electrodes on earlobes"

devices:
  - slug: alpha_stim
    name: "Alpha-Stim"
    manufacturer: "Electromedical Products International"
    type: "CES"
    description: "FDA-cleared cranial electrotherapy stimulation for anxiety, depression, and insomnia."
    features:
      - "FDA 510(k) cleared"
      - "Ear clip electrodes"
      - "Adjustable frequency and intensity"
    regulatory: "FDA-cleared for anxiety, insomnia, depression"
    protocols_supported: ["CES-standard"]

regulatory_status: >
  FDA-cleared (510(k)) for anxiety, depression, and insomnia via the Alpha-Stim
  device. This is one of the few neuromodulation modalities with direct FDA
  clearance for specific neuropsychiatric conditions. CE-marked in Europe.
  Other conditions beyond the cleared indications remain off-label.

