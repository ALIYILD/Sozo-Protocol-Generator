safety_principles:
  - "ALL non-Alzheimer's use is OFF-LABEL — requires Doctor authorization and explicit off-label consent"
  - "Screen for all contraindications before initiating stimulation"
  - "Neuronavigation must be calibrated and verified before each session"
  - "Monitor patient throughout session for signs of discomfort or adverse effects"
  - "Do not exceed manufacturer-specified pulse count and energy parameters"
  - "Maintain minimum 48-hour interval between sessions unless protocol specifies otherwise"
  - "Obtain informed consent including off-label disclosure where applicable"
  - "All TPS treatments require explicit Doctor authorization"
  - "Discontinue immediately for Grade 3+ adverse events"
  - "Maintain consistent medication state (ON/OFF) throughout treatment blocks"

contraindications:
  - category: "contraindication"
    description: "Metallic implants in the head (excluding dental fillings)"
    severity: "absolute"
    modalities: ["tps"]
    source: "Storz Medical NEUROLITH manufacturer guidelines"

  - category: "contraindication"
    description: "Implanted cardiac pacemaker or defibrillator"
    severity: "absolute"
    modalities: ["tps"]
    source: "Device manufacturer guidelines"

  - category: "contraindication"
    description: "Active epilepsy or history of seizures in the past 12 months"
    severity: "absolute"
    modalities: ["tps"]
    source: "Clinical safety consensus"

  - category: "contraindication"
    description: "Intracranial tumour or mass lesion in target area"
    severity: "absolute"
    modalities: ["tps"]
    source: "Clinical consensus"

  - category: "contraindication"
    description: "Blood clotting disorders or current anticoagulant therapy (INR > 3.0)"
    severity: "absolute"
    modalities: ["tps"]
    source: "Shock wave therapy safety guidelines"

  - category: "precaution"
    description: "Pregnancy — insufficient safety data; use only if benefit clearly outweighs risk"
    severity: "moderate"
    modalities: ["tps"]
    source: "Precautionary principle"

  - category: "precaution"
    description: "Cochlear implants — consult manufacturer and ENT before proceeding"
    severity: "moderate"
    modalities: ["tps"]
    source: "Device interaction risk"

  - category: "precaution"
    description: "Ventriculoperitoneal (VP) shunt — avoid direct stimulation near shunt pathway"
    severity: "moderate"
    modalities: ["tps"]
    source: "Clinical precaution"

