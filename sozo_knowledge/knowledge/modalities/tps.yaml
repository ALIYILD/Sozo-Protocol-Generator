slug: tps
name: "Transcranial Pulse Stimulation"
abbreviation: "TPS"
description: >
  Focused ultrasound-based low-intensity extracorporeal shock wave stimulation
  targeting specific brain regions. Delivered via neuronavigation-guided handpiece
  with penetration depth up to 80 mm.

mechanism: >
  TPS uses single ultrashort ultrasound pulses (3 microseconds) generated by an
  electromagnetic shock wave source. These pulses pass through the skull and
  create transient mechanical pressure changes in targeted brain tissue. The
  mechanotransduction triggers intracellular signalling cascades including
  nitric oxide release, VEGF upregulation, and BDNF expression. This promotes
  neuroplasticity, neurogenesis, and improved regional cerebral blood flow.
  Neuronavigation guidance enables precise targeting of specific cortical and
  subcortical structures.

parameters:
  pulses_per_session: [300, 600]
  frequency_hz: 5
  energy_level_mj: [0.2, 0.3]
  depth_mm: "Up to 80mm"
  pulse_duration_us: 3
  focal_zone_mm: 5

devices:
  - slug: neurolith_tps
    name: "NEUROLITH TPS"
    manufacturer: "Storz Medical AG"
    type: "TPS"
    description: "CE-marked transcranial pulse stimulation system for focused brain stimulation."
    features:
      - "CE-marked for Alzheimer's disease"
      - "Neuronavigation-guided targeting"
      - "Focus depth up to 80mm"
      - "Real-time imaging integration"
    regulatory: "CE-marked (Alzheimer's); OFF-LABEL for all other conditions"
    warning: "OFF-LABEL use for non-Alzheimer's conditions requires explicit Doctor authorization and documented patient consent"
    protocols_supported: ["T1", "T2", "T3", "T4", "T5"]

regulatory_status: >
  CE-marked ONLY for Alzheimer's disease (NEUROLITH device by Storz Medical AG).
  ALL other conditions are strictly OFF-LABEL and require explicit Doctor
  authorization plus documented patient off-label consent. Not FDA-cleared.
  Off-label use must be clearly disclosed in all clinical documentation.

on_label_conditions:
  - "alzheimers"

off_label_conditions:
  - "parkinsons"
  - "depression"
  - "adhd"
  - "asd"
  - "migraine"
  - "chronic_pain"
  - "stroke_rehabilitation"

safety_principles:
  - "ALL non-Alzheimer's use is OFF-LABEL — requires Doctor authorization and explicit off-label consent"
  - "Screen for all contraindications before initiating stimulation"
  - "Neuronavigation must be calibrated and verified before each session"
  - "Monitor patient throughout session for signs of discomfort or adverse effects"
  - "Do not exceed manufacturer-specified pulse count and energy parameters"
  - "Maintain minimum 48-hour interval between sessions unless protocol specifies otherwise"
  - "Obtain informed consent including off-label disclosure where applicable"
  - "All TPS treatments require explicit Doctor authorization"
  - "Discontinue immediately for Grade 3+ adverse events"
  - "Maintain consistent medication state (ON/OFF) throughout treatment blocks"

contraindications:
  - category: "contraindication"
    description: "Metallic implants in the head (excluding dental fillings)"
    severity: "absolute"
    modalities: ["tps"]
    source: "Storz Medical NEUROLITH manufacturer guidelines"

  - category: "contraindication"
    description: "Implanted cardiac pacemaker or defibrillator"
    severity: "absolute"
    modalities: ["tps"]
    source: "Device manufacturer guidelines"

  - category: "contraindication"
    description: "Active epilepsy or history of seizures in the past 12 months"
    severity: "absolute"
    modalities: ["tps"]
    source: "Clinical safety consensus"

  - category: "contraindication"
    description: "Intracranial tumour or mass lesion in target area"
    severity: "absolute"
    modalities: ["tps"]
    source: "Clinical consensus"

  - category: "contraindication"
    description: "Blood clotting disorders or current anticoagulant therapy (INR > 3.0)"
    severity: "absolute"
    modalities: ["tps"]
    source: "Shock wave therapy safety guidelines"

  - category: "precaution"
    description: "Pregnancy — insufficient safety data; use only if benefit clearly outweighs risk"
    severity: "moderate"
    modalities: ["tps"]
    source: "Precautionary principle"

  - category: "precaution"
    description: "Cochlear implants — consult manufacturer and ENT before proceeding"
    severity: "moderate"
    modalities: ["tps"]
    source: "Device interaction risk"

  - category: "precaution"
    description: "Ventriculoperitoneal (VP) shunt — avoid direct stimulation near shunt pathway"
    severity: "moderate"
    modalities: ["tps"]
    source: "Clinical precaution"

