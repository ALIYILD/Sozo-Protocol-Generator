slug: tps
name: "Transcranial Pulse Stimulation"
abbreviation: "TPS"
description: >
  Focused ultrasound-based low-intensity extracorporeal shock wave stimulation
  targeting specific brain regions. Delivered via neuronavigation-guided handpiece
  with penetration depth up to 80 mm.

mechanism: >
  TPS uses single ultrashort ultrasound pulses (3 microseconds) generated by an
  electromagnetic shock wave source. These pulses pass through the skull and
  create transient mechanical pressure changes in targeted brain tissue. The
  mechanotransduction triggers intracellular signalling cascades including
  nitric oxide release, VEGF upregulation, and BDNF expression. This promotes
  neuroplasticity, neurogenesis, and improved regional cerebral blood flow.
  Neuronavigation guidance enables precise targeting of specific cortical and
  subcortical structures.

parameters:
  pulses_per_session: [1000, 10000]
  frequency_hz: 5
  energy_level_mj: [0.2, 0.3]
  depth_mm: "Up to 80mm"
  pulse_duration_us: 3
  focal_zone_mm: 5

devices:
  - slug: neurolith_tps
    name: "NEUROLITH TPS"
    manufacturer: "Storz Medical AG"
    type: "TPS"
    description: "CE-marked transcranial pulse stimulation system for focused brain stimulation."
    features:
      - "CE-marked for Alzheimer's disease"
      - "Neuronavigation-guided targeting"
      - "Focus depth up to 80mm"
      - "Real-time imaging integration"
    regulatory: "CE-marked (Alzheimer's); OFF-LABEL for all other conditions"
    warning: "OFF-LABEL use for non-Alzheimer's conditions requires explicit Doctor authorization and documented patient consent"
    protocols_supported: ["T1", "T2", "T3", "T4", "T5"]

regulatory_status: >
  CE-marked ONLY for Alzheimer's disease (NEUROLITH device by Storz Medical AG).
  ALL other conditions are strictly OFF-LABEL and require explicit Doctor
  authorization plus documented patient off-label consent. Not FDA-cleared.
  Off-label use must be clearly disclosed in all clinical documentation.

