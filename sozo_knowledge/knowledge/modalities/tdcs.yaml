  - "chronic_pain"
  - "stroke_rehabilitation"

safety_principles:
  - "Screen for all contraindications before initiating stimulation"
  - "Ensure electrode impedance is within safe range before starting"
  - "Monitor skin condition under electrodes before and after each session"
  - "Use saline-soaked sponge electrodes or conductive gel to ensure even current distribution"
  - "Never exceed 2 mA intensity or 40 minutes duration per session"
  - "Ramp current up and down over at least 30 seconds to reduce phosphene risk"
  - "Maintain consistent medication state throughout treatment blocks"
  - "Obtain informed consent including off-label disclosure"
  - "Monitor for adverse events at every session"
  - "Discontinue immediately for Grade 3+ adverse events"

contraindications:
  - category: "contraindication"
    description: "Metallic implants in the head (excluding dental fillings)"
    severity: "absolute"
    modalities: ["tdcs"]
    source: "Clinical consensus guidelines"

  - category: "contraindication"
    description: "Implanted cardiac pacemaker or defibrillator"
    severity: "absolute"
    modalities: ["tdcs"]
    source: "Device manufacturer guidelines"

  - category: "contraindication"
    description: "Active epilepsy or history of seizures in the past 12 months"
    severity: "absolute"
    modalities: ["tdcs"]
    source: "Antal et al., 2017 safety guidelines"

  - category: "contraindication"
    description: "Unstable skull fracture or craniotomy defect at electrode site"
    severity: "absolute"
    modalities: ["tdcs"]
    source: "Clinical consensus"

  - category: "precaution"
    description: "Pregnancy — insufficient safety data; use only if benefit clearly outweighs risk"
    severity: "moderate"
    modalities: ["tdcs"]
    source: "Precautionary principle"

  - category: "precaution"
    description: "Skin lesions, eczema, or open wounds at electrode placement sites"
    severity: "moderate"
    modalities: ["tdcs"]
    source: "Clinical practice"

  - category: "precaution"
    description: "Cochlear implants — consult manufacturer before proceeding"
    severity: "moderate"
    modalities: ["tdcs"]
    source: "Device interaction risk"

