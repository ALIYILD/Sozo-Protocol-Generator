slug: tdcs
name: "Transcranial Direct Current Stimulation"
abbreviation: "tDCS"
description: >
  Non-invasive brain stimulation using low-intensity direct current (1-2 mA)
  delivered via scalp electrodes to modulate cortical excitability. Anodal
  stimulation increases excitability while cathodal stimulation decreases it.

mechanism: >
  tDCS delivers a weak constant current between an anode and cathode placed on
  the scalp. The current flows through the skull and modulates resting membrane
  potential of cortical neurons. Anodal stimulation depolarises neurons
  (increasing excitability), while cathodal stimulation hyperpolarises them
  (decreasing excitability). Prolonged stimulation induces NMDA-receptor-dependent
  neuroplastic changes that outlast the stimulation period. Effects on synaptic
  plasticity are mediated through LTP/LTD-like mechanisms.

parameters:
  typical_intensity_ma: [1.0, 2.0]
  typical_duration_min: [20, 30]
  electrode_size_cm2: [25, 35]
  session_frequency: "Daily or 5x/week"
  ramp_up_seconds: 30
  ramp_down_seconds: 30
  max_current_density_ua_per_cm2: 80

