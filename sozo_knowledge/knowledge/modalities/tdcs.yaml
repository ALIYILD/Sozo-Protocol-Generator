    severity: "mild"
    typical_duration: "During stimulation, resolves within minutes"

  - effect: "Skin redness at electrode sites"
    frequency: "common"
    severity: "mild"
    typical_duration: "Resolves within 1-2 hours"

  - effect: "Mild headache"
    frequency: "common"
    severity: "mild"
    typical_duration: "Resolves within hours"

  - effect: "Fatigue"
    frequency: "occasional"
