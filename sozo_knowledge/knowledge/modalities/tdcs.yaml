regulatory_status: >
  CE Class IIa medical device in the EU. Not FDA-cleared for clinical treatment
  in the US (research-use only). Off-label for most neuropsychiatric conditions.
  CE marking covers the device itself, not specific therapeutic indications beyond
  manufacturer claims.

