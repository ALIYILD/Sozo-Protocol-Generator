protocols:
- protocol_id: C-AD-MEM
  label: Memory Enhancement — Temporal-Parietal tDCS
  modality: tdcs
  target_region: Temporal-Parietal Cortex
  target_abbreviation: TP
  target_electrodes: []
  phenotype_slugs:
  - mci_am
  - mild_ad
  network_targets:
  - dmn
  - cen
  parameters:
    device: Newronika HDCkit or PlatoScience
    anode: P3 + P4 (bilateral parietal) or T5+T6 (temporal-parietal)
    cathode: Fp1 + Fp2 (bilateral supraorbital) or shoulder reference
    intensity: 1.5-2.0 mA
    duration: 20-30 min (start 15 min in moderate AD)
    sessions: 10-15 over 3 weeks
    electrode_size: 35 cm2
    note: 'Ferrucci montage: anodes over temporal-parietal regions. Cognitive stimulation activities during session recommended.'
  rationale: Temporal-parietal anodal tDCS targets episodic memory and semantic processing nodes. Ferrucci et al. (2008) Neurology
    study (N=10) demonstrated improved recognition memory in AD. Boggio et al. (2012) PLOS ONE demonstrated visual memory
    improvements. Meta-analyses of tDCS in AD confirm moderate memory effect sizes. OFF-LABEL.
  evidence_level: medium
  off_label: true
  session_count: 15
  notes: ''
- protocol_id: T-AD
  label: Hippocampal TPS — Memory (MCI)
  modality: tps
  target_region: Hippocampus / Entorhinal region
  target_abbreviation: HC/EC
  target_electrodes: []
  phenotype_slugs:
  - mci_am
  network_targets:
  - dmn
  parameters:
    device: NEUROLITH (Storz Medical)
    target: Hippocampal neuronavigation target (40-50mm depth from scalp)
    pulses: 300-400 per session
    frequency: 5 Hz
    energy: 0.25 mJ/mm2
    sessions: 6-9
    note: Neuronavigation required. MRI-based targeting. Bilateral treatment applied sequentially.
  rationale: TPS delivers focused acoustic pulse energy at hippocampal depth, inducing neuroplasticity in memory circuits
    inaccessible to surface tDCS. Benussi et al. (2020) Brain Stimulation RCT (N=33) demonstrated significant cognitive improvements
    at 1 and 3 months in MCI/AD. Confirm regulatory approval status for AD indication in your jurisdiction. Doctor authorization
    mandatory.
  evidence_level: medium
  off_label: false
  session_count: 9
  notes: TPS is approved for Alzheimer's Disease in some jurisdictions — confirm regulatory status. Informed consent and capacity
    assessment mandatory.
