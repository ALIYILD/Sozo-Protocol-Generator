assessments:
- scale_key: moca
  timing: baseline
  primary: false
  notes: Primary cognitive screening tool. Score 18-25 = MCI range; <18 = possible dementia. Administer at baseline and every
    3 months.
- scale_key: mmse
  timing: baseline
  primary: false
  notes: Widely used staging tool. Score 21-26 = mild AD; 10-20 = moderate AD; <10 = severe AD. Less sensitive to MCI than
    MoCA.
- scale_key: adas_cog
  timing: baseline
  primary: false
  notes: Gold standard cognitive outcome measure in AD clinical trials. Higher score = greater impairment. 4-point change
    = clinically meaningful.
- scale_key: cdr
  timing: baseline
  primary: false
  notes: Global severity and staging scale. CDR 0.5 = MCI; CDR 1 = mild; CDR 2 = moderate dementia. Sum of Boxes (CDR-SB)
    for change tracking.
- scale_key: npi
  timing: baseline
  primary: false
  notes: Assessment of BPSD. Administered to caregiver. Frequency x Severity scoring. Essential for BPSD phenotype.
- scale_key: phq9
  timing: baseline
  primary: false
  notes: BPSD mood screen. Administer to carer if patient cannot self-report reliably. Score >=10 = clinically significant
    depression in AD.
