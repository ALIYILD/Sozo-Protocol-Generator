clinical_tips:
- Capacity assessment is a mandatory first step — document thoroughly before any consent process. Involve caregiver/healthcare
  proxy from the outset.
- Start with shorter sessions (15-20 min) in patients with moderate AD — extend to 30 min only after confirmed tolerance across
  multiple sessions
- TPS hippocampal targeting requires accurate neuronavigation and MRI-based planning — Partner-tier or specialist clinician
  only
- Perform cognitive stimulation activities (word recall, picture naming, semantic fluency) during tDCS sessions to leverage
  activity-dependent plasticity
- Engage caregiver as active participant in outcome monitoring — carer-reported functional changes are often more clinically
  meaningful than scale scores
- Document regulatory status for TPS in your jurisdiction — approval status for AD indication may affect consent requirements
governance_rules:
- No Fellow or Clinical Assistant may independently modify treatment plans without Doctor authorization
- All TPS applications require explicit off-label informed consent and Doctor authorization
- Adverse events must be documented within 24 hours and escalated per clinic protocol
- Treatment records must be updated at every session
- Informed consent must be obtained and documented before initiating any modality
- Informed consent for cognitively impaired patients requires formal capacity assessment and substitute decision-maker documentation
- TPS hippocampal targeting requires Partner-tier or specialist clinician with neuronavigation training
- Regulatory status of TPS for Alzheimer's Disease must be confirmed and documented for each patient
