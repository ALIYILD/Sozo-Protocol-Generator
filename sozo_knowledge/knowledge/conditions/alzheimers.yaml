category: neurological
version: '1.0'
overview: 'Alzheimer''s Disease (AD) is the most common form of dementia, accounting for 60-70% of all dementia cases worldwide,
  with an estimated 50 million people affected globally. It is characterized by progressive episodic memory loss, language
  impairment, visuospatial deficits, and executive dysfunction, ultimately leading to severe functional dependency. Mild Cognitive
  Impairment (MCI) represents a clinically and biomarker-defined transitional state between normal aging and AD dementia,
  with an annual conversion rate of approximately 10-15% to AD.


  Neuromodulation in AD/MCI targets residual memory and executive networks to slow functional decline and improve cognitive
  performance. tDCS applied to temporal-parietal and DLPFC regions has demonstrated memory improvements in pilot RCTs. Transcranial
  Pulse Stimulation (TPS) using the NEUROLITH system has shown positive pilot results in AD/MCI (Benussi et al. 2020). TPS
  is approved for use in Alzheimer''s Disease in applicable regulatory jurisdictions — clinicians should confirm current regulatory
  status for their region. All neuromodulation in AD/MCI is intended as a cognitive rehabilitation adjunct, not a disease-modifying
  intervention.'
pathophysiology: 'AD pathophysiology involves two hallmark pathological processes: extracellular amyloid-beta (Aβ) plaques
  and intraneuronal neurofibrillary tangles (hyperphosphorylated tau protein). These pathologies disrupt synaptic transmission,
  activate neuroinflammatory cascades (microglial activation, astrogliosis), and cause progressive neurodegeneration following
  a predictable spatiotemporal staging pattern.


  Pathological spread follows Braak staging: tau pathology begins in transentorhinal cortex (Braak I-II), spreads to hippocampus
  proper (III-IV), then association neocortex (V-VI). Amyloid deposition (Thal phases) begins in prefrontal and temporal association
  cortices. Biomarker sequence (Jack et al. 2013 A/T/N framework): amyloid positivity precedes tau pathology by decades; neurodegeneration
  (volume loss, hypometabolism) follows tau burden.


  Cholinergic depletion from nucleus basalis of Meynert (NBM) is a cardinal neurochemical deficit, driving memory and attentional
  impairment. This is the basis of cholinesterase inhibitor pharmacotherapy. Network-level disruption is prominent and early:
  the Default Mode Network (DMN) undergoes severe early disruption, with reduced functional connectivity correlating with
  amyloid burden (Buckner et al. 2009). The DMN nodes — posterior cingulate cortex (PCC), precuneus, medial PFC, angular gyrus,
  and hippocampus — are preferential amyloid deposition sites.'
core_symptoms:
- Episodic memory loss — especially recent declarative memory (anterograde amnesia)
- Language impairment — anomia, reduced verbal fluency, word-finding difficulties
- Visuospatial deficits — getting lost in familiar environments, difficulty with spatial tasks
- Executive dysfunction — impaired judgment, planning, abstraction, and problem-solving
- Apraxia — difficulty with learned motor sequences (dressing, using utensils) in moderate AD
- Progressive functional decline in instrumental and basic activities of daily living
non_motor_symptoms:
- 'Behavioral and psychological symptoms of dementia (BPSD): agitation, depression, psychosis, wandering'
- Sleep disturbance — circadian rhythm fragmentation, increased nocturnal waking
- Anxiety (common in early MCI and mild AD — ~40%)
- Apathy (most prevalent neuropsychiatric symptom — ~50% in mild AD)
- Caregiver burden (significant secondary clinical consideration)
brain_regions:
- Hippocampus (bilateral) — CA1 and subiculum
- Entorhinal Cortex (Layer II neurons)
- Posterior Cingulate Cortex (PCC) / Precuneus
- Angular Gyrus (inferior parietal lobule)
- Dorsolateral Prefrontal Cortex (DLPFC)
- Nucleus Basalis of Meynert (NBM)
brain_region_details:
  Hippocampus (bilateral) — CA1 and subiculum: Earliest site of clinically significant neurodegeneration in AD; episodic memory
    consolidation and spatial navigation. MRI volumetry (hippocampal atrophy) is an established AD biomarker. TPS can reach
    hippocampal depth (~40-50mm).
  Entorhinal Cortex (Layer II neurons): Gateway to hippocampus via perforant pathway. First clinically significant Braak Stage
    I-II tau pathology. Disrupts input to memory circuits. Target for TPS neuronavigation.
  Posterior Cingulate Cortex (PCC) / Precuneus: Major DMN hub; early amyloid deposition and FDG-PET hypometabolism are diagnostic
    biomarkers. PCC reduced connectivity correlates with AD severity.
  Angular Gyrus (inferior parietal lobule): Semantic memory and language processing. Vulnerable to amyloid deposition; tDCS
    temporal-parietal montages include this region.
  Dorsolateral Prefrontal Cortex (DLPFC): Executive function impaired in MCI and early AD. Later involvement in Braak staging.
    Potential tDCS anodal target to upregulate executive network residual capacity.
  Nucleus Basalis of Meynert (NBM): Primary source of cholinergic innervation to cortex via basal forebrain. Progressive degeneration
    drives hallmark cholinergic deficit. Basis for cholinesterase inhibitor therapy.
network_profiles:
- network: dmn
  dysfunction: hypo
  severity: severe
  primary: true
  relevance: PRIMARY NETWORK IN AD. The DMN is the earliest and most severely affected large-scale network in AD. Amyloid
    preferentially deposits at DMN nodes (PCC, precuneus, medial PFC, hippocampus). Reduced DMN functional connectivity correlates
    with episodic memory performance and amyloid burden. DMN disruption precedes clinical symptoms by ~10-15 years (Buckner
    et al. 2009).
  evidence_note: 'Buckner RL et al. 2009 — DMN as AD vulnerability network. PMID: 19176803'
- network: cen
  dysfunction: hypo
  severity: moderate-severe
  primary: false
  relevance: Executive function and working memory decline progressively as CEN involvement increases with AD staging. DLPFC
    tDCS targeting aims to upregulate residual CEN capacity, improving executive function and daily functional performance
    in MCI/mild AD.
  evidence_note: Frontal CEN involvement in MCI-to-AD progression; multiple fMRI studies
- network: attention
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: Cholinergic depletion disrupts attentional alerting and orienting networks. Attentional impairment is prominent
    in MCI and early AD, contributing to functional disability beyond memory deficits alone.
  evidence_note: ''
- network: limbic
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: BPSD (agitation, anxiety, depression) reflect limbic and frontal-limbic network disruption and compensatory hyperreactivity.
    Amygdala changes and reduced prefrontal inhibitory control of limbic circuits drive behavioral symptoms.
  evidence_note: BPSD as limbic-frontal dysregulation in AD; prevalence ~80% over disease course
primary_network: dmn
fnon_rationale: In AD/MCI, the primary dysfunctional network is the Default Mode Network (DMN)/memory circuit, driven by progressive
  amyloid and tau pathology in hippocampal-entorhinal and parietal DMN nodes. The FNON framework targets temporal-parietal
  regions (anodal tDCS) to upregulate surviving memory circuit nodes and enhance synaptic plasticity in residual circuits.
  TPS neuronavigation allows deeper targeting of hippocampal/entorhinal circuits beyond the reach of surface tDCS. DLPFC anodal
  tDCS addresses CEN hypofunction for executive function support. taVNS is considered for BPSD subtypes via limbic modulation.
