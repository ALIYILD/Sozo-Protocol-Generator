# Alzheimer's Disease / Mild Cognitive Impairment — SOZO Clinical Knowledge
# Auto-extracted from condition generator. ICD-10: G30

slug: alzheimers
display_name: Alzheimer's Disease / Mild Cognitive Impairment
icd10: G30
aliases:
- AD
