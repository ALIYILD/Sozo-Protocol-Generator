assessments:
- scale_key: pcl5
  timing: baseline
  primary: false
  notes: Primary PTSD self-report measure. 20 items. Score >=33 = probable PTSD. MCID = 5-10 points. Administer at baseline,
    weekly. Developed by Weathers et al. for NCPTSD.
- scale_key: caps5
  timing: baseline
  primary: false
  notes: Gold standard clinician-administered PTSD assessment. Provides diagnosis and severity score. Administer at baseline
    and endpoint. Requires trained clinician.
- scale_key: phq9
  timing: baseline
  primary: false
  notes: Comorbid depression monitoring. Mandatory for PTSD-DEP subtype. C-SSRS mandatory at every session for PTSD patients.
- scale_key: psqi
  timing: baseline
  primary: false
  notes: Sleep disturbance and nightmares are cardinal PTSD symptoms. PSQI score >5 = poor sleep. Monitor closely.
- scale_key: dass21
  timing: baseline
  primary: false
  notes: Comprehensive mood screen covering depression, anxiety, and stress — all highly prevalent in PTSD.
- scale_key: gad7
  timing: baseline
  primary: false
  notes: Anxiety comorbidity monitoring. GAD is among the most common PTSD comorbidities.
