category: psychiatric
version: '1.0'
overview: 'Post-Traumatic Stress Disorder (PTSD) is a trauma- and stressor-related disorder characterized by four symptom
  clusters following exposure to actual or threatened death, serious injury, or sexual violence: (1) intrusion symptoms (flashbacks,
  nightmares); (2) persistent avoidance; (3) negative alterations in cognition and mood; and (4) marked alterations in arousal
  and reactivity (hypervigilance, exaggerated startle). Lifetime prevalence is approximately 7-8% in the general population,
  higher in trauma-exposed populations (combat veterans 15-30%; sexual assault survivors 30-80%).


  PTSD involves a failure of fear memory extinction with amygdala hyperreactivity and impaired vmPFC inhibitory control. Neuromodulation
  targets prefrontal upregulation to restore fear extinction capacity and improve CEN-amygdala regulation. tDCS (right or
  left DLPFC) and taVNS (vagal-cardiac regulation and noradrenergic modulation) represent emerging non-pharmacological adjuncts
  to trauma-focused psychotherapy.


  IMPORTANT: Neuromodulation for PTSD should always be delivered alongside trauma-focused psychological support. Standalone
  neuromodulation without psychological treatment framework is not recommended.'
pathophysiology: 'PTSD pathophysiology centers on fear memory circuit dysfunction. The amygdala — particularly the basolateral
  amygdala (BLA) — becomes hyperreactive and drives conditioned fear responses (hyperarousal, exaggerated startle, flashback
  triggering). Normally, the ventromedial prefrontal cortex (vmPFC) and infralimbic cortex inhibit amygdala activity and facilitate
  fear extinction via the infralimbic-BLA pathway. In PTSD, vmPFC/mPFC volume reduction and reduced activity impairs this
  inhibitory pathway, leaving amygdala activity unchecked.


  Hippocampal dysfunction (reduced volume correlating with trauma severity and PTSD duration) impairs contextual processing
  of fear memories — fearful responses become context-independent (generalization). Elevated noradrenaline (from LC hyperactivity)
  maintains the hyperarousal state, consolidates traumatic memories, and impairs fear extinction consolidation.


  Network-level: SN hyperactivation (amygdala, insula) dominates the intrusion and hyperarousal symptom clusters. DMN is altered
  — excessively activated during rest (rumination on trauma) with abnormal connectivity patterns (Lanius et al. 2010). CEN
  is impaired — prefrontal executive control of fear memories is reduced. Dissociative PTSD subtype shows distinct pattern:
  DMN-medial PFC hyperactivation serves as emotional inhibition/overmodulation.'
core_symptoms:
- Intrusion symptoms — unwanted traumatic memories, flashbacks, nightmares
- Avoidance — of trauma-related thoughts, feelings, people, places, activities
- Negative alterations in cognition and mood — distorted blame, persistent negative emotions, anhedonia, detachment
- Hyperarousal and reactivity — hypervigilance, exaggerated startle, irritability, concentration difficulties, sleep disturbance
non_motor_symptoms:
- Comorbid major depression (50-80% lifetime in PTSD)
- Comorbid anxiety disorders (generalized anxiety, panic)
- Substance use disorders (40-60% in combat PTSD)
- Chronic pain and somatization
- Social and occupational dysfunction
- Sleep disorders (nightmares, insomnia)
brain_regions:
- Amygdala (bilateral) — basolateral amygdala (BLA)
- Ventromedial Prefrontal Cortex (vmPFC) / Infralimbic Cortex
- Hippocampus (bilateral)
- Dorsolateral Prefrontal Cortex (DLPFC)
- Anterior Cingulate Cortex (ACC) — dorsal and rostral
- Anterior Insula
brain_region_details:
  Amygdala (bilateral) — basolateral amygdala (BLA): Hyperreactive in PTSD — drives fear conditioning, intrusions, and hyperarousal.
    Abnormally enhanced fear responses to trauma-related cues. Primary pathophysiological node. Target of indirect modulation
    via vmPFC upregulation.
  Ventromedial Prefrontal Cortex (vmPFC) / Infralimbic Cortex: Reduced volume and activity in PTSD. Normally inhibits amygdala
    and mediates fear extinction. vmPFC hypofunction is the key mechanism of PTSD persistence. Primary target of tDCS upregulation
    (via DLPFC-vmPFC connectivity).
  Hippocampus (bilateral): Volume reduction correlates with PTSD severity. Impaired contextual processing allows fear generalization
    beyond original trauma context. Episodic memory fragmentation contributes to intrusive memory re-experiencing.
  Dorsolateral Prefrontal Cortex (DLPFC): CEN node mediating top-down regulation of amygdala via vmPFC and direct projections.
    DLPFC stimulation upregulates prefrontal control over limbic reactivity. Primary accessible tDCS target.
  Anterior Cingulate Cortex (ACC) — dorsal and rostral: Conflict monitoring and fear extinction consolidation. rACC activity
    predicts PTSD treatment response. dACC hyperactivation drives arousal symptoms.
  Anterior Insula: SN hub driving visceral arousal and interoceptive threat signaling. Hyperactive in PTSD — contributes to
    somatic fear responses and hyperarousal.
network_profiles:
- network: sn
  dysfunction: hyper
  severity: severe
  primary: true
  relevance: PRIMARY NETWORK IN PTSD. Salience Network hyperactivation — amygdala and anterior insula — drives the hallmark
    PTSD symptoms of hypervigilance, threat hyperdetection, emotional hyperreactivity, and intrusive re-experiencing. Amygdala
    hyperactivity is the most replicated PTSD neuroimaging finding. SN hyperactivity drives excessive switching to threat-detection
    mode at the expense of task engagement.
  evidence_note: Amygdala hyperreactivity in PTSD — multiple fMRI studies; Shin et al.
- network: limbic
  dysfunction: hyper
  severity: severe
  primary: false
  relevance: 'Limbic hyperreactivity beyond SN: reduced hippocampal-mediated fear extinction, persistent HPA axis hyperactivation
    maintaining trauma-induced stress response, and high comorbidity of depression (50-80%) and anxiety. vmPFC-amygdala disconnection
    is the core limbic circuit dysfunction in PTSD.'
  evidence_note: vmPFC-amygdala dysconnectivity in PTSD; Rauch et al.
- network: dmn
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: 'Altered DMN function in PTSD: excessive DMN activation during rest drives rumination on traumatic memories and
    self-blame. Lanius et al. (2010) identified distinct DMN connectivity patterns in hyperactivating vs dissociative PTSD
    subtypes. DMN intrusions during task performance parallel ADHD/depression DMN interference pattern.'
  evidence_note: 'Lanius RA et al. (2010) — DMN in PTSD. PMID: 20565312'
- network: cen
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: Impaired CEN — DLPFC hypofunction reduces top-down regulatory control over amygdala and SN hyperactivity. CEN
    hypofunction impairs emotion regulation, working memory for traumatic memories, and extinction of conditioned fear. Primary
    tDCS upregulation target.
  evidence_note: DLPFC hypofunction in PTSD; prefrontal regulatory failure model
- network: attention
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: Attention network biases toward threat stimuli in PTSD. Hypervigilance reflects abnormal salience of threat cues.
    Difficulty sustaining goal-directed attention reflects competition from hyperactive SN threat detection.
  evidence_note: ''
primary_network: sn
fnon_rationale: In PTSD, the primary dysfunctional network is the Salience Network (SN) — hyperactive amygdala drives fear
  conditioning, hyperarousal, and intrusions. The FNON framework targets DLPFC (right or left) anodal tDCS to upregulate CEN
  regulatory control over amygdala reactivity via vmPFC-amygdala projections. taVNS provides vagal-mediated autonomic regulation
  (reducing cardiac hyperarousal), noradrenergic upregulation of prefrontal circuits, and may enhance fear extinction consolidation
  during concurrent exposure-based therapy. CES addresses comorbid insomnia and nightmares.
