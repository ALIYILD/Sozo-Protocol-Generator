protocols:
- protocol_id: C-PTSD-R
  label: Right DLPFC — Fear Regulation Protocol
  modality: tdcs
  target_region: Right Dorsolateral Prefrontal Cortex
  target_abbreviation: R-DLPFC
  target_electrodes: []
  phenotype_slugs:
  - classic
  - combat
  - cptsd
  network_targets:
  - cen
  - limbic
  parameters:
    device: Newronika HDCkit or PlatoScience
    anode: F4 (right DLPFC)
    cathode: Fp1 (left supraorbital) or left shoulder
    intensity: 2.0 mA
    duration: 30 min
    sessions: 10-15 over 3 weeks
    electrode_size: 35 cm2
    note: May be combined with psychotherapy session — tDCS during initial psychotherapy exposure component (discuss with
      therapist).
  rationale: Right DLPFC anodal tDCS upregulates prefrontal control of left amygdala reactivity via vmPFC pathway. Enhances
    CEN regulation of fear circuit. Rationale from interhemispheric model and deep TMS evidence (Isserles et al. 2013 — DLPFC
    deep TMS with trauma cue exposure produced PCL improvement). OFF-LABEL.
  evidence_level: medium
  off_label: true
  session_count: 15
  notes: 'Mandatory: C-SSRS suicidality screening at every session.'
- protocol_id: C-PTSD-L
  label: Left DLPFC — Depression & Mood Protocol
  modality: tdcs
  target_region: Left Dorsolateral Prefrontal Cortex
  target_abbreviation: L-DLPFC
  target_electrodes: []
  phenotype_slugs:
  - ptsd_dep
  - mst
  - cptsd
  network_targets:
  - cen
  - dmn
  - limbic
  parameters:
    device: Newronika HDCkit or PlatoScience
    anode: F3 (left DLPFC)
    cathode: Fp2 (right supraorbital)
    intensity: 2.0 mA
    duration: 30 min
    sessions: 10-15
  rationale: Left DLPFC anodal tDCS for PTSD with comorbid depression — standard MDD protocol applied to PTSD-depression triad.
    Upregulates CEN to suppress DMN rumination and limbic hyperactivity. OFF-LABEL.
  evidence_level: medium
  off_label: true
  session_count: 15
  notes: C-SSRS mandatory at every session. Suicidal ideation monitoring critical.
- protocol_id: TAVNS-PTSD
  label: taVNS — Autonomic & Fear Extinction Adjunct
  modality: tavns
  target_region: Left auricular branch of vagus nerve
  target_abbreviation: taVNS
  target_electrodes: []
  phenotype_slugs:
  - classic
  - combat
  - mst
  - cptsd
  network_targets:
  - sn
  - limbic
  parameters:
    device: NEMOS (tVNS Technologies) or Parasym
    frequency: 25 Hz
    pulse_width: 250 us
    intensity: Below pain threshold (0.5-3.0 mA)
    duration: 30-60 min
    sessions: Daily adjunct during tDCS block
    electrode_placement: Left cymba conchae
  rationale: taVNS modulates amygdala reactivity via NTS projections and noradrenergic circuits. Restores heart rate variability
    — a biomarker of autonomic dysregulation in PTSD. Vagal stimulation during extinction learning may enhance consolidation
    (established in animal models; translational evidence emerging). Investigational in PTSD — limited published data.
  evidence_level: low
  off_label: true
  session_count: 20
  notes: Investigational. Combine with exposure-based psychotherapy sessions for potential extinction enhancement.
- protocol_id: CES-PTSD
  label: CES — Insomnia, Nightmares & Hyperarousal
  modality: ces
  target_region: Bilateral earlobe electrodes
  target_abbreviation: CES
  target_electrodes: []
