    escalation and crisis protocol.'
  severity: high
  modalities: []
  source: PTSD suicide risk epidemiology; clinical governance requirement
- category: precaution
  description: PTSD patients may experience trauma-related emotional responses (flashbacks, distress) during or after sessions.
    Brief post-session grounding check mandatory. Ensure psychological support (therapist or trauma-informed staff) is available
    or contactable during treatment.
  severity: high
  modalities: []
  source: Trauma-informed care principles; risk of spontaneous trauma processing during neuromodulation
- category: precaution
  description: Neuromodulation should be delivered as an adjunct to trauma-focused psychotherapy (EMDR, PE, CPT), not as standalone
    treatment. Neuromodulation without concurrent psychological support is not recommended for PTSD.
  severity: moderate
  modalities: []
  source: Evidence-based PTSD treatment guidelines; neuromodulation as psychotherapy adjunct
- category: monitoring
  description: Monitor for dissociative symptoms during and after sessions. If patient reports feeling detached, unreal, or
    experiences flashback during stimulation, pause session and conduct grounding exercise before continuing.
  severity: moderate
  modalities: []
  source: Dissociative symptom management in trauma neuromodulation
contraindications:
- Active implanted devices (cochlear implants, deep brain stimulators, cardiac pacemakers/defibrillators) unless explicitly
  cleared by device manufacturer
- Metallic implants in the head or neck region within the stimulation field
- Active epilepsy with uncontrolled seizures (relative contraindication — requires neurologist clearance)
- Skull defects or craniectomy at stimulation sites
- Skin lesions, wounds, or dermatological conditions at electrode placement sites
- Active malignancy of the central nervous system
- Pregnancy (precautionary contraindication — insufficient safety data)
- Severe psychiatric crisis requiring immediate hospitalization
- Active suicidal crisis requiring hospitalization
- Active severe dissociation during session — safety risk
inclusion_criteria:
- DSM-5 diagnosis of PTSD (all four criterion clusters met)
- PCL-5 score >=33 at baseline
- Psychologically stable enough to participate — not in acute trauma processing crisis
- Currently engaged with or willing to engage in trauma-focused psychological support
- Age 18-70 years
- Capacity to provide informed consent
- Stable psychiatric medication for >=4 weeks (or medication-naive)
exclusion_criteria:
- Active suicidal ideation with intent or plan — acute psychiatric crisis (refer for acute care)
- Active psychosis or psychotic features
- Acute substance intoxication at time of session
- Active dissociative disorder as primary diagnosis requiring specialist management
- Recent (past 4 weeks) significant traumatic re-exposure without stabilization
responder_criteria:
- '>=10-point reduction in PCL-5 from baseline (meaningful change criterion)'
- '>=50% reduction in PCL-5 or score <33 (remission)'
- PHQ-9 >=50% reduction (PTSD-DEP subtype)
- Clinically meaningful SOZO PRS improvement in trauma symptoms and mood domains
non_responder_pathway: 'For non-responders at Week 4:

  1. Assess trauma processing engagement — inadequate psychotherapy adjunct limits response

  2. Re-evaluate PTSD subtype — cPTSD requires longer treatment and specialist involvement

  3. Add taVNS for hyperarousal-dominant presentation

  4. Add CES for sleep/nightmare component

  5. Switch tDCS montage: right DLPFC for fear features; left DLPFC for depression features

  6. Assess and treat comorbid substance use — significantly impairs PTSD treatment response

  7. Doctor psychiatric review for pharmacotherapy optimization (sertraline, prazosin)

  8. Refer to trauma-focused psychological treatment if not already engaged'
evidence_summary: 'PTSD neuromodulation has emerging evidence. tDCS in PTSD: limited dedicated RCTs — most evidence from pilot
  studies and mechanistic rationale from fear circuit neuroscience. Isserles et al. (2013) deep TMS with trauma exposure showed
  PCL improvement in small controlled trial. taVNS in PTSD: investigational — mechanism-based rationale from vagal-amygdala
  connectivity and HRV restoration studies. CES: FDA-cleared for comorbid symptoms (anxiety, depression, insomnia). Overall:
  PTSD neuromodulation is an emerging adjunctive field; evidence quality is low to medium. Robust RCTs urgently needed.'
evidence_quality: medium
evidence_gaps:
- No adequately powered dedicated tDCS RCT for PTSD with PCL-5 as primary endpoint
- Optimal tDCS montage for PTSD — right DLPFC vs left DLPFC vs bilateral — no comparative data
- taVNS in PTSD — no published RCT; translational evidence from animal models only
- Combined neuromodulation + psychotherapy vs psychotherapy alone — no controlled trial
- Complex PTSD (cPTSD) — no dedicated neuromodulation study
