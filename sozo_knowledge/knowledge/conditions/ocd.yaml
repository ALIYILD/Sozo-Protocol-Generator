contraindications:
- Active implanted devices (cochlear implants, deep brain stimulators, cardiac pacemakers/defibrillators) unless explicitly
  cleared by device manufacturer
- Metallic implants in the head or neck region within the stimulation field
- Active epilepsy with uncontrolled seizures (relative contraindication — requires neurologist clearance)
- Skull defects or craniectomy at stimulation sites
- Skin lesions, wounds, or dermatological conditions at electrode placement sites
- Active malignancy of the central nervous system
- Pregnancy (precautionary contraindication — insufficient safety data)
- Severe psychiatric crisis requiring immediate hospitalization
inclusion_criteria:
- DSM-5 diagnosis of OCD
- Y-BOCS score >=16 (moderate severity)
- Age 18-65 years
- Capacity to provide informed consent
- Stable SSRI/medication regimen for >=8 weeks (or medication-naive)
exclusion_criteria:
- Active psychosis or psychotic features
- Bipolar disorder Type I
- Current active suicidal ideation with plan
- Severe personality disorder as primary diagnosis
- Active severe substance use disorder
responder_criteria:
- '>=35% reduction in Y-BOCS total score from baseline (OCD treatment response criterion)'
- Y-BOCS score <16 (mild range — partial remission)
- Clinically meaningful SOZO PRS improvement in OCD symptoms domain
non_responder_pathway: 'For non-responders at Week 4:

  1. Confirm SSRI adequacy — subtherapeutic SSRI dose limits neuromodulation response

  2. Ensure concurrent ERP/CBT is in place

  3. Switch from DLPFC cathodal to SMA cathodal if motor compulsions predominate

  4. Add taVNS for anxiety/mood comorbidity

  5. Doctor psychiatric review for SSRI dose escalation or augmentation'
evidence_summary: 'OCD neuromodulation has emerging-to-moderate evidence. Mondino et al. (2015) Brain Stimulation: right DLPFC
  cathodal tDCS significantly reduced Y-BOCS vs sham (N=12). Bation et al. (2016) pilot RCT confirmed efficacy. Grassi et
  al. (2018) SMA cathodal augmentation study is positive. All studies are small — larger RCTs urgently needed.'
evidence_quality: medium
evidence_gaps:
- Small sample sizes in all published tDCS OCD trials — no adequately powered multi-site RCT
- Head-to-head comparison of DLPFC cathodal vs SMA cathodal vs combined — no comparative study
- taVNS in OCD — no published RCT
- Long-term OCD symptom maintenance after tDCS — limited follow-up data
