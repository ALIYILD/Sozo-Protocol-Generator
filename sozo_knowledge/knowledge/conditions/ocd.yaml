category: psychiatric
version: '1.0'
overview: 'Obsessive-Compulsive Disorder (OCD) is a psychiatric disorder characterized by recurrent, intrusive obsessions
  (unwanted thoughts, urges, or images causing marked distress) and/or compulsions (repetitive behaviors or mental acts performed
  to reduce obsession-related anxiety). Lifetime prevalence is approximately 2-3%. OCD is classified among the most disabling
  psychiatric conditions (WHO top 10 disabling conditions).


  OCD neurobiological model: a hyperactive cortico-striato-thalamo-cortical (CSTC) loop drives compulsive behavior. The orbitofrontal
  cortex (OFC), anterior cingulate cortex (ACC), and caudate nucleus are hyperactive, producing excessive error signaling
  and ''not done'' feelings that drive repetitive checking and rituals. 40-60% of OCD patients fail to adequately respond
  to first-line treatments (SSRIs + CBT with ERP).


  Neuromodulation targets: (1) right DLPFC cathodal tDCS to inhibit the hyperactive cortico-striatal loop; (2) supplementary
  motor area (SMA) cathodal tDCS to reduce motor compulsion generation; (3) taVNS as adjunct for OCD with anxiety/mood comorbidity.'
pathophysiology: 'OCD pathophysiology centers on hyperactivity of the cortico-striato-thalamo-cortical (CSTC) loop. Key nodes:
  orbitofrontal cortex (OFC, responsible for error signaling and excessive ''checking'' drive), anterior cingulate cortex
  (ACC, conflict monitoring and ''not done'' signal generation), caudate nucleus (habit formation and compulsive behavior
  entrenchment), and mediodorsal thalamus (gating and loop amplification).


  Three parallel CSTC circuit types are implicated: (1) the ''direct pathway'' is hyperactive, driving excessive thalamocortical
  activation; (2) the ''indirect pathway'' is hypofunctional in OCD, failing to provide normal brake mechanisms; (3) both
  produce net excessive loop activity. Serotonin modulates CSTC tone — explaining SSRI efficacy.


  Neuroimaging: hyperactivation of OFC-caudate during symptom provocation is the most replicated finding (Rotge et al. 2008
  meta-analysis). SMA hyperactivation contributes to motor compulsions. Successful treatment (CBT or SSRI) normalizes OFC-caudate
  hyperactivation. tDCS mechanism: cathodal inhibition of DLPFC or SMA may modulate prefrontal-striatal circuit excitability
  and reduce OFC hyperactivity via top-down connectivity.'
core_symptoms:
- Obsessions — recurrent, persistent, intrusive thoughts, urges, or images
- Compulsions — repetitive behaviors (checking, washing, ordering, counting) or mental acts performed to neutralize obsessions
- Marked anxiety and distress from obsessions
- Significant time consumption (>1 hour/day) or marked functional impairment
- Insight variability — good, fair, poor, or absent insight
non_motor_symptoms:
- Comorbid depression (50-60% lifetime)
- Comorbid anxiety disorders (generalized anxiety, panic, social anxiety)
- Tic disorders (Tourette's co-occurrence ~30% of childhood OCD)
- Body dysmorphic disorder (OCD spectrum)
- Hoarding disorder (OCD spectrum)
- Sleep disturbance
brain_regions:
- Orbitofrontal Cortex (OFC) — lateral and medial
- Anterior Cingulate Cortex (ACC) / Subgenual ACC
- Caudate Nucleus (bilateral)
- Supplementary Motor Area (SMA) / pre-SMA
- Mediodorsal Thalamus
- Dorsolateral Prefrontal Cortex (DLPFC)
brain_region_details:
  Orbitofrontal Cortex (OFC) — lateral and medial: Hyperactive in OCD — generates excessive 'not done' error signals and drives
    repetitive checking compulsions. OFC-caudate hyperactivation is the most replicated neuroimaging finding.
  Anterior Cingulate Cortex (ACC) / Subgenual ACC: Conflict monitoring and error amplification. Hyperactive dACC drives excessive
    awareness of potential harm, fueling obsession-compulsion cycle.
  Caudate Nucleus (bilateral): Habit formation and compulsive behavior entrenchment in OCD. Caudate hyperactivation in OFC-striatal
    loop. Normalizes with successful treatment.
  Supplementary Motor Area (SMA) / pre-SMA: Motor compulsion generation. SMA hyperactivation in OCD with predominant motor
    compulsions (washing, checking, ordering). Cathodal tDCS target for SMA inhibition.
  Mediodorsal Thalamus: Gating node in CSTC loop. Hyperactivity amplifies OFC-ACC-caudate circuit activity in OCD.
  Dorsolateral Prefrontal Cortex (DLPFC): Top-down regulatory control over OFC-caudate loop. Right DLPFC cathodal tDCS may
    modulate DLPFC-OFC balance to reduce compulsive drive.
network_profiles:
- network: cen
  dysfunction: hyper
  severity: severe
  primary: true
  relevance: PRIMARY NETWORK IN OCD. The CEN is abnormally hyperactive in OCD — specifically the orbitofrontal-striatal loop
    produces excessive error signaling and compulsive behavior. Unlike most conditions where CEN is hypoactive, OCD shows
    an overactive but dysfunctional prefrontal-striatal circuit generating excessive top-down compulsive drive. tDCS targets
    cathodal inhibition to reduce CSTC hyperactivity.
  evidence_note: OFC-caudate hyperactivation meta-analysis; Rotge et al. 2008; CSTC loop model
- network: sn
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: SN hyperactivation (ACC, anterior insula) drives the excessive 'harm threat' salience that underlies OCD obsessions.
    Aberrant salience attribution to neutral stimuli triggers obsessive cycles. Insula hyperreactivity contributes to contamination
    obsessions and disgust response.
  evidence_note: ''
- network: limbic
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: Limbic hyperactivity — amygdala and hippocampus — amplifies the anxiety and distress associated with obsessions.
    High comorbidity of depression (50-60%) and anxiety reflects limbic network involvement in OCD.
  evidence_note: OCD-anxiety-depression comorbidity; shared limbic mechanisms
- network: dmn
  dysfunction: hyper
  severity: mild-moderate
  primary: false
  relevance: DMN hyperactivation in OCD contributes to excessive self-referential intrusive thoughts, ego-dystonic obsessions,
    and ruminative cognitive patterns. DMN-CEN connectivity abnormalities are documented in OCD resting-state fMRI.
  evidence_note: ''
primary_network: cen
fnon_rationale: 'In OCD, the CSTC loop is hyperactive — unlike most conditions where the target network is hypoactive, OCD
  requires INHIBITORY modulation of key nodes. The FNON framework deploys: (1) cathodal right DLPFC tDCS to suppress hyperactive
  prefrontal-striatal drive; (2) cathodal SMA tDCS to directly inhibit motor compulsion generation; (3) taVNS as adjunct for
  OCD with significant anxiety and mood comorbidity via vagal-limbic modulation.'
