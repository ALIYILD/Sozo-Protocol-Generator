assessments:
- scale_key: ybocs
  timing: baseline
  primary: false
  notes: Gold standard OCD severity scale. Clinician-administered. Score /40. Score 0-7=subclinical; 8-15=mild; 16-23=moderate;
    24-31=severe. MCID = 35% reduction.
- scale_key: ocir
  timing: baseline
  primary: false
  notes: Self-report OCD measure. 18 items, 0-4 scale. Score >=21 = probable OCD. Useful for symptom dimension profiling across
    the five OCD dimensions.
- scale_key: phq9
  timing: baseline
  primary: false
  notes: Depression comorbidity monitoring. Mandatory — 50-60% OCD-depression comorbidity.
- scale_key: gad7
  timing: baseline
  primary: false
  notes: Anxiety comorbidity monitoring. OCD with prominent anxiety features may benefit from taVNS adjunct.
