category: mixed
version: '1.0'
overview: 'Long COVID (Post-Acute Sequelae SARS-CoV-2, PASC) describes a range of persistent symptoms lasting beyond 4-12
  weeks after acute SARS-CoV-2 infection, not explained by an alternative diagnosis. Estimated prevalence is 10-30% of COVID-19
  survivors. The most prevalent and disabling symptoms include: brain fog/cognitive impairment, fatigue, dyspnea, post-exertional
  malaise (PEM), sleep disturbance, and dysautonomia.


  Neurological manifestations affect 30-80% of long COVID patients. Taquet et al. (2021, Lancet Psychiatry) documented 6-month
  neurological and psychiatric sequelae in 236,379 COVID-19 survivors. Neuroimaging studies (FDG-PET, MRI) reveal widespread
  metabolic hypometabolism in frontal-parietal regions consistent with CEN hypofunction.


  IMPORTANT: Long COVID is a new condition (2020-present) with rapidly evolving evidence. Neuromodulation evidence is limited
  to case series and small pilot studies. Clinical approach should be cautious, individualized, and involve treating physician.'
pathophysiology: 'Long COVID pathophysiology is multifactorial and incompletely understood. Proposed mechanisms include:


  (1) Persistent viral reservoir/antigen: SARS-CoV-2 RNA detected in GI tract, lymph nodes, and potentially CNS months after
  acute infection — driving ongoing immune activation.


  (2) Neuroinflammation: microglial activation and neuroinflammatory mediators (IL-6, TNF-alpha, IL-1beta) documented in CNS
  via CSF and PET studies. Similar pattern to post-infectious encephalitis.


  (3) Autonomic dysregulation (dysautonomia): autonomic nervous system dysfunction produces POTS (postural orthostatic tachycardia),
  orthostatic intolerance, and impaired HRV. Small fiber neuropathy documented in subset.


  (4) Vascular endothelial dysfunction: persistent micro-thrombi and endothelial damage impair cerebral microvascular perfusion,
  contributing to cognitive symptoms.


  (5) Mitochondrial dysfunction and bioenergetic failure: impaired cellular energy production drives the disproportionate
  post-exertional fatigue and exercise intolerance.


  (6) Immune dysregulation: T-cell exhaustion, NK cell dysfunction, B-cell and antibody abnormalities, and autoantibody formation
  (ACE2, beta-adrenergic receptor antibodies) documented in long COVID.'
core_symptoms:
- Brain fog — cognitive slowing, memory difficulties, concentration impairment
- Post-exertional malaise (PEM) — symptom worsening after physical or cognitive exertion
- Fatigue — disproportionate, not relieved by rest
- Dyspnea — breathlessness at rest or on exertion
- Sleep disturbance — insomnia, hypersomnia, non-restorative sleep
- Headache
- Sensory changes — tinnitus, parosmia, taste disturbance
non_motor_symptoms:
- Depression and anxiety (highly prevalent)
- PTSD-like symptoms from acute COVID hospitalization (ICU patients)
- Dysautonomia / POTS — orthostatic intolerance, palpitations, sweating
- Chest pain and cardiac symptoms
- GI symptoms (nausea, diarrhea, dyspepsia)
- Pain hypersensitivity and fibromyalgia-like features
brain_regions:
- Dorsolateral Prefrontal Cortex (DLPFC)
- Anterior Cingulate Cortex (ACC)
- Thalamus
- Hippocampus
- Olfactory Bulb
- Brainstem
brain_region_details:
  Dorsolateral Prefrontal Cortex (DLPFC): FDG-PET and fMRI hypometabolism in frontal regions correlates with brain fog and
    cognitive impairment. Primary tDCS target for long COVID cognitive rehabilitation.
  Anterior Cingulate Cortex (ACC): ACC hypometabolism documented in long COVID imaging. Contributes to fatigue, motivational
    impairment, and attention dysfunction.
  Thalamus: Thalamic hypometabolism documented in long COVID FDG-PET. Thalamo-cortical connectivity disruption drives fatigue
    and cognitive impairment.
  Hippocampus: Potential direct SARS-CoV-2 neurotropism via ACE2 receptors in hippocampus. Contributes to memory impairment.
    Stress-induced hippocampal volume loss from prolonged illness.
  Olfactory Bulb: Direct SARS-CoV-2 infection and olfactory epithelium degeneration — explains parosmia/anosmia. Potential
    central spread via olfactory pathway.
  Brainstem: Brainstem involvement in SARS-CoV-2 — autonomic dysregulation, autonomic reflex abnormalities, and cardiorespiratory
    symptoms may reflect brainstem pathology.
network_profiles:
- network: dmn
  dysfunction: hyper
  severity: severe
  primary: true
  relevance: PRIMARY NETWORK IN LONG COVID BRAIN FOG. DMN hyperactivation and failure to suppress during cognitive demands
    drives brain fog, mental fatigue, and intrusive thoughts. Abnormal DMN-CEN anticorrelation parallels ADHD, TBI, and MDD
    patterns. DMN hyperactivation correlates with cognitive symptom severity.
  evidence_note: Long COVID neuroimaging studies; resting-state fMRI in PASC
- network: cen
  dysfunction: hypo
  severity: severe
  primary: false
  relevance: CEN hypofunction correlates with brain fog severity. FDG-PET hypometabolism in frontal-parietal regions — particularly
    DLPFC — is among the most consistent neuroimaging findings in long COVID. DLPFC anodal tDCS is the primary cognitive rehabilitation
    target.
  evidence_note: Frontal-parietal hypometabolism in long COVID PET studies
- network: sn
  dysfunction: hyper
  severity: moderate-severe
  primary: false
  relevance: SN hyperactivation drives dysautonomia, interoceptive hypersensitivity, and fatigue in long COVID. Anterior insula
    hyperactivation may contribute to bodily symptom amplification. taVNS targets vagal-SN modulation for autonomic regulation.
  evidence_note: Autonomic dysregulation (dysautonomia/POTS) prevalent in long COVID
- network: attention
  dysfunction: hypo
  severity: severe
  primary: false
  relevance: Sustained and divided attention deficits are core brain fog complaints. Attention network hypofunction parallels
    TBI and ADHD patterns. Correlates with occupational disability and return-to-work barriers.
  evidence_note: Neuropsychological testing in long COVID; attention deficits documented
- network: limbic
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: High prevalence of depression, anxiety, and PTSD-like symptoms in long COVID. Neuroinflammatory mediators directly
    modulate limbic circuits. Illness-related psychological distress amplifies limbic hyperactivity. HPA axis dysregulation.
  evidence_note: Psychiatric sequelae of long COVID; Taquet et al. 2021
primary_network: dmn
fnon_rationale: In long COVID, the primary neurological mechanism is brain fog — driven by CEN hypofunction (frontal-parietal
  hypometabolism) and DMN hyperactivation, paralleling TBI and ADHD network patterns. The FNON framework targets left DLPFC
  anodal tDCS to upregulate CEN and restore CEN-DMN anticorrelation. taVNS addresses dysautonomia and autonomic hyperarousal
  via vagal-NTS-mediated autonomic regulation. CES addresses comorbid sleep disturbance and mood symptoms.
