contraindications:
- Active implanted devices (cochlear implants, deep brain stimulators, cardiac pacemakers/defibrillators) unless explicitly
  cleared by device manufacturer
- Metallic implants in the head or neck region within the stimulation field
- Active epilepsy with uncontrolled seizures (relative contraindication — requires neurologist clearance)
- Skull defects or craniectomy at stimulation sites
- Skin lesions, wounds, or dermatological conditions at electrode placement sites
- Active malignancy of the central nervous system
- Pregnancy (precautionary contraindication — insufficient safety data)
- Severe psychiatric crisis requiring immediate hospitalization
inclusion_criteria:
- Confirmed or probable COVID-19 (PCR, antigen, or clinical diagnosis) with persistent symptoms >12 weeks
- Symptoms not explained by alternative diagnosis
- Age 18-70 years
- Capacity to provide informed consent
- Medically stable — no active acute COVID-19 or severe organ dysfunction
- Treating physician aware of and supportive of neuromodulation trial
exclusion_criteria:
- Active acute COVID-19 infection
- Severe cardiorespiratory long COVID complications (active heart failure, severe pulmonary fibrosis)
- Active thrombotic complications from COVID-19
- Severe myalgic encephalomyelitis/CFS (bedbound) — insufficient capacity for sessions
- Active psychiatric crisis
responder_criteria:
- '>=30% reduction in CFQ-11 total score from baseline'
- MoCA score improvement or stabilization
- Clinically meaningful SOZO PRS improvement (>=3 points) in primary symptom domains
- PHQ-9 >=50% reduction (mental health subtype)
non_responder_pathway: 'For non-responders at Week 4:

  1. Review PEM management — reduce session intensity if post-exertional worsening documented

  2. Optimize sleep with CES before escalating tDCS

  3. Add taVNS for dysautonomia and fatigue components

  4. Treating physician review — assess for treatable medical contributors

  5. Extend treatment block cautiously — avoid triggering PEM cycle

  6. Consider ME/CFS specialist referral if PEM-dominant presentation'
evidence_summary: 'Long COVID neuromodulation has very limited evidence — this is an emerging field. Taquet et al. (2021)
  documented neurological sequelae at scale. Neuroimaging studies confirm frontal hypometabolism. tDCS for long COVID cognitive
  symptoms: emerging case series and pilot studies only — no published RCT as of 2024. taVNS for dysautonomia: investigational
  — rationale from autonomic medicine literature. CES: best-evidenced component via FDA clearance for comorbid symptoms.'
evidence_quality: low
evidence_gaps:
- No published RCT of tDCS or any neuromodulation specifically for long COVID as of early 2024
- Most evidence from case series — selection bias and absence of control conditions
- Long-term outcomes and safety in long COVID population — entirely unknown
- Optimal dose and frequency in PEM-prone patients — risk of symptom exacerbation
- taVNS for long COVID dysautonomia/POTS — no published controlled data
