protocols:
- protocol_id: C-TIN-BIFRONTAL
  label: Bifrontal-Temporal — Dual Target Tinnitus
  modality: tdcs
  target_region: Left Temporal + Left DLPFC
  target_abbreviation: T3+F3
  target_electrodes: []
  phenotype_slugs:
  - pure_tone
  - tinnitus_anx
  - hl_tinnitus
  network_targets:
  - attention
  - sn
  parameters:
    device: Newronika HDCkit or PlatoScience
    cathode: T3 (left temporal — auditory cortex inhibition)
    anode: F3 (left DLPFC) or Fp1
    intensity: 1.5-2.0 mA
    duration: 20-30 min
    sessions: 10-15 over 3 weeks
    note: 'Dual-target montage: cathodal T3 (auditory) + anodal F3 (frontal). Vanneste & De Ridder montage.'
  rationale: Combined temporal cathodal (auditory cortex inhibition) + DLPFC anodal (top-down suppression) addresses both
    the auditory source and the attention/distress amplifiers of tinnitus. Vanneste & De Ridder (2011) demonstrated this dual-target
    approach reduces tinnitus loudness and distress. Shekhawat et al. (2013) systematic review supports this montage. OFF-LABEL.
  evidence_level: medium
  off_label: true
  session_count: 15
  notes: ''
- protocol_id: C-TIN-AC
  label: Auditory Cortex Cathodal — Tinnitus Suppression
  modality: tdcs
  target_region: Left Temporal Cortex (Auditory Cortex)
  target_abbreviation: T3/AC
  target_electrodes: []
  phenotype_slugs:
  - pure_tone
  - hl_tinnitus
  - somatic
  network_targets:
  - attention
  - sn
  parameters:
    device: Newronika HDCkit or PlatoScience
    cathode: T3 (left temporal cortex)
    anode: Right shoulder or Fp2
    intensity: 1.5-2.0 mA
    duration: 20 min
    sessions: 10-15
  rationale: 'Temporal cortex cathodal tDCS reduces auditory cortex hyperexcitability. Vanneste & De Ridder (2011): temporal
    cathodal tDCS reduced tinnitus loudness in controlled study. Lehtimaki et al. (2013) confirmed effect. Results inconsistent
    across studies — electrode placement precision critical. OFF-LABEL.'
  evidence_level: medium
  off_label: true
  session_count: 15
  notes: ''
- protocol_id: TAVNS-TIN
  label: taVNS — Auditory & Anxiety Adjunct
  modality: tavns
