contraindications:
- Active implanted devices (cochlear implants, deep brain stimulators, cardiac pacemakers/defibrillators) unless explicitly
  cleared by device manufacturer
- Metallic implants in the head or neck region within the stimulation field
- Active epilepsy with uncontrolled seizures (relative contraindication — requires neurologist clearance)
- Skull defects or craniectomy at stimulation sites
- Skin lesions, wounds, or dermatological conditions at electrode placement sites
- Active malignancy of the central nervous system
- Pregnancy (precautionary contraindication — insufficient safety data)
- Severe psychiatric crisis requiring immediate hospitalization
inclusion_criteria:
- Chronic tinnitus — persistent for >3 months
- THI score >=18 (at least mild disability)
- Age 18-75 years
- Capacity to provide informed consent
- Medically stable — no acute otological emergency
exclusion_criteria:
- Pulsatile tinnitus with suspected vascular etiology — requires urgent vascular investigation first
- Tinnitus from active acute otitis media or Meniere's disease in acute phase
- Unilateral sudden tinnitus with hearing loss (<4 weeks) — requires urgent audiological assessment
- Active cochlear implant or hearing implant on stimulation side
responder_criteria:
- '>=20-point improvement in THI score (minimal clinically important difference for tinnitus)'
- '>=30% reduction in VAS tinnitus distress from baseline'
- Clinically meaningful SOZO PRS improvement in tinnitus and mood domains
non_responder_pathway: 'For non-responders at Week 4:

  1. Reassess electrode placement — T3 accuracy is critical; skull anatomy variation affects targeting

  2. Switch from unilateral temporal to dual-target (bifrontal-temporal) protocol

  3. Add CES for anxiety/insomnia component if anxiety score elevated

  4. Audiological review — hearing aid may reduce tinnitus by restoring peripheral input

  5. Cognitive-behavioral therapy for tinnitus (CBT-T) referral — best-evidenced non-pharmacological approach'
evidence_summary: 'Tinnitus tDCS has moderate but inconsistent evidence. Vanneste & De Ridder (2011) demonstrated temporal
  cathodal + frontal anodal tDCS reduced tinnitus loudness. Shekhawat et al. (2013) systematic review confirmed evidence for
  tDCS in tinnitus but noted inconsistency in electrode placement findings. Lehtimaki et al. (2013) confirmed effect of temporal
  tDCS. Key challenge: inconsistent electrode placement findings across studies — standardized protocols needed. taVNS: investigational.
  CES: FDA-cleared for comorbid symptoms.'
evidence_quality: medium
evidence_gaps:
- Inconsistent electrode placement findings — optimal montage not definitively established
- Need for standardized tinnitus tDCS protocols with pitch-matching-guided electrode placement
- Long-term tinnitus relief after treatment block — limited follow-up data
- taVNS for tinnitus — limited published data
- Combined tDCS + psychoacoustic training (notched music therapy) — no controlled trial
