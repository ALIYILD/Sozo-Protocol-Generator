# Chronic Tinnitus — SOZO Clinical Knowledge
# Auto-extracted from condition generator. ICD-10: H93.1

slug: tinnitus
display_name: Chronic Tinnitus
icd10: H93.1
aliases:
- tinnitus
- chronic tinnitus
- ringing in ears
- tinnitus aurium
category: neurological
version: '1.0'
overview: 'Chronic tinnitus is the persistent perception of sound in the absence of an external acoustic stimulus, lasting
  more than 3 months. Prevalence is 10-15% in adults, with severe/disabling tinnitus affecting 1-3%. Tinnitus generates significant
  psychological and functional burden: 25-45% of patients report anxiety, depression, sleep disturbance, and concentration
  difficulties.


  Tinnitus neuroscience model: aberrant synchronous neural activity in auditory cortex and associated networks generates the
  phantom sound perception. Tinnitus involves maladaptive neuroplasticity — cortical reorganization following peripheral hearing
  loss or cochlear damage leads to central auditory hyperactivity. Non-auditory networks (attention, salience, limbic) modulate
  tinnitus distress and perception.


  tDCS targeting auditory cortex (cathodal inhibition) and frontal regions (anodal) represents an emerging non-pharmacological
  approach. taVNS offers potential for vagal-auditory cortex modulation. Evidence is moderate but inconsistent — electrode
  placement and protocol standardization remain challenges.'
pathophysiology: 'Tinnitus pathophysiology involves multiple levels of the auditory pathway and central nervous system:


  (1) Peripheral trigger: cochlear hair cell damage (noise exposure, ototoxicity, aging) disrupts frequency-specific auditory
  input, producing ''deafferentation'' in corresponding tonotopic auditory cortex regions.


  (2) Central gain increase: loss of peripheral input triggers central gain upregulation — spontaneous auditory nerve firing
  and synchronous bursting in auditory cortex ''fills in'' the frequency gap, generating phantom sound perception (analogous
  to phantom limb pain).


  (3) Cross-modal plasticity: adjacent cortical regions expand into deafferented auditory cortex, reinforcing aberrant activity
  and entraining tinnitus frequency representation.


  (4) Non-auditory network involvement: tinnitus distress correlates with attention network hyperactivation (enhancing awareness
  of tinnitus), salience network hyperactivation (assigning threat/distress value), and limbic network involvement (anxiety,
  depression, rumination on tinnitus).


  (5) Thalamocortical dysrhythmia: De Ridder et al. model — abnormal theta-gamma coupling in thalamo-auditory cortex circuit
  generates oscillatory tinnitus percept.'
core_symptoms:
- Persistent phantom sound perception — ringing, buzzing, hissing, whistling, or pulsatile
- Tinnitus loudness variability — influenced by quiet environments, fatigue, stress
- Audiological symptoms — associated hearing loss (most cases), hyperacusis
- Sleep disturbance — tinnitus-related insomnia
- Concentration difficulties — tinnitus competing for attentional resources
non_motor_symptoms:
- Anxiety (25-45% comorbid in tinnitus)
- Depression (25-40% comorbid)
- Reduced quality of life and social participation
- Phonophobia (sound sensitivity — associated with hyperacusis)
brain_regions:
- Primary Auditory Cortex (A1) — Heschl's Gyrus
- Secondary Auditory Cortex (Wernicke's area, superior temporal gyrus)
- Dorsolateral Prefrontal Cortex (DLPFC)
- Anterior Cingulate Cortex (ACC)
- Thalamus (medial geniculate nucleus)
- Anterior Insula
brain_region_details:
  Primary Auditory Cortex (A1) — Heschl's Gyrus: Site of maladaptive plasticity in tinnitus — cortical reorganization following
    deafferentation generates hyperactive spontaneous activity perceived as tinnitus. Primary cathodal tDCS target to reduce
    auditory cortex hyperexcitability.
  Secondary Auditory Cortex (Wernicke's area, superior temporal gyrus): Involved in tinnitus persistence and perception complexity.
    Cathodal tDCS over left temporal cortex (T3) targets this region.
  Dorsolateral Prefrontal Cortex (DLPFC): Cognitive and emotional gating of tinnitus perception. DLPFC modulates top-down
    suppression of tinnitus awareness. Anodal tDCS upregulates attention control over tinnitus.
  Anterior Cingulate Cortex (ACC): Affective-emotional processing of tinnitus distress. ACC hyperactivation drives distress
    response to tinnitus. Correlated with tinnitus-related anxiety.
  Thalamus (medial geniculate nucleus): Central auditory relay; thalamocortical dysrhythmia model of tinnitus (De Ridder).
    Abnormal gating allows persistent auditory cortex activation.
  Anterior Insula: SN hub; evaluates salience and threat value of tinnitus percept. Insula hyperactivation drives tinnitus-related
    distress and hypervigilance.
network_profiles:
- network: attention
  dysfunction: hyper
  severity: severe
  primary: true
  relevance: PRIMARY NETWORK IN TINNITUS. Auditory attention network hyperactivation maintains awareness of and attention
    to tinnitus signal. Dorsal attention network over-engagement amplifies tinnitus perception by directing sustained attentional
    resources toward the phantom sound. Breaking the attention-tinnitus cycle is a key therapeutic target.
  evidence_note: Attention network model of tinnitus; Rauschecker et al. 2010
- network: sn
  dysfunction: hyper
  severity: moderate-severe
  primary: false
  relevance: SN hyperactivation assigns threat and distress salience to tinnitus percept, converting a benign phantom sound
    into a severe disability. Anterior insula and ACC hyperactivation drive the tinnitus distress syndrome. SN hyperactivity
    predicts tinnitus-related anxiety and depression.
  evidence_note: SN model of tinnitus distress; De Ridder et al.
- network: dmn
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: 'DMN involvement in tinnitus: ruminative processing of tinnitus, negative self-referential thoughts about tinnitus
    persistence, and catastrophizing. DMN hyperactivation contributes to tinnitus-related anxiety and depression.'
  evidence_note: ''
- network: limbic
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: Limbic hyperactivation drives tinnitus-related anxiety (25-45%), depression (25-40%), and emotional distress.
    Amygdala hyperreactivity amplifies the emotional component of tinnitus perception.
  evidence_note: ''
primary_network: attention
fnon_rationale: 'In tinnitus, the primary mechanism is auditory attention network hyperactivation — excess attention directed
  to the tinnitus phantom sound. The FNON framework deploys: (1) left temporal cortex cathodal tDCS to reduce auditory cortex
  hyperexcitability; (2) DLPFC anodal tDCS to upregulate top-down attentional suppression of tinnitus; (3) taVNS for vagal-auditory
  modulation and limbic comorbidities. Combined temporal-frontal montages (cathodal temporal + anodal frontal) represent the
  most rational dual-target approach.'
