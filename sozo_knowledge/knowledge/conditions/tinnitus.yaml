    classification
  severity: moderate
  modalities: []
  source: ''
- category: monitoring
  description: Monitor tinnitus loudness and distress at every session using VAS. Temporary tinnitus exacerbation can occur
    in initial sessions. If persistent worsening after 3 sessions, reduce intensity to 1.5 mA or modify electrode position.
  severity: moderate
  modalities: []
  source: Tinnitus variability with neuromodulation; clinical monitoring requirement
