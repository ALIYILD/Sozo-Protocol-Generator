# Generalized Anxiety Disorder — SOZO Clinical Knowledge
# Auto-extracted from condition generator. ICD-10: F41.1

slug: anxiety
display_name: Generalized Anxiety Disorder
icd10: F41.1
aliases:
- GAD
- generalized anxiety
- anxiety disorder
- chronic worry
category: psychiatric
version: '1.0'
overview: Generalized Anxiety Disorder (GAD) is characterized by excessive, uncontrollable worry about multiple domains of
  life, accompanied by somatic symptoms including muscle tension, fatigue, sleep disturbance, and cognitive impairment. GAD
  has a lifetime prevalence of approximately 5-6% and is one of the most common anxiety disorders in primary care. It is frequently
  comorbid with MDD (50-60% comorbidity), pain syndromes, and other anxiety disorders. Neurobiologically, GAD involves hyperactivation
  of the salience network (insula and dACC), amygdala hyperreactivity, and reduced prefrontal top-down regulation of anxiogenic
  circuits.
pathophysiology: 'GAD pathophysiology centers on amygdala hyperreactivity and impaired prefrontal inhibitory control. The
  right DLPFC plays a key role in emotional regulation through top-down inhibition of the amygdala. In GAD, the right DLPFC
  is relatively hyperactive compared to left — a pattern opposite to MDD — though prefrontal regulatory capacity overall is
  reduced.


  The salience network (SN), comprising anterior insula and dorsal anterior cingulate cortex (dACC), is persistently hyperactive
  in GAD, driving excessive threat detection and somatic amplification. Reduced GABAergic tone, particularly in prefrontal
  regions and basal ganglia, contributes to the characteristic anxiety phenotype. Serotonergic and noradrenergic dysregulation
  amplifies threat responses. HPA axis hyperactivity and elevated cortisol contribute to sleep disturbance and cognitive complaints.'
core_symptoms:
- Excessive anxiety and worry (more days than not, >=6 months)
- Difficulty controlling the worry
- Restlessness or feeling keyed up / on edge
- Being easily fatigued
- Difficulty concentrating or mind going blank
- Irritability
- Muscle tension
- Sleep disturbance (difficulty falling/staying asleep, unsatisfying sleep)
non_motor_symptoms:
- Somatic complaints (headache, GI symptoms, trembling)
- Anticipatory avoidance behaviour
- Panic attacks (in comorbid panic disorder)
- Social impairment and work performance decline
brain_regions:
- Right Dorsolateral Prefrontal Cortex (R-DLPFC)
- Left Dorsolateral Prefrontal Cortex (L-DLPFC)
- Anterior Cingulate Cortex — dorsal (dACC)
- Amygdala (bilateral, right-dominant)
- Anterior Insula (bilateral)
- Hippocampus
- Orbitofrontal Cortex (OFC)
brain_region_details:
  Right Dorsolateral Prefrontal Cortex (R-DLPFC): Relatively hyperactive in anxiety; cathodal inhibition is the primary tDCS
    target to reduce right hemispheric anxiogenic processing
  Left Dorsolateral Prefrontal Cortex (L-DLPFC): Anodal activation enhances cognitive control and top-down amygdala regulation;
    mirror target to right cathodal
  Anterior Cingulate Cortex — dorsal (dACC): Key SN node; hyperactive in GAD; drives threat monitoring and interoceptive amplification
  Amygdala (bilateral, right-dominant): Hyperreactive to threat cues; reduced top-down prefrontal inhibition in GAD; central
    node of the fear circuit
  Anterior Insula (bilateral): Mediates interoception and somatic anxiety; hyperactive in GAD; contributes to bodily symptoms
  Hippocampus: Contextual fear learning and extinction; impaired extinction consolidation in anxiety disorders
  Orbitofrontal Cortex (OFC): Value-based decision making; dysfunction contributes to excessive negative outcome appraisal
network_profiles:
- network: sn
  dysfunction: hyper
  severity: severe
  primary: true
  relevance: PRIMARY NETWORK IN GAD. SN hyperactivation drives persistent threat detection, excessive salience attribution
    to benign stimuli, and somatic amplification. Anterior insula and dACC are persistently overactive.
  evidence_note: Consistent finding in GAD neuroimaging; Etkin and Wager 2007
- network: cen
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: Reduced prefrontal cognitive control impairs worry regulation and emotional regulation capacity. DLPFC hypofunction
    prevents effective top-down suppression of amygdala and SN hyperactivity.
  evidence_note: Prefrontal-amygdala connectivity studies in GAD
- network: dmn
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: DMN hyperactivation contributes to perseverative worry and negative future-oriented thinking. Excessive self-referential
    processing amplifies anxiety symptoms.
  evidence_note: ''
- network: limbic
  dysfunction: hyper
  severity: severe
  primary: false
  relevance: Amygdala hyperreactivity and hippocampal dysfunction underlie emotional dysregulation, fear generalization, and
    impaired fear extinction. Reduced GABAergic prefrontal-limbic tone.
  evidence_note: Amygdala hyperreactivity as core biomarker in anxiety disorders
primary_network: sn
fnon_rationale: In GAD, the primary dysfunctional network is the Salience Network (SN), with concurrent limbic hyperactivity.
  The FNON approach targets right DLPFC with cathodal tDCS to reduce right hemispheric anxiogenic processing, while left DLPFC
  anodal stimulation enhances cognitive control. CES and taVNS provide adjunct limbic/vagal regulation. Unlike MDD, GAD may
  benefit more from right-cathodal than purely left-anodal approaches.
