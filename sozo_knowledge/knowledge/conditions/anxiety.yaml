contraindications:
- Active implanted devices (cochlear implants, deep brain stimulators, cardiac pacemakers/defibrillators) unless explicitly
  cleared by device manufacturer
- Metallic implants in the head or neck region within the stimulation field
- Active epilepsy with uncontrolled seizures (relative contraindication — requires neurologist clearance)
- Skull defects or craniectomy at stimulation sites
- Skin lesions, wounds, or dermatological conditions at electrode placement sites
- Active malignancy of the central nervous system
- Pregnancy (precautionary contraindication — insufficient safety data)
- Severe psychiatric crisis requiring immediate hospitalization
inclusion_criteria:
- DSM-5 diagnosis of Generalized Anxiety Disorder
- GAD-7 score >=10 at baseline
- Age 18-75 years
- Capacity to provide informed consent
- Stable anxiolytic/antidepressant medication for >=4 weeks (or medication-naive)
exclusion_criteria:
- Active psychosis or psychotic features
- Bipolar disorder (Type I or II)
- Active suicidal ideation with intent
- Substance use disorder (current, active)
- OCD as primary diagnosis (distinct protocol required)
- PTSD as primary diagnosis (distinct protocol required)
responder_criteria:
- '>=50% reduction in GAD-7 score from baseline'
- HAM-A total score <=7 (remission) or >=50% reduction
- Clinically meaningful improvement in SOZO PRS anxiety domain (>=3 points)
non_responder_pathway: 'For non-responders at Week 4:

  1. Re-evaluate diagnosis — rule out comorbid MDD, OCD, PTSD requiring distinct protocols

  2. Switch to bilateral protocol or add taVNS adjunct

  3. Add CES daily if not already included

  4. Doctor review mandatory before protocol modification'
evidence_summary: 'GAD has moderate tDCS evidence. Right cathodal / left anodal montage: Palm et al. (2012) pilot, Bystritsky
  et al. (2008) open-label study. CES: FDA-cleared, systematic review evidence. taVNS: emerging controlled trial evidence.
  No published TPS data for GAD specifically.'
evidence_quality: medium
evidence_gaps:
- No adequately powered sham-controlled RCT of tDCS specifically for DSM-5 GAD
- Optimal montage for anxiety (right cathodal vs left anodal vs bilateral) — no head-to-head comparison
- Long-term maintenance effects beyond treatment block
- TPS in GAD — no published data
