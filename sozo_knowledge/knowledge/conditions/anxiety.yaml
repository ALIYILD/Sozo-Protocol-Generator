    sessions: 10-15
  rationale: Right cathodal / left anodal tDCS montage targets the asymmetric prefrontal pattern in anxiety. Reduces right
    hemispheric anxiogenic dominance while enhancing left cognitive control. Palm et al. (2012) and Bystritsky et al. (2008)
    support this approach.
  evidence_level: medium
  off_label: true
  session_count: 15
