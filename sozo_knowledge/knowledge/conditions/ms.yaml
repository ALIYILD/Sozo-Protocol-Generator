assessments:
- scale_key: edss
  timing: baseline
  primary: false
  notes: Standard MS disability staging. Score 0-10. EDSS 0-4.5 = ambulatory without aid. Document EDSS at baseline for eligibility
    and tracking.
- scale_key: sdmt
  timing: baseline
  primary: false
  notes: Most sensitive single test for MS cognitive impairment. Highly sensitive to MS white matter burden. Primary MS cognitive
    outcome measure. Score <55 indicates impairment.
- scale_key: fss
  timing: baseline
  primary: false
  notes: Primary MS fatigue measure. 9 items, 1-7 scale. Score >=36 = clinically significant fatigue. Critical for fatigue
    protocol selection.
- scale_key: moca
  timing: baseline
  primary: false
  notes: Global cognitive screen. Less sensitive to MS-specific processing speed deficits than SDMT — use both.
- scale_key: phq9
  timing: baseline
  primary: false
  notes: Depression screening — 50% MS prevalence. Monitor at every session.
- scale_key: bdi2
  timing: baseline
  primary: false
  notes: Alternative depression measure. Distinguishes somatic vs cognitive depression in MS.
