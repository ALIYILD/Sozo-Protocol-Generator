category: neurological
version: '1.0'
overview: 'Multiple Sclerosis (MS) is a chronic, inflammatory, demyelinating disease of the central nervous system affecting
  approximately 2.8 million people worldwide. MS is characterized by inflammatory demyelination and axonal damage, producing
  a wide range of neurological deficits. The most common form — Relapsing-Remitting MS (RRMS) — affects 85% of patients at
  onset, with discrete clinical relapses followed by partial or complete recovery.


  MS-related neurological symptoms include motor dysfunction, sensory impairment, fatigue, cognitive impairment (''cog-fog''),
  depression, spasticity, and pain. Fatigue (prevalence >80%) and cognitive impairment (~65%) are among the most disabling
  non-motor symptoms.


  Neuromodulation in MS targets cognitive and fatigue symptoms. tDCS applied to M1 (motor impairment and spasticity) and DLPFC
  (cognitive impairment and fatigue) has emerging evidence. Charvet et al. (2017) demonstrated remote-supervised home tDCS
  is feasible and beneficial for MS cognitive symptoms. taVNS is under investigation for MS fatigue.'
pathophysiology: 'MS pathophysiology involves T-cell mediated autoimmune attack on CNS myelin. CD4+ Th17 and Th1 cells breach
  the blood-brain barrier and activate inflammatory cascades, leading to: demyelination (slowing/blocking nerve conduction),
  axonal damage (permanent structural injury), oligodendrocyte loss, and gliosis. In RRMS, relapses represent acute inflammatory
  episodes; remission reflects edema resolution and partial remyelination.


  Progressive MS (SPMS, PPMS) is characterized by diffuse neurodegeneration with less active focal inflammation — progressive
  axonal loss leads to irreversible disability accumulation. Neuroinflammatory mediators (IL-17, TNF-alpha), oxidative stress,
  and mitochondrial dysfunction drive progressive neurodegeneration.


  MS cognitive impairment (''cog-fog''): white matter lesion burden in frontal-subcortical tracts, gray matter atrophy (particularly
  thalamus and cortex), and network-level connectivity disruption drive CEN hypofunction. MS fatigue: complex mechanism involving
  thalamo-cortical pathway disruption, basal ganglia involvement, and possibly reduced corticomotor drive efficiency.'
core_symptoms:
- Motor dysfunction — weakness, spasticity, coordination impairment
- Sensory impairment — paresthesia, numbness, Lhermitte's sign
- Fatigue — MS-related fatigue (prevalence >80%); exacerbated by heat (Uhthoff's phenomenon)
- Visual disturbance — optic neuritis (reduced acuity, color desaturation)
- Bladder and bowel dysfunction
- Pain — neuropathic (central sensitization), spasticity-related, Lhermitte's
- Gait and balance impairment
non_motor_symptoms:
- Cognitive impairment (cog-fog) — processing speed, working memory, attention affected (65%)
- Depression (prevalence 50%)
- Anxiety (prevalence 40%)
- Sleep disturbance — restless legs, fatigue-sleep interaction
- Sexual dysfunction
- Pseudobulbar affect (emotional lability) in advanced disease
brain_regions:
- Primary Motor Cortex (M1) — bilateral
- Dorsolateral Prefrontal Cortex (DLPFC)
- Thalamus
- Cerebellum
- White Matter Tracts (corpus callosum, corticospinal tract)
- Anterior Cingulate Cortex (ACC)
brain_region_details:
  Primary Motor Cortex (M1) — bilateral: Corticomotor drive efficiency reduced by MS lesions and white matter injury. Compensatory
    cortical reorganization documented. tDCS anodal target for motor function and spasticity.
  Dorsolateral Prefrontal Cortex (DLPFC): CEN hypofunction — MS-related cognitive impairment correlates with DLPFC-thalamic
    connectivity disruption. Primary tDCS anodal target for MS cog-fog.
  Thalamus: Central relay for motor, sensory, and cognitive circuits. Thalamic atrophy in MS correlates with global cognitive
    impairment and fatigue severity.
  Cerebellum: Cerebellar demyelination contributes to ataxia, intention tremor, and gait disturbance. Compensatory cerebellar
    hyperactivation documented in early MS.
  White Matter Tracts (corpus callosum, corticospinal tract): Primary site of demyelinating lesion burden. Interhemispheric
    and motor pathway lesions drive most clinical deficits.
  Anterior Cingulate Cortex (ACC): Involved in MS fatigue and motivational deficits. Reduced ACC activity correlates with
    fatigue severity in MS.
network_profiles:
- network: smn
  dysfunction: hypo
  severity: severe
  primary: true
  relevance: PRIMARY NETWORK IN MS. SMN hypofunction from corticospinal tract demyelination and M1 cortical reorganization.
    Motor slowing, spasticity, and coordination impairment reflect SMN dysfunction. Compensatory SMN hyperactivation in early
    MS; progressive hypofunction as disease advances.
  evidence_note: Corticospinal tract MS pathology; SMN reorganization in RRMS
- network: cen
  dysfunction: hypo
  severity: moderate-severe
  primary: false
  relevance: CEN hypofunction correlates with MS cognitive impairment. DLPFC-thalamic connectivity disruption from white matter
    lesion burden impairs working memory, processing speed, and executive function. Primary target for MS cognitive neuromodulation
    protocols.
  evidence_note: Charvet et al. 2017 — remote tDCS for MS cognitive symptoms
- network: attention
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: Sustained and selective attention deficits are among the most prevalent MS cognitive complaints. Thalamo-cortical
    pathway disruption impairs attentional alerting and orienting. Correlates with processing speed impairment.
  evidence_note: ''
- network: dmn
  dysfunction: hyper
  severity: mild-moderate
  primary: false
  relevance: DMN hyperactivation and failure to deactivate during cognitive tasks documented in MS — parallel to TBI and ADHD
    patterns. May underlie cognitive fatigue and inefficient neural resource allocation.
  evidence_note: ''
- network: limbic
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: Depression (50%) and anxiety (40%) in MS reflect limbic network involvement, psychosocial adjustment burden,
    and direct lesion effects on limbic structures. MS fatigue has a distinct limbic component.
  evidence_note: MS depression and anxiety — high prevalence; psychosocial and neurobiological mechanisms
primary_network: smn
fnon_rationale: 'In MS, the primary network target depends on dominant symptom burden: SMN (motor) or CEN (cognitive/fatigue).
  For motor-predominant MS: M1 bilateral anodal tDCS. For cognitive/fatigue-predominant: DLPFC bilateral anodal tDCS. taVNS
  is an emerging adjunct specifically for MS fatigue via autonomic and noradrenergic mechanisms. All protocols must avoid
  stimulation during active MS relapse/exacerbation.'
