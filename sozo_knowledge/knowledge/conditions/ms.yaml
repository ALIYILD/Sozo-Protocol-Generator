contraindications:
- Active implanted devices (cochlear implants, deep brain stimulators, cardiac pacemakers/defibrillators) unless explicitly
  cleared by device manufacturer
- Metallic implants in the head or neck region within the stimulation field
- Active epilepsy with uncontrolled seizures (relative contraindication — requires neurologist clearance)
- Skull defects or craniectomy at stimulation sites
- Skin lesions, wounds, or dermatological conditions at electrode placement sites
- Active malignancy of the central nervous system
- Pregnancy (precautionary contraindication — insufficient safety data)
- Severe psychiatric crisis requiring immediate hospitalization
inclusion_criteria:
- Confirmed diagnosis of MS per McDonald 2017 criteria
- EDSS 0-7.0 (ambulatory with or without aid — can participate in sessions)
- Clinically stable — no relapse within 4 weeks
- Age 18-65 years
- Capacity to provide informed consent
- Stable disease-modifying therapy (DMT) for >=3 months
exclusion_criteria:
- Active MS relapse or clinical exacerbation — absolute exclusion during relapse
- Recent IV methylprednisolone (within 4 weeks)
- EDSS >7.5 — insufficient motor capacity for active rehabilitation tasks
- Severe cognitive impairment precluding informed consent
- Active psychiatric crisis
responder_criteria:
- FSS score reduction >=7 points (fatigue protocol)
- SDMT score improvement >=4 points (cognitive protocol)
- Clinically meaningful SOZO PRS improvement in relevant domains (>=3 points)
non_responder_pathway: 'For non-responders:

  1. Rule out relapse — any new neurological symptoms warrant pause and neurological review

  2. Assess fatigue timing — sessions at wrong time of day reduce response

  3. Optimize sleep with CES before cognitive tDCS escalation

  4. Switch from motor to cognitive protocol if different domain predominates

  5. Add taVNS for fatigue-dominant non-responders

  6. Neurology review for DMT optimization and relapse activity assessment'
evidence_summary: 'MS neuromodulation has emerging-to-moderate evidence. Mori et al. (2013) Brain Stimulation: M1 tDCS improved
  motor function in RRMS. Charvet et al. (2017) Multiple Sclerosis journal: remote-supervised DLPFC tDCS improved cognitive
  performance in RRMS. Palm et al. (2014): DLPFC tDCS reduced fatigue. All studies are small (N=10-30). Larger multi-site
  RCTs needed.'
evidence_quality: medium
evidence_gaps:
- No large multi-site tDCS RCT for MS with validated primary cognitive or motor endpoint
- Optimal tDCS protocol for progressive MS (SPMS/PPMS) — limited data
- taVNS for MS fatigue — investigational, no published RCT
- Long-term maintenance of tDCS effects in MS — limited follow-up data
