# ── Protocols ────────────────────────────────────────────────────────────────

protocols:
- protocol_id: adhd-tdcs-inattention
  label: tDCS Inattention (Primary)
  modality: tdcs
  target_region: Bilateral DLPFC
  target_abbreviation: DLPFC
  target_electrodes:
  - F3
  - F4
  - Fp1
  - Fp2
  phenotype_slugs:
  - inattentive
  - combined
  network_targets:
  - cen
  parameters:
    current_mA: 2.0
    duration_min: 20
    ramp_up_sec: 30
    ramp_down_sec: 30
    anode: F3, F4
    cathode: Fp1, Fp2
    sponge_size_cm2: 35
    sessions_per_week: 5
    total_sessions: 10
  rationale: Anodal bilateral DLPFC tDCS enhances prefrontal activation for sustained attention and executive control. Targets CEN hypofunction directly.
  evidence_level: medium
  off_label: false
  session_count: 10
  notes: From protocol_data C1. Concurrent cognitive training recommended.

- protocol_id: adhd-tdcs-impulsivity
  label: tDCS Impulsivity / Response Inhibition
  modality: tdcs
  target_region: Right DLPFC
  target_abbreviation: R-DLPFC
  target_electrodes:
  - F4
  - F3
  phenotype_slugs:
  - hyperactive
  - combined
  network_targets:
  - cen
  - sn
  parameters:
    current_mA: 2.0
    duration_min: 20
    ramp_up_sec: 30
    ramp_down_sec: 30
    anode: F4
    cathode: F3
    sponge_size_cm2: 35
    sessions_per_week: 5
    total_sessions: 10
  rationale: Anodal R-DLPFC tDCS enhances response inhibition circuits and reduces impulsive responding.
  evidence_level: medium
  off_label: false
  session_count: 10
  notes: From protocol_data C2. Go/No-Go training during session enhances effect.

- protocol_id: adhd-tdcs-wm
  label: tDCS Working Memory
  modality: tdcs
  target_region: Left DLPFC
  target_abbreviation: L-DLPFC
  target_electrodes:
  - F3
  - Fp2
  phenotype_slugs:
  - inattentive
  - combined
  - sct
  network_targets:
  - cen
  parameters:
    current_mA: 2.0
    duration_min: 20
    ramp_up_sec: 30
    ramp_down_sec: 30
    anode: F3
    cathode: Fp2
    sponge_size_cm2: 35
    sessions_per_week: 5
    total_sessions: 10
  rationale: Anodal L-DLPFC tDCS enhances working memory via prefrontal facilitation and dopaminergic upregulation.
  evidence_level: medium
  off_label: false
  session_count: 10
  notes: From protocol_data C3. N-back training during stimulation recommended.

- protocol_id: adhd-tdcs-emotional-reg
  label: tDCS Emotional Regulation
  modality: tdcs
  target_region: Right DLPFC + Left DLPFC
  target_abbreviation: R-DLPFC/L-DLPFC
  target_electrodes:
  - F4
  - Fp1
  phenotype_slugs:
  - emotional
  - combined
  network_targets:
  - cen
  - limbic
  parameters:
    current_mA: 1.5
    duration_min: 20
    ramp_up_sec: 30
    ramp_down_sec: 30
    anode: F4
    cathode: Fp1
    sponge_size_cm2: 35
    sessions_per_week: 3
    total_sessions: 15
  rationale: >-
    R-DLPFC anodal stimulation enhances prefrontal top-down regulation of limbic
    reactivity. Lower current reduces risk of agitation in emotionally labile patients.
  evidence_level: low
  off_label: false
  session_count: 15
  notes: Extended protocol for emotional dysregulation phenotype. Monitor mood closely.

- protocol_id: adhd-tdcs-acc
  label: tDCS ACC Conflict Monitoring
  modality: tdcs
  target_region: Anterior Cingulate Cortex
  target_abbreviation: ACC
  target_electrodes:
  - Fz
  - Pz
  phenotype_slugs:
  - combined
  - hyperactive
  network_targets:
  - sn
  - cen
  parameters:
    current_mA: 1.5
    duration_min: 20
    ramp_up_sec: 30
    ramp_down_sec: 30
    anode: Fz
    cathode: Pz
    sponge_size_cm2: 25
    sessions_per_week: 5
    total_sessions: 10
  rationale: >-
    Midline frontal stimulation targets the ACC node of the salience network to
    improve conflict monitoring, error detection, and cognitive control switching.
  evidence_level: low
  off_label: false
  session_count: 10
  notes: Experimental protocol targeting ACC. Use flanker or Stroop task during stimulation.

- protocol_id: adhd-tdcs-sct
  label: tDCS Sluggish Cognitive Tempo
  modality: tdcs
  target_region: Left DLPFC
  target_abbreviation: L-DLPFC
  target_electrodes:
  - F3
  - right deltoid
  phenotype_slugs:
  - sct
  - inattentive
  network_targets:
  - cen
  - dmn
  parameters:
    current_mA: 2.0
    duration_min: 25
    ramp_up_sec: 30
    ramp_down_sec: 30
    anode: F3
    cathode: right deltoid (extracephalic)
    sponge_size_cm2: 35
    sessions_per_week: 5
    total_sessions: 10
  rationale: >-
    Extracephalic reference montage with anodal L-DLPFC maximises prefrontal
    excitability to counteract hypoarousal and sluggish processing speed
    characteristic of SCT phenotype.
  evidence_level: low
  off_label: false
  session_count: 10
  notes: Extracephalic reference avoids cathodal suppression of contralateral hemisphere.

- protocol_id: adhd-tps-inattention
  label: TPS Inattention & Executive Dysfunction
  modality: tps
  target_region: DLPFC bilateral + premotor
  target_abbreviation: DLPFC/PMC
  target_electrodes:
  - F3
  - F4
  - FC3
  phenotype_slugs:
  - inattentive
  - combined
  network_targets:
  - cen
  parameters:
    pulses: 3000-5000
    frequency_hz: 5
    energy_mJ_mm2: 0.2
    pulse_duration_us: 3
    focal_depth_mm: 30
    treatment_area_cm2: 12
    sessions_per_week: 3
    total_sessions: 6
  rationale: TPS targeting of bilateral DLPFC and premotor cortex for inattention and executive dysfunction via cortical excitability modulation.
  evidence_level: low
  off_label: true
  session_count: 6
  notes: From protocol_data T1. Emerging evidence. All TPS in ADHD is off-label.

- protocol_id: adhd-tps-emotional
  label: TPS Emotional Dysregulation
  modality: tps
  target_region: Bilateral DLPFC
  target_abbreviation: DLPFC
  target_electrodes:
  - F4
  - F3
  phenotype_slugs:
  - emotional
  network_targets:
  - cen
  - limbic
  parameters:
    pulses: 3000
    frequency_hz: 5
    energy_mJ_mm2: 0.2
    pulse_duration_us: 3
    focal_depth_mm: 30
    treatment_area_cm2: 12
    sessions_per_week: 3
    total_sessions: 6
  rationale: TPS targeting of bilateral DLPFC for emotional dysregulation in ADHD via prefrontal-limbic circuit modulation.
  evidence_level: low
  off_label: true
  session_count: 6
  notes: From protocol_data T4. Emerging pilot evidence.

- protocol_id: adhd-tps-wm
  label: TPS Working Memory Enhancement
  modality: tps
  target_region: Left DLPFC + Posterior Parietal
  target_abbreviation: L-DLPFC/PPC
  target_electrodes:
  - F3
  - P3
  - FC3
  phenotype_slugs:
  - inattentive
  - combined
  - sct
  network_targets:
  - cen
  parameters:
    pulses: 4000
    frequency_hz: 5
    energy_mJ_mm2: 0.2
    pulse_duration_us: 3
    focal_depth_mm: 30
    treatment_area_cm2: 15
    sessions_per_week: 3
    total_sessions: 6
  rationale: >-
    TPS targeting fronto-parietal CEN nodes (L-DLPFC and posterior parietal) to
    enhance working memory network excitability and functional connectivity.
  evidence_level: low
  off_label: true
  session_count: 6
  notes: Experimental multi-target TPS protocol. Off-label.

- protocol_id: adhd-tps-impulsivity
  label: TPS Response Inhibition
  modality: tps
  target_region: Right DLPFC + Right IFG
  target_abbreviation: R-DLPFC/R-IFG
  target_electrodes:
  - F4
  - FC4
  - F8
  phenotype_slugs:
  - hyperactive
  - combined
  network_targets:
  - cen
  - sn
  parameters:
    pulses: 3000
    frequency_hz: 5
    energy_mJ_mm2: 0.2
    pulse_duration_us: 3
    focal_depth_mm: 25
    treatment_area_cm2: 12
    sessions_per_week: 3
    total_sessions: 6
  rationale: >-
    TPS targeting right prefrontal inhibitory control regions (rDLPFC and rIFG)
