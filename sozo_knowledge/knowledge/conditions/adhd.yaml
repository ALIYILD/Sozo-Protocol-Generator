# ── Generation Hints ──────────────────────────────────────────────────────────

clinical_tips:
  - "Document stimulant medication status and timing relative to sessions — methylphenidate alters cortical excitability."
  - "Consider combining tDCS with concurrent cognitive training tasks for enhanced neuroplastic effects."
  - "Screen for comorbid conditions (depression, anxiety, sleep) as these significantly impact ADHD treatment response."

governance_rules:
  - "All protocols require Doctor-level authorisation before initiation."
  - "Informed consent must be obtained and documented prior to first session."
  - "Outcome measures must be recorded at baseline, mid-treatment, and endpoint."
  - "Adverse events must be documented and reported within 24 hours."
  - "Protocol modifications require Doctor review and re-authorisation."

patient_journey_notes:
  stage_1: "Pre-screen for ADHD diagnosis. Confirm with structured clinical interview or ASRS. Screen for comorbid bipolar, tics, and substance use."
  stage_3: "Administer ASRS, BRIEF-2, CPT-3. Document medication regimen including stimulants. Screen for comorbid depression (PHQ-9) and anxiety (GAD-7)."
