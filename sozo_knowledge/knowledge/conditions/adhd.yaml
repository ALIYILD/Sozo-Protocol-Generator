contraindications:
- Active seizure disorder or epilepsy
- Metallic cranial implants in stimulation path
- Active psychosis
- Unstable bipolar disorder
- Pregnancy
inclusion_criteria:
- Confirmed diagnosis of ADHD (DSM-5 criteria)
- ASRS screener positive or clinical interview confirmed
- Age 16-65 years
- Stable medication regimen for >=4 weeks (or medication-naive)
- Able to provide informed consent
exclusion_criteria:
- Active substance use disorder (severe)
- Bipolar I disorder (uncontrolled)
- Active psychotic features
- Severe tic disorder (Tourette syndrome — relative exclusion)
- Intellectual disability (IQ <70)
responder_criteria:
- '>=30% improvement on ASRS total score'
- '>=1 SD improvement on CPT-3 sustained attention measures'
- Clinician-rated CGI-I score of 'much improved' or 'very much improved'
- Patient-reported improvement in daily functioning
non_responder_pathway: 'If <30% improvement on ASRS after 10 sessions: review phenotype assignment, consider adding CES or
  taVNS adjunctive modality, adjust stimulation parameters, or refer for medication optimisation.'
evidence_summary: 'ADHD has emerging evidence for tDCS — classified as Level B (probable efficacy) in emerging neuromodulation
  guidelines. Westwood et al. (2021) systematic review (N=310 across multiple trials): moderate effect sizes for attention
  and executive function outcomes. Sotnikova et al. (2017) RCT in children demonstrated significant DLPFC tDCS improvements
  on neuropsychological measures. Breitling et al. (2010) adult ADHD tDCS study showed working memory improvements. No large
  multi-site RCT for adult ADHD with ASRS primary outcome. taVNS in ADHD: investigational — rationale supported by noradrenergic
  mechanism overlap with atomoxetine. CES: no dedicated ADHD RCT — inferred from anxiety/insomnia clearance.'
evidence_quality: emerging
evidence_gaps:
- Large-scale RCTs for tDCS in adult ADHD
- TPS-specific evidence in ADHD
- Long-term efficacy and maintenance protocols
- Paediatric-specific stimulation parameters and safety
