# ── Generation Hints ─────────────────────────────────────────────────────────

clinical_tips:
- Always co-administer a cognitive training task (working memory, sustained attention) during tDCS sessions — activity-dependent neuroplasticity significantly improves outcomes
- Document stimulant medication type, dose, and timing at every session — maintain consistent medication state across the treatment block
- In adult ADHD with emotional dysregulation, add taVNS as adjunct — addresses the noradrenergic component not directly targeted by DLPFC tDCS
- Use CPT-3 at baseline and endpoint to objectively quantify attention changes beyond self-report
- Distinguish adult ADHD from bipolar disorder carefully — mood-related behavioral activation during tDCS requires immediate monitoring
- Screen for sleep disorders before initiating treatment — circadian disruption in ADHD affects cortical excitability and may modulate stimulation response
- Consider phenotype-specific protocol selection rather than defaulting to bilateral DLPFC — inattentive phenotype benefits more from left-lateralised montage
- Monitor caffeine intake as it modulates cortical excitability and may interact with tDCS effects — standardise caffeine timing across sessions

governance_rules:
- All protocols require Doctor-level authorisation before initiation.
- Informed consent must be obtained and documented prior to first session.
- Outcome measures must be recorded at baseline, mid-treatment, and endpoint.
- Adverse events must be documented and reported within 24 hours.
- Protocol modifications require Doctor review and re-authorisation.

