slug: adhd
display_name: Attention-Deficit/Hyperactivity Disorder
icd10: F90
aliases:
- ADHD
- ADD
- attention deficit disorder
- attention deficit hyperactivity disorder
category: psychiatric
version: '1.0'
overview: 'Attention-Deficit/Hyperactivity Disorder (ADHD) is a neurodevelopmental disorder characterized by persistent, impairing
  patterns of inattention, hyperactivity, and impulsivity that are inconsistent with developmental level. Lifetime prevalence
  is approximately 5% in children (Polanczyk et al. 2007) and 2.5-3% in adults globally. ADHD is among the most heritable
  psychiatric conditions (heritability ~75%). Neurobiologically, ADHD involves hypofunction of mesocortical dopamine and noradrenaline
  circuits projecting to the prefrontal cortex, impairing executive control, working memory, and response inhibition (Barkley''s
  inhibitory control model).


  Non-invasive neuromodulation — particularly tDCS targeting the left DLPFC — represents an emerging adjunct to pharmacotherapy
  and behavioral interventions. A 2021 systematic review (Westwood et al.) of tDCS in ADHD (N=310 across trials) confirmed
  moderate effect sizes for attention and executive function outcomes. taVNS is under investigation for ADHD-related emotional
  dysregulation via noradrenergic upregulation.'
pathophysiology: 'ADHD pathophysiology centers on hypofunction of the mesocortical dopamine (DA) and noradrenaline (NA) systems.
  Dopamine depletion in the prefrontal-striatal axis impairs the signal-to-noise ratio in DLPFC circuits, reducing inhibitory
  control and working memory capacity. The catecholamine hypothesis (Arnsten) proposes that suboptimal DA/NA levels impair
  postsynaptic signaling at prefrontal D1 and alpha-2A adrenoreceptors.


  Neuroimaging reveals: (1) reduced volume and cortical thickness in DLPFC, ACC, caudate, and cerebellar vermis (Shaw et al.
  2007 — delayed cortical maturation by ~3 years); (2) DLPFC and right inferior frontal gyrus (rIFG) hypoactivation during
  tasks demanding response inhibition (Stop Signal, Go/No-Go); (3) Default Mode Network (DMN) failure to deactivate during
  cognitive tasks, causing attentional intrusions (Sonuga-Barke & Castellanos 2007 — DMN interference model).


  The triple network model in ADHD identifies: CEN hypofunction (DLPFC/parietal), DMN hyperactivation/intrusion, and SN impaired
  switching. Abnormal CEN-DMN anticorrelation is a robust ADHD neuroimaging biomarker. Reward circuit dysfunction (ventral
  striatum, OFC) underlies motivational deficits and delay aversion.'
epidemiology: Prevalence approximately 4.4% in US adults (Kessler et al. 2006); 5-7% in children worldwide. Persistence into
  adulthood in ~60% of childhood cases.
core_symptoms:
- Inattention — failure to sustain attention, easily distracted by extraneous stimuli
- Disorganization — poor planning, losing materials, difficulty with multi-step tasks
- Hyperactivity — fidgeting, excessive motor activity, difficulty remaining seated (prominent in children, internalized in
  adults)
- Impulsivity — blurting out answers, difficulty waiting turn, interrupting
- Executive dysfunction — poor planning, working memory deficits, cognitive inflexibility
- Emotional dysregulation — low frustration tolerance, irritability, mood lability (prominent in adult ADHD)
- Delay aversion and motivation deficits — difficulty sustaining effort without immediate reward
non_motor_symptoms:
- Sleep disturbance — delayed sleep phase, circadian dysregulation (prevalence ~70% in ADHD)
- Emotional lability and rejection-sensitive dysphoria
- Low self-esteem and demoralization from chronic underperformance
- Social relationship difficulties — impulsive social behavior, poor turn-taking
- Academic and occupational underachievement disproportionate to intellectual ability
- Comorbid anxiety (50%), depression (30%), substance use disorders (elevated risk in adult ADHD)
brain_regions:
- dlpfc
- acc
- ofc
- striatum
- cerebellum
- ppc
brain_region_details:
  dlpfc: Hypoactive in ADHD; mediates working memory, sustained attention, and executive control. Primary tDCS target.
  acc: Reduced activation during conflict monitoring and error processing. Contributes to impulsivity.
  ofc: Involved in reward processing and response inhibition. Dysfunction contributes to impulsive decision-making.
  striatum: Dopaminergic hypofunction in caudate and putamen. Target of stimulant medications.
  cerebellum: Involved in timing, motor coordination, and cognitive functions. Reduced volume in ADHD.
  ppc: Posterior parietal cortex involved in spatial attention and working memory.
network_profiles:
- network: cen
  dysfunction: hypo
  severity: severe
  primary: true
  relevance: Primary dysfunctional network in ADHD. DLPFC and frontal-parietal hypoactivation underlies inattention, poor
    executive control, and working memory deficits.
  evidence_note: Cortese et al. 2012; large-scale brain systems in ADHD
- network: dmn
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: DMN fails to deactivate during tasks, causing attentional lapses and mind-wandering. DMN-CEN anticorrelation
    is disrupted in ADHD.
  evidence_note: Sonuga-Barke & Castellanos 2007; spontaneous attentional fluctuations
- network: sn
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: Reduced salience network function impairs CEN-DMN switching, contributing to inconsistent task performance and
    motivational deficits.
  evidence_note: ''
- network: limbic
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: Emotional dysregulation, low frustration tolerance, and mood lability reflect limbic hyperreactivity with insufficient
    prefrontal top-down control.
  evidence_note: ''
primary_network: cen
fnon_rationale: In ADHD, the primary dysfunctional network is the Central Executive Network (CEN), driven by mesocortical
  dopamine/noradrenaline hypofunction impairing DLPFC-mediated cognitive control. The FNON framework directs primary tDCS
  stimulation at the DLPFC (bilateral anodal for combined type; left DLPFC for inattentive type) to upregulate CEN excitability
  and restore CEN-DMN anticorrelation. Cognitive training performed concurrently with tDCS exploits activity-dependent neuroplasticity
  (Staresina et al.). taVNS is an adjunct modality targeting noradrenergic upregulation via NTS-LC pathways, with particular
  relevance for emotional dysregulation and comorbid anxiety.
