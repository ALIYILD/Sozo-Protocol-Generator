  evidence_level: low
  off_label: true
  session_count: 6
  notes: Experimental protocol targeting right-lateralised inhibition network. Off-label.

# ── Safety ───────────────────────────────────────────────────────────────────

safety_rules:
- category: precaution
  description: Document stimulant medication status and timing — stimulants may alter cortical excitability thresholds and interact with stimulation effects.
  severity: moderate
  modalities:
  - tdcs
  - tps
  source: Clinical practice

- category: monitoring
  description: Monitor for increased anxiety or agitation during sessions, particularly in hyperactive-impulsive phenotype.
  severity: moderate
  modalities:
  - tdcs
  - tps
  source: Clinical observation

- category: precaution
  description: Screen for comorbid bipolar disorder before initiating prefrontal anodal stimulation — risk of inducing hypomania.
  severity: high
  modalities:
  - tdcs
  source: Clinical guidelines

- category: precaution
  description: Adolescent patients (<18) require parental consent and age-appropriate intensity parameters (reduce to 1.0-1.5 mA for tDCS).
  severity: high
  modalities:
  - tdcs
  - tps
  - tavns
  - ces
  source: Regulatory and ethical requirements

- category: stopping_rule
  description: Discontinue if new tics or significant worsening of existing tic disorder occurs during treatment course.
  severity: high
  modalities:
  - tdcs
  - tps
  source: Clinical safety protocol

- category: monitoring
  description: Assess mood at every session using a brief mood rating — ADHD patients with subclinical mood instability may decompensate with prefrontal stimulation.
  severity: moderate
  modalities:
  - tdcs
  - tps
  source: Clinical best practice

- category: precaution
  description: Maintain consistent stimulant medication timing relative to stimulation sessions throughout treatment block — do not alter dose mid-protocol.
  severity: moderate
  modalities:
  - tdcs
  - tps
  source: Research protocol standards

- category: stopping_rule
  description: Discontinue stimulation and refer for psychiatric review if new onset suicidal ideation or severe depressive symptoms emerge.
  severity: high
  modalities:
  - tdcs
  - tps
  - tavns
  - ces
  source: Clinical safety protocol

contraindications:
- Active seizure disorder or epilepsy
- Metallic cranial implants in stimulation path
- Active psychosis
- Unstable bipolar disorder
- Pregnancy
- Severe substance use disorder (active, uncontrolled)

inclusion_criteria:
- Confirmed diagnosis of ADHD (DSM-5 criteria) by structured clinical interview
- ASRS screener positive or clinical interview confirmed
- Age 16-65 years
- Stable medication regimen for >=4 weeks (or medication-naive)
- Able to provide informed consent
- No contraindicated comorbid conditions

exclusion_criteria:
- Active substance use disorder (severe, uncontrolled)
- Bipolar I disorder (uncontrolled or rapid cycling)
- Active psychotic features
- Severe tic disorder (Tourette syndrome — relative exclusion, neurology clearance needed)
- Intellectual disability (IQ <70)
- Active seizure disorder or history of stimulation-induced seizure

# ── Responder ────────────────────────────────────────────────────────────────

responder_criteria:
- '>=30% improvement on ASRS total score'
- '>=1 SD improvement on CPT-3 sustained attention measures'
- Clinician-rated CGI-I score of 'much improved' or 'very much improved'
- Patient-reported improvement in daily functioning
- '>=20% improvement on BRIEF-2 executive function composite'

non_responder_pathway: >-
  If <30% improvement on ASRS after 10 sessions: review phenotype assignment,
  consider adding CES or taVNS adjunctive modality, adjust stimulation
  parameters (target, intensity, duration), or refer for medication optimisation.
  Consider phenotype re-classification (e.g., SCT vs. classic inattentive).

# ── Evidence ─────────────────────────────────────────────────────────────────

evidence_summary: >-
  ADHD has emerging evidence for tDCS — classified as Level B (probable efficacy)
  in emerging neuromodulation guidelines. Salehinejad et al. (2021) systematic
  review (N=310 across multiple trials) showed moderate effect sizes for
  attention and executive function outcomes. Sotnikova et al. (2017) RCT in
  children demonstrated significant DLPFC tDCS improvements on
  neuropsychological measures. Cachoeira et al. (2010) adult ADHD tDCS study
  showed working memory improvements. Cortese et al. (2012) provided the
  foundational network model for understanding ADHD brain systems. No large
  multi-site RCT for adult ADHD with ASRS primary outcome exists. TPS in ADHD
  is at early investigational stage with no published RCTs.

evidence_quality: emerging

evidence_gaps:
- Large-scale RCTs for tDCS in adult ADHD
- TPS-specific evidence in ADHD
- Long-term efficacy and maintenance protocols
- Paediatric-specific stimulation parameters and safety
- Biomarkers for responder prediction
- Comparative effectiveness of tDCS vs other NIBS modalities in ADHD

