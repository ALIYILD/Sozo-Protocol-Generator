clinical_tips:
- Always co-administer a cognitive training task (working memory, sustained attention) during tDCS sessions — activity-dependent
  neuroplasticity significantly improves outcomes
- Document stimulant medication type, dose, and timing at every session — maintain consistent medication state across the
  treatment block
- In adult ADHD with emotional dysregulation, add taVNS as adjunct — addresses the noradrenergic component not directly targeted
  by DLPFC tDCS
- Use CPT-3 at baseline and endpoint to objectively quantify attention changes beyond self-report
- Distinguish adult ADHD from bipolar disorder carefully — mood-related behavioral activation during tDCS requires immediate
  monitoring
governance_rules:
- All protocols require Doctor-level authorisation before initiation.
- Informed consent must be obtained and documented prior to first session.
- Outcome measures must be recorded at baseline, mid-treatment, and endpoint.
- Adverse events must be documented and reported within 24 hours.
- Protocol modifications require Doctor review and re-authorisation.
patient_journey_notes:
  stage_1: Pre-screen for ADHD diagnosis. Confirm with structured clinical interview or ASRS. Screen for comorbid bipolar,
    tics, and substance use.
  stage_3: Administer ASRS, BRIEF-2, CPT-3. Document medication regimen including stimulants. Screen for comorbid depression
    (PHQ-9) and anxiety (GAD-7).
