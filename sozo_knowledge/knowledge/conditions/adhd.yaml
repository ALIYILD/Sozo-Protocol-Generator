# Content enriched from legacy generator prose and expanded to gold-standard depth.

slug: adhd
display_name: Attention-Deficit/Hyperactivity Disorder
icd10: F90
aliases:
- ADHD
- ADD
- attention deficit disorder
- attention deficit hyperactivity disorder
category: psychiatric
version: '1.1'

# ── Clinical ─────────────────────────────────────────────────────────────────

overview: >-
  Attention-Deficit/Hyperactivity Disorder (ADHD) is a neurodevelopmental disorder
  characterized by persistent, impairing patterns of inattention, hyperactivity,
  and impulsivity that are inconsistent with developmental level. Lifetime
  prevalence is approximately 5% in children (Polanczyk et al. 2007) and 2.5-3%
  in adults globally, making it one of the most common psychiatric conditions.
  ADHD is among the most heritable psychiatric conditions (heritability ~75%),
  with polygenic architecture involving dopamine transporter (DAT1) and receptor
  (DRD4/DRD5) gene variants. Neurobiologically, ADHD involves hypofunction of
  mesocortical dopamine and noradrenaline circuits projecting to the prefrontal
  cortex, impairing executive control, working memory, and response inhibition
  (Barkley inhibitory control model). Functional neuroimaging consistently
  demonstrates reduced prefrontal-striatal activation, delayed cortical
  maturation, and impaired default mode network deactivation during cognitive
  tasks. Non-invasive neuromodulation — particularly tDCS targeting the left
  DLPFC — represents an emerging adjunct to pharmacotherapy and behavioral
  interventions. A 2021 systematic review (Salehinejad et al.) of tDCS in ADHD
  (N=310 across trials) confirmed moderate effect sizes for attention and
  executive function outcomes. TPS is under early investigation for ADHD
  executive dysfunction and emotional dysregulation via cortical excitability
  modulation, though evidence remains preliminary.

pathophysiology: >-
  ADHD pathophysiology centers on hypofunction of the mesocortical dopamine (DA)
  and noradrenaline (NA) systems. Dopamine depletion in the prefrontal-striatal
  axis impairs the signal-to-noise ratio in DLPFC circuits, reducing inhibitory
  control and working memory capacity. The catecholamine hypothesis (Arnsten)
  proposes that suboptimal DA/NA levels impair postsynaptic signaling at
  prefrontal D1 and alpha-2A adrenoreceptors, creating an inverted-U dose-response
  curve for cognitive performance. Neuroimaging reveals: (1) reduced volume and
  cortical thickness in DLPFC, ACC, caudate, and cerebellar vermis — Shaw et al.
  2007 documented delayed cortical maturation by approximately 3 years in ADHD
  children; (2) DLPFC and right inferior frontal gyrus (rIFG) hypoactivation
  during tasks demanding response inhibition (Stop Signal, Go/No-Go paradigms);
  (3) Default Mode Network (DMN) failure to deactivate during cognitive tasks,
  causing attentional intrusions and mind-wandering (Sonuga-Barke and Castellanos
  2007 — DMN interference model). The triple network model in ADHD identifies:
  CEN hypofunction (DLPFC/parietal), DMN hyperactivation/intrusion, and SN
  impaired switching between task-positive and task-negative states. Abnormal
  CEN-DMN anticorrelation is a robust ADHD neuroimaging biomarker replicated
  across multiple large-sample studies. Reward circuit dysfunction involving
  ventral striatum and OFC underlies motivational deficits and delay aversion,
  explaining why ADHD patients preferentially select immediate over delayed
  rewards. Cerebellar vermis volume reduction contributes to timing deficits
  and motor coordination problems. White matter microstructural abnormalities
  in fronto-striatal and fronto-cerebellar tracts further compromise the
  efficiency of attentional and executive networks.

epidemiology: >-
  Prevalence approximately 4.4% in US adults (Kessler et al. 2006); 5-7% in
  children worldwide. Persistence into adulthood in approximately 60% of
  childhood cases. Male-to-female ratio approximately 2:1 in children, closer
  to 1:1 in adults due to underdiagnosis of females.

core_symptoms:
- Inattention — failure to sustain attention, easily distracted by extraneous stimuli
- Disorganization — poor planning, losing materials, difficulty with multi-step tasks
- Hyperactivity — fidgeting, excessive motor activity, difficulty remaining seated (prominent in children, internalized in adults)
- Impulsivity — blurting out answers, difficulty waiting turn, interrupting others
- Executive dysfunction — poor planning, working memory deficits, cognitive inflexibility
- Emotional dysregulation — low frustration tolerance, irritability, mood lability (prominent in adult ADHD)
- Delay aversion and motivation deficits — difficulty sustaining effort without immediate reward
- Time blindness — poor temporal awareness, chronic lateness, difficulty estimating task duration
- Procrastination — task initiation failure, especially for low-stimulation activities
- Variable performance — inconsistent task output driven by interest and arousal state rather than effort
- Poor self-monitoring — reduced metacognitive awareness of attention lapses and errors
- Social pragmatic difficulties — conversational tangents, poor listening, missing social cues due to inattention

non_motor_symptoms:
- Sleep disturbance — delayed sleep phase, circadian dysregulation (prevalence ~70% in ADHD)
- Emotional lability and rejection-sensitive dysphoria
- Low self-esteem and demoralization from chronic underperformance
- Social relationship difficulties — impulsive social behavior, poor turn-taking
- Academic and occupational underachievement disproportionate to intellectual ability
- Comorbid anxiety (50%), depression (30%), substance use disorders (elevated risk in adult ADHD)

# ── Anatomy ──────────────────────────────────────────────────────────────────

brain_regions:
- dlpfc
- acc
- ofc
- striatum
- cerebellum
- ppc
- rifg

brain_region_details:
  dlpfc: Hypoactive in ADHD; mediates working memory, sustained attention, and executive control. Primary tDCS target.
  acc: Reduced activation during conflict monitoring and error processing. Contributes to impulsivity and poor self-monitoring.
  ofc: Involved in reward processing and response inhibition. Dysfunction contributes to impulsive decision-making and delay aversion.
  striatum: Dopaminergic hypofunction in caudate and putamen. Target of stimulant medications. Underlies reward processing deficits.
  cerebellum: Involved in timing, motor coordination, and cognitive functions. Reduced volume in vermis in ADHD.
  ppc: Posterior parietal cortex involved in spatial attention and working memory. Part of the dorsal attention network.
  rifg: Right inferior frontal gyrus — critical for response inhibition and stopping behaviour. Hypoactive during Go/No-Go tasks.

# ── Networks (FNON) ─────────────────────────────────────────────────────────

network_profiles:
- network: cen
  dysfunction: hypo
  severity: severe
  primary: true
  relevance: >-
    Primary dysfunctional network in ADHD. DLPFC and frontal-parietal
    hypoactivation underlies inattention, poor executive control, and working
    memory deficits. CEN hypofunction is the most consistent network-level
    finding across ADHD neuroimaging studies.
  evidence_note: Cortese et al. 2012; large-scale brain systems in ADHD

- network: dmn
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: >-
    DMN fails to deactivate during tasks, causing attentional lapses and
    mind-wandering. DMN-CEN anticorrelation is disrupted in ADHD, leading to
    intrusion of task-irrelevant self-referential processing during externally
    directed cognitive tasks.
  evidence_note: Sonuga-Barke & Castellanos 2007; spontaneous attentional fluctuations

- network: sn
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: >-
    Reduced salience network function impairs CEN-DMN switching, contributing to
    inconsistent task performance and motivational deficits. The anterior insula
    and dACC nodes of the SN fail to appropriately detect salient stimuli and
    trigger CEN engagement.
  evidence_note: Uddin et al. 2017; SN in ADHD

- network: limbic
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: >-
    Emotional dysregulation, low frustration tolerance, and mood lability reflect
    limbic hyperreactivity with insufficient prefrontal top-down control. Amygdala
    hyperactivation to emotionally salient stimuli in ADHD is well documented.
  evidence_note: Shaw et al. 2014; emotional dysregulation in ADHD

- network: attention
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: >-
    Dorsal attention network hypofunction contributes to impaired spatial
    orienting and difficulty maintaining focused attention on task-relevant
    stimuli. Ventral attention network dysfunction impairs stimulus-driven
    reorienting.
  evidence_note: Castellanos & Proal 2012; attention networks in ADHD

- network: smn
  dysfunction: hyper
  severity: mild
  primary: false
  relevance: >-
    Somatomotor network overactivation contributes to motor restlessness,
    fidgeting, and difficulty remaining still, particularly in the
    hyperactive-impulsive phenotype. Reduced tonic inhibition from prefrontal
    regions fails to suppress motor output.
  evidence_note: ''

primary_network: cen
fnon_rationale: >-
  In ADHD, the primary dysfunctional network is the Central Executive Network
  (CEN), driven by mesocortical dopamine/noradrenaline hypofunction impairing
  DLPFC-mediated cognitive control. The FNON framework directs primary tDCS
  stimulation at the DLPFC (bilateral anodal for combined type; left DLPFC for
  inattentive type) to upregulate CEN excitability and restore CEN-DMN
  anticorrelation. Cognitive training performed concurrently with tDCS exploits
  activity-dependent neuroplasticity (Staresina et al.). TPS targets are
  directed at prefrontal and premotor regions to enhance executive function
  via cortical excitability modulation, though evidence remains early-stage.

# ── Phenotypes ───────────────────────────────────────────────────────────────

phenotypes:
- slug: inattentive
  label: IA — Predominantly Inattentive
  description: >-
    Predominantly inattention with minimal hyperactivity. Often missed or
    late-diagnosed in clinical settings, especially in females. Characterised
    by distractibility, forgetfulness, and sluggish processing speed.
  key_features:
  - Poor sustained attention
  - Forgetfulness in daily activities
  - Disorganisation and losing materials
  - Mind-wandering and daydreaming
  - Difficulty following through on instructions
  primary_networks:
  - cen
  - dmn
  secondary_networks:
  - attention
  preferred_modalities:
  - tdcs
  - tps
  tdcs_target: L-DLPFC anodal (F3) + bilateral frontal
  tps_target: F3, F4, FC3

- slug: hyperactive
  label: HI — Predominantly Hyperactive-Impulsive
  description: >-
    Predominantly hyperactivity and impulsivity with relatively preserved
    attention. More readily identified in clinical settings due to disruptive
    behaviour. In adults, hyperactivity often internalises as inner restlessness.
  key_features:
  - Motor restlessness and fidgeting
  - Impulsive decisions and actions
  - Interrupting conversations and activities
  - Difficulty waiting turn
  - Sensation-seeking behaviour
  primary_networks:
  - sn
  - cen
  secondary_networks:
  - limbic
  - smn
  preferred_modalities:
  - tdcs
  - tps
  tdcs_target: R-DLPFC anodal (F4) for response inhibition
  tps_target: F4, FC4, F3

- slug: combined
  label: CT — Combined Type
  description: >-
    Both inattention and hyperactivity-impulsivity criteria met. The most common
    presentation in clinical referrals. Broadest network dysfunction pattern
    requiring multi-target stimulation approaches.
  key_features:
  - Inattention and distractibility
  - Hyperactivity and motor restlessness
  - Impulsivity across domains
  - Executive dysfunction
  - Variable cognitive performance
  primary_networks:
  - cen
  - dmn
  - sn
  secondary_networks:
  - limbic
  - attention
  preferred_modalities:
  - tdcs
  - tps
  - ces
  tdcs_target: Bilateral DLPFC (F3/F4)
  tps_target: F3, F4, FC3

- slug: emotional
  label: ED — Emotional Dysregulation
  description: >-
    Prominent emotional lability, frustration intolerance, and rejection
    sensitivity overlying ADHD. Increasingly recognised as a core feature
    rather than a comorbidity. Significant functional impairment in
    interpersonal and occupational domains.
  key_features:
  - Low frustration tolerance
  - Mood lability and rapid emotional shifts
  - Rejection-sensitive dysphoria
  - Irritability and temper outbursts
  - Difficulty with emotional self-regulation
  primary_networks:
  - limbic
  - cen
  secondary_networks:
  - sn
  preferred_modalities:
  - tdcs
  - tavns
  - ces
  tdcs_target: R-DLPFC anodal (F4) + L-DLPFC
  tps_target: F4, F3

- slug: sct
  label: SCT — Sluggish Cognitive Tempo
  description: >-
    Characterised by hypoactivity, sluggishness, daydreaming, and mental
    fogginess. Distinct from classic inattentive ADHD by the absence of
    distractibility — instead featuring underarousal and slow processing.
    Increasingly studied as a related but separable construct.
  key_features:
  - Mental fogginess and confusion
  - Daydreaming and staring
  - Sluggish and lethargic behaviour
  - Slow processing speed
  - Hypoactivity rather than hyperactivity
  primary_networks:
  - dmn
  - cen
  secondary_networks:
  - attention
  preferred_modalities:
  - tdcs
  - tps
  tdcs_target: L-DLPFC anodal (F3) with higher intensity
  tps_target: F3, Fz, FC3

# ── Assessments ──────────────────────────────────────────────────────────────

assessments:
- scale_key: asrs
  timing: baseline
  primary: true
  notes: Adult ADHD Self-Report Scale (ASRS v1.1). WHO-developed 18-item scale. 6-item screener (Part A) highly specific.

- scale_key: caars
  timing: baseline
  primary: false
  notes: Conners Adult ADHD Rating Scale. Clinician-administered and self-report versions. Provides factor scores for inattention, hyperactivity, impulsivity, and self-concept.

- scale_key: brief
  timing: baseline
  primary: false
  notes: Behavior Rating Inventory of Executive Function. Ecological assessment of executive function in daily life.

- scale_key: cpt3
  timing: baseline
  primary: false
  notes: Conners Continuous Performance Test. Objective neuropsychological measure of sustained attention, vigilance, and impulsivity.

- scale_key: moca
  timing: baseline
  primary: false
  notes: Cognitive screening to exclude MCI/dementia mimicking ADHD in adults >=50 years.

- scale_key: phq9
  timing: baseline
  primary: false
  notes: Patient Health Questionnaire-9. Screen for comorbid depression which affects up to 30% of adult ADHD patients.

- scale_key: gad7
  timing: baseline
  primary: false
  notes: Generalized Anxiety Disorder-7. Screen for comorbid anxiety which affects up to 50% of adult ADHD patients.

- scale_key: wfirs
  timing: baseline
  primary: false
  notes: Weiss Functional Impairment Rating Scale. Assesses ADHD-related functional impairment across family, work, school, social, and self-concept domains.

