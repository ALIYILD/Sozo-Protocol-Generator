assessments:
- scale_key: ISI
  timing: Baseline, 2-weekly during treatment, discharge
  primary: false
  notes: 0-7 no insomnia; 8-14 sub-threshold; 15-21 moderate; 22-28 severe. MCID = 6 points. Gold standard insomnia outcome
    measure (Bastien et al. 2001).
- scale_key: PSQI
  timing: Baseline, monthly, discharge
  primary: false
  notes: Score > 5 indicates poor sleeper; > 10 severe impairment. 7-component comprehensive sleep quality measure.
- scale_key: ESS
  timing: Baseline, 4-weekly
  primary: false
  notes: 0-10 normal; 11-24 excessive daytime sleepiness. ESS > 10 raises concern for OSA or hypersomnia — investigate before
    neurostimulation.
- scale_key: DASS21
  timing: Baseline, 4-weekly, discharge
  primary: false
  notes: Active severe depression warrants reassessment of primary diagnosis and treatment prioritisation. Critical for identifying
    comorbid insomnia phenotype.
