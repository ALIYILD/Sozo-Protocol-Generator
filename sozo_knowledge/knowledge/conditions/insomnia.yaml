clinical_tips:
- CES is the primary modality — it has the strongest evidence base for insomnia and the best safety profile of all neurostimulation
  options.
- Always confirm OSA exclusion before commencing any sleep-promoting neurostimulation — safety principle.
- CES is complementary to CBT-I, not a replacement. Patients who have not had adequate CBT-I exposure should be referred or
  offered sleep hygiene + stimulus control alongside CES.
- 'For CES non-responders: titrate intensity upward slowly (10 microamps per 2 sessions) before declaring non-response. Many
  patients respond better at 40-60 microamps than the starting dose.'
- Encourage patients to use CES in a relaxation-conducive environment — dim lights, quiet, prone or semi-reclined. Combining
  with breathing exercises enhances the calming response.
- Slow-oscillation tDCS requires real-time EEG-triggered delivery — advise against home-based tDCS as a 'sleep enhancement'
  tool without this infrastructure.
- Early morning awakening with prominent diurnal mood variation and anhedonia — screen for melancholic depression as primary
  diagnosis before treating as insomnia.
- Night shift workers need circadian realignment first — insomnia protocol without addressing circadian disruption will have
  limited effect.
- 'For comorbid insomnia with anxiety/depression: CES is advantageous as it targets both sleep and mood. Coordinate with mental
  health treating clinician.'
- Sleep diary data is essential for treatment monitoring — 2-week baseline before starting, maintained throughout. Objective
  actigraphy adds value if available.
governance_rules:
- No Fellow or Clinical Assistant may independently modify treatment plans without Doctor authorization
- All TPS applications require explicit off-label informed consent and Doctor authorization
- Adverse events must be documented within 24 hours and escalated per clinic protocol
- Treatment records must be updated at every session
- Informed consent must be obtained and documented before initiating any modality
- OSA exclusion documentation required before commencing CES or any sleep-promoting neurostimulation (ESS ≤ 10 or known-treated
  OSA with stable CPAP).
- 'INVESTIGATIONAL NOTICE: Slow-oscillation tDCS for insomnia is investigational. Requires ethics board approval for research
  protocols. Not for routine clinical use without sleep laboratory EEG infrastructure.'
- Concurrent psychotropic medication review mandatory — identify agents with sleep-disruptive potential and liaise with prescribing
  clinician.
- Daytime sedation risk counselling must be provided and documented prior to CES commencement — patient must not drive within
  2 hours of CES session.
- Monthly DASS-21 monitoring mandatory — insomnia treatment may unmask or worsen underlying depression.
- Adequate prior CBT-I trial must be documented for chronic insomnia disorder (CID) phenotype before neurostimulation approval.
- CES device regulatory status must be confirmed for jurisdiction prior to clinical use — FDA Class III cleared (USA); TGA/MHRA/CE
  registration status varies.
