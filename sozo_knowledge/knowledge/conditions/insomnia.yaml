  - ces
  tdcs_target: ''
  tps_target: ''
- slug: cid
  label: Chronic Insomnia Disorder (Treatment-Resistant)
  description: Longstanding insomnia (> 6 months) having failed adequate CBT-I and pharmacotherapy. Represents entrenched
    hyperarousal with conditioned arousal and cortical hyperarousal patterns (elevated beta during sleep). Primary indication
    for neurostimulation adjuncts. Frame as adjunct to, not replacement for, behavioural interventions.
  key_features:
  - Multi-year insomnia history
  - Failed CBT-I and pharmacotherapy
  - Significant daytime impairment
  - Conditioned bedroom arousal
  - Sleep anxiety prominent
  primary_networks:
  - dmn
  - limbic
  - sn
  secondary_networks: []
  preferred_modalities:
  - ces
