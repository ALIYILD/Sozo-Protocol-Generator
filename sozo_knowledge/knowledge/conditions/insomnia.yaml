category: mixed
version: '1.0'
overview: Chronic Insomnia Disorder (CID) is characterized by persistent difficulty initiating or maintaining sleep, or early
  morning awakening, occurring at least three nights per week for at least three months, causing significant distress or functional
  impairment. It affects approximately 10-15% of the adult population and is the most prevalent sleep disorder worldwide.
  Insomnia involves a state of cortical and autonomic hyperarousal — a failure of the normal sleep-wake transition to suppress
  default mode network (DMN) activity and limbic-emotional processing. Neuroimaging consistently shows elevated resting-state
  DMN connectivity, increased anterior cingulate and prefrontal metabolic activity at sleep onset, and heightened amygdala
  reactivity to emotional stimuli in insomnia patients compared to good sleepers. Cognitive Behavioural Therapy for Insomnia
  (CBT-I) is the gold standard first-line treatment. Neurostimulation approaches — particularly Cranial Electrotherapy Stimulation
  (CES) and investigational slow-oscillation tDCS during sleep — offer adjunctive options for treatment-resistant cases or
  those who cannot complete CBT-I, with CES showing the strongest evidence base among non-pharmacological device therapies.
pathophysiology: 'The hyperarousal model of insomnia posits that CID reflects a global state of physiological, cortical, and
  cognitive overactivation that prevents sleep initiation and maintenance. At the neurobiological level, insomnia is associated
  with: (1) Failure of the ventrolateral preoptic area (VLPO) to adequately inhibit arousal systems (LC, TMN, DRN) via GABAergic
  and galaninergic mechanisms — the ''flip-flop switch'' dysfunction; (2) Elevated HPA axis activity with increased cortisol
  at sleep onset, reflecting chronic stress-system engagement; (3) Cortical hyperarousal evident as elevated high-frequency
  EEG activity (beta, gamma) during NREM sleep, reduced slow-wave activity (delta power), and impaired sleep spindle generation
  from thalamocortical circuits; (4) DMN hyperconnectivity and failure to deactivate medial prefrontal cortex (mPFC) and posterior
  cingulate cortex (PCC) during sleep-wake transition; (5) Amygdala hyperreactivity contributing to intrusive worry and cognitive
  arousal at bedtime; (6) Reduced GABA concentrations in prefrontal and occipital cortex, impeding inhibitory tone; (7) Adenosine
  dysregulation reducing homeostatic sleep pressure. CES (0.5 Hz, 100 microamps) is believed to enhance inhibitory tone by
  entraining slow-wave oscillatory activity and modulating serotonin, beta-endorphin, and cortisol. Slow-oscillation tDCS
  (0.75 Hz, 0.26 mA peak-to-peak) applied via frontal electrodes during NREM sleep phases has been shown to boost delta power
  and memory consolidation in controlled sleep laboratory settings, though translation to home-based insomnia treatment requires
  further validation.'
core_symptoms:
- Difficulty initiating sleep (sleep onset latency > 30 minutes)
- Difficulty maintaining sleep (WASO > 30 minutes)
- Early morning awakening (> 30 minutes before desired wake time)
- Non-restorative or poor-quality sleep
- Daytime fatigue and low energy
- Impaired daytime attention and concentration
- Mood disturbance (irritability, dysphoria, anxiety)
- Daytime performance impairment (occupational, social, academic)
- Subjective cognitive complaints (memory, executive function)
- Persistent worry about sleep and its consequences
non_motor_symptoms:
- Chronic fatigue and low energy
- Cognitive slowing and poor concentration
- Mood disturbance and emotional dysregulation
- Increased risk of depression and anxiety (bidirectional relationship)
- Cardiovascular risk (elevated with chronic insomnia)
- Metabolic dysregulation (impaired glucose metabolism with sleep restriction)
- Immune system suppression
- Increased pain sensitivity and somatic complaints
- Social withdrawal and reduced quality of life
brain_regions:
- Medial Prefrontal Cortex (mPFC) — DMN hub; hyperactive at sleep onset, target for inhibition
- Posterior Cingulate Cortex (PCC) — DMN node; elevated activation in insomnia
- Anterior Cingulate Cortex (ACC) — arousal and worry generation, SN node
- Amygdala — hyperreactive emotional processing, limbic hyperarousal driver
- Hippocampus — memory consolidation impaired by poor sleep
- Ventrolateral Preoptic Area (VLPO) — sleep-promoting GABAergic neurons
- Thalamus — sleep spindle generation and sensory gating during NREM
- Locus Coeruleus (LC) — noradrenergic arousal centre, overactive in insomnia
- Prefrontal Cortex (dorsolateral) — executive control of rumination and worry
- Insula — interoceptive hyperarousal and autonomic regulation
brain_region_details:
  mPFC: Default mode hub that should deactivate during sleep onset; failure to suppress drives cognitive arousal
  PCC: DMN posterior node; elevated connectivity with mPFC maintains wakefulness-related network activity
  ACC: Mediates worry, rumination, and cognitive arousal; target for CES-mediated inhibition
  Amygdala: Hyperreactive to sleep-related threat appraisals; drives limbic arousal maintaining wakefulness
  VLPO: GABAergic sleep-promoting region; insufficient inhibitory output sustains arousal systems
  Thalamus: Spindle generation impaired in insomnia; slow-oscillation tDCS may enhance thalamocortical synchrony
  LC: Noradrenergic arousal system; should be inhibited by VLPO at sleep onset but remains overactive in insomnia
  DLPFC: Executive control of rumination; CES and tDCS may modulate prefrontal excitability
  Insula: Interoceptive hyperarousal contributing to somatic vigilance and body-focused arousal
  Hippocampus: Memory consolidation during slow-wave sleep; impaired consolidation with insomnia-related delta power reduction
network_profiles:
- network: dmn
  dysfunction: hyper
  severity: severe
  primary: true
  relevance: 'Primary network in insomnia. Normal sleep onset requires coordinated DMN deactivation. In insomnia, elevated
    mPFC-PCC connectivity persists into sleep-onset periods, generating self-referential thought, worry, and anticipatory
    arousal. Therapeutic goal: Reduce DMN hyperconnectivity to facilitate sleep onset.'
  evidence_note: Established; resting-state fMRI evidence (Drummond et al., Spiegelhalder et al.)
- network: limbic
  dysfunction: hyper
  severity: high
  primary: false
  relevance: Limbic hyperarousal — particularly amygdala hyperreactivity and elevated ACC activity — is a core feature of
    insomnia. Amplifies emotional responses to sleep-related stimuli. CES reduces amygdala reactivity and promotes limbic
    inhibition.
  evidence_note: Moderate; amygdala hyperreactivity in CID established by neuroimaging studies
- network: sn
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: The Salience Network shows heightened activation during attempted sleep, reflecting excessive interoceptive monitoring.
    ACC hyperactivation sustains sleep-related worry and cognitive hyperarousal in insomnia.
  evidence_note: Moderate; ACC hyperactivation replicated across fMRI insomnia studies
primary_network: dmn
fnon_rationale: 'Insomnia maps to a triple-network hyperarousal state in the FNON framework: the DMN fails to execute the
  normal deactivation required for sleep onset, the Limbic Network sustains emotional and autonomic arousal preventing sleep
  initiation, and the SN drives persistent interoceptive vigilance. Unlike conditions where SN-DMN imbalance reflects CEN
  underactivity, insomnia''s core dysfunction is a failure of the global inhibitory state transition. Neurostimulation targets
  this by: (1) CES — delivering oscillating sub-threshold current (0.5 Hz, 100 microamps alpha-theta range) that promotes
  synchronised slow oscillatory activity across frontal midline structures, reducing the high-frequency cortical activity
  characteristic of hyperarousal; (2) Slow-oscillation tDCS — phase-coupled frontal stimulation at 0.75 Hz during NREM to
  boost delta power and thalamocortical synchrony (investigational, requires sleep lab delivery). The therapeutic target is
  restoration of the normal inhibitory state transition from wakefulness to NREM sleep.'
phenotypes:
- slug: soi
  label: Sleep Onset Insomnia
  description: Predominant difficulty with sleep initiation (SOL > 30 minutes). Associated with cognitive hyperarousal — racing
    thoughts, worry about sleep, and anticipatory anxiety. Strongest association with DMN hyperconnectivity and limbic hyperarousal
    at bedtime. CES applied 30-45 minutes before intended sleep onset. CBT-I concurrent.
  key_features:
  - SOL > 30 minutes
  - Racing thoughts at bedtime
  - Anticipatory sleep anxiety
  - Bedroom cue-dependent arousal
  - Clock-watching behaviour
  primary_networks:
  - dmn
  - limbic
  secondary_networks: []
  preferred_modalities:
  - ces
  tdcs_target: ''
  tps_target: ''
- slug: smi
  label: Sleep Maintenance Insomnia
  description: Difficulty maintaining sleep with frequent nocturnal awakenings (WASO > 30 minutes). Often associated with
    hyperactivation of arousal systems during NREM sleep — elevated beta power during slow-wave sleep stages. Common in middle-aged
    and older adults. Consider comorbid pain, GERD, or nocturia.
  key_features:
  - WASO > 30 minutes
  - Frequent nocturnal awakenings
  - Light/fragmented sleep
  - Unrefreshing sleep
  - Heightened noise sensitivity at night
  primary_networks:
  - sn
  - limbic
  secondary_networks: []
  preferred_modalities:
  - ces
  tdcs_target: ''
  tps_target: ''
- slug: ema
  label: Early Morning Awakening Insomnia
  description: Awakening 30+ minutes before desired wake time with inability to return to sleep. Strongly associated with
    depression (melancholic subtype) and circadian phase advance. Screen for major depression (PHQ-9); refer if EMA with diurnal
    mood variation and anhedonia.
  key_features:
  - Wake 30+ min before desired time
  - Cannot return to sleep
  - Morning mood nadir
  - Early morning rumination
  - Marked daytime fatigue
  primary_networks:
  - dmn
  - limbic
  secondary_networks: []
  preferred_modalities:
  - ces
  tdcs_target: ''
  tps_target: ''
- slug: comorbid_ins
  label: Comorbid Insomnia Disorder
  description: 'Insomnia co-occurring with a primary psychiatric (depression, anxiety, PTSD, OCD) or medical condition (chronic
    pain, neurological disease). Bidirectional: insomnia worsens mood disorder outcomes; untreated mood disorders worsen insomnia.
    CES has evidence for both insomnia and anxiety/depression comorbidities.'
  key_features:
  - Active mood/anxiety comorbidity
  - Mixed sleep complaints
  - Anxiety-onset insomnia
  - Depression-associated EMA
  - PTSD hyperarousal-driven insomnia
  primary_networks:
  - dmn
  - limbic
