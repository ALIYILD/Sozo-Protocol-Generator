protocols:
- protocol_id: C-INS-CES
  label: Standard CES Pre-Sleep Protocol
  modality: ces
  target_region: Bilateral auricular
  target_abbreviation: CES
  target_electrodes: []
  phenotype_slugs:
  - soi
  - smi
  - cid
  - comorbid_ins
  network_targets:
  - dmn
  - limbic
  parameters:
    intensity: 10-100 microamps (start low, titrate)
    frequency: 0.5 Hz
    duration_min: 20
    timing: 30-45 min before bed
    sessions_per_week: Daily x 3 weeks, then 5x/week
  rationale: 'CES is the primary neurostimulation modality for insomnia. Best evidence among neurostimulation approaches for
    sleep. Concurrent CBT-I sleep restriction or stimulus control recommended. ISI reassessment at Week 2 — titrate intensity
    if < 6 point improvement. Responder: ISI reduction ≥ 6 points. Remission: ISI < 8.'
  evidence_level: medium
  off_label: false
  session_count: 21
  notes: First-line protocol. Use quiet/dimly lit room. Avoid within 2 hours of driving.
- protocol_id: C-INS-COG
  label: CES + Sleep Hygiene for Cognitive Hyperarousal
  modality: ces
  target_region: Bilateral auricular
  target_abbreviation: CES
  target_electrodes: []
  phenotype_slugs:
  - soi
  - cid
  network_targets:
  - dmn
  - limbic
  parameters:
    intensity: 10-60 microamps
    frequency: 0.5 Hz
    duration_min: 20
    timing: 30-60 min before bed
    concurrent: Cognitive de-arousal techniques (constructive worry, imagery diversion)
  rationale: Combines CES with cognitive de-arousal for sleep onset insomnia with prominent cognitive hyperarousal (racing
    thoughts, worry, planning). CBT-I sleep restriction initiated at Week 2 if SOL > 45 min consistently.
  evidence_level: medium
  off_label: false
  session_count: 16
  notes: Best for cognitive arousal phenotype. Document prior/concurrent CBT-I trial.
- protocol_id: TDCS-INS-SO
  label: Slow-Oscillation tDCS — Sleep Maintenance (INVESTIGATIONAL)
  modality: tdcs
  target_region: Frontal cortex bilateral (Fz anode, Oz cathode)
  target_abbreviation: FP
  target_electrodes: []
  phenotype_slugs:
  - smi
  - cid
  network_targets:
  - dmn
  parameters:
    type: Oscillatory tDCS (so-tDCS)
    waveform: 0.75 Hz sinusoidal
    peak_to_peak_ma: 0.26
    delivery: EEG-triggered during N2/N3 NREM — sleep lab required
  rationale: INVESTIGATIONAL. Phase-coupled slow-oscillation tDCS during NREM entrains cortical slow oscillations, boosting
    delta power and sleep spindle density. Evidence from Marshall et al. (2006) and Frase et al. (2019). Requires ethics approval.
    NOT for routine clinical use.
  evidence_level: low
  off_label: true
  session_count: 8
  notes: Requires PSG/EEG capability. Standard DC tDCS without phase-coupling does NOT work.
safety_rules:
- category: contraindication
  description: Active implanted electronic devices in the head/neck region
  severity: absolute
  modalities: []
  source: Manufacturer guidelines and consensus safety statements
- category: stopping_rule
  description: 'Discontinue immediately for Grade 3 adverse events: new seizure, severe headache, syncope, skin burn, worsening
    of psychiatric symptoms requiring acute intervention'
  severity: high
  modalities: []
  source: ''
- category: monitoring
  description: Assess and document adverse events at every session using a standardized monitoring checklist
  severity: moderate
  modalities: []
  source: ''
- category: precaution
  description: Ensure consistent medication state (ON or OFF) throughout treatment blocks to avoid false responder/non-responder
    classification
  severity: moderate
  modalities: []
  source: ''
- category: Skin Tolerance — CES Electrode Placement
  description: CES earclip electrodes must be checked for proper contact and moisture with conductive gel. Skin irritation
    or burns from dry or poorly positioned electrodes have been reported. Instruct patient to stop immediately if burning
    sensation at electrode site. Inspect ears before and after each session.
  severity: medium
  modalities: []
  source: Alpha-Stim device guidelines; FDA Class III device requirements
- category: Sedation Risk — CES + CNS Depressants
  description: Additive sedative effect is possible when CES is combined with benzodiazepines, Z-drugs, antihistamines, or
    other sedating medications. Advise patients not to drive for at least 2 hours following CES session. Reduce expected medication
    dose requirement over time if CES is effective — taper under medical supervision.
  severity: medium
  modalities: []
  source: Clinical pharmacology; Alpha-Stim post-market surveillance
- category: Daytime Sleepiness Screening
  description: CES and sleep-promoting neurostimulation must not be used in patients with undiagnosed excessive daytime sleepiness
    (ESS > 10) until OSA or other hypersomnia has been excluded. Neurostimulation that deepens sleep or reduces cortical arousal
    could theoretically reduce protective arousal responses in patients with undiagnosed sleep-disordered breathing.
  severity: high
  modalities: []
  source: Sleep medicine safety principle; ESS screening protocol
- category: Psychiatric Comorbidity Monitoring
  description: Monitor for emergence or worsening of mood symptoms during treatment. Insomnia is bidirectionally linked with
    depression — improvement in sleep may unmask underlying depression as insomnia improves. Conversely, worsening mood with
    sleep changes requires psychiatric review. Administer DASS-21 monthly throughout treatment.
  severity: medium
  modalities: []
  source: Clinical governance; insomnia-depression bidirectional model
- category: Realistic Expectations and Outcome Framing
  description: Neurostimulation for insomnia is an adjunct to, not a replacement for, CBT-I. Patients should understand that
    realistic goals are improvements in sleep quality and daytime functioning, not necessarily perfect sleep. Prior or concurrent
    CBT-I should be documented. Avoid perpetuating sleep effort and hyperarousal by framing device use as another 'sleep tool'
    requiring effort — use minimal dose and integrate with sleep hygiene principles.
  severity: low
  modalities: []
  source: CBT-I guidelines; clinical governance
contraindications:
- Active implanted devices (cochlear implants, deep brain stimulators, cardiac pacemakers/defibrillators) unless explicitly
  cleared by device manufacturer
- Metallic implants in the head or neck region within the stimulation field
- Active epilepsy with uncontrolled seizures (relative contraindication — requires neurologist clearance)
- Skull defects or craniectomy at stimulation sites
- Skin lesions, wounds, or dermatological conditions at electrode placement sites
- Active malignancy of the central nervous system
- Pregnancy (precautionary contraindication — insufficient safety data)
- Severe psychiatric crisis requiring immediate hospitalization
- Active obstructive sleep apnoea without treatment (CES may reduce arousal responses — safety concern)
- Active mania or hypomania (CES may precipitate sleep disruption)
- Severe alcohol dependence — sleep architecture effects unpredictable
- Recent head injury (< 3 months) — defer to TBI protocol
inclusion_criteria:
- DSM-5 / ICSD-3 Chronic Insomnia Disorder diagnosis confirmed
- ISI ≥ 10 (sub-threshold or clinical insomnia)
- Minimum 3 months symptom duration
- Age ≥ 18 years
- Stable or no concurrent medication for ≥ 2 weeks prior to commencement
- Capacity to provide informed consent
- Obstructive sleep apnoea ruled out or treated (ESS ≤ 10, or known and treated OSA with stable CPAP)
exclusion_criteria:
- Active untreated obstructive sleep apnoea (ESS > 10 without investigation)
- Narcolepsy or other primary hypersomnia disorder
- Severe untreated psychiatric disorder requiring immediate intervention
- Active substance use disorder (alcohol, hypnotics, stimulants)
- Uncontrolled medical condition disrupting sleep (uncontrolled pain, thyroid disease, GERD, nocturia requiring urological
  workup)
- Active suicidal ideation (refer for psychiatric assessment first)
- Pregnancy
- Night shift workers without commitment to circadian schedule stabilisation
- PTSD-predominant insomnia with active nightmares — consider trauma-focused treatment as primary
responder_criteria:
- ISI reduction ≥ 6 points (clinically meaningful improvement) by Week 4
- PSQI reduction ≥ 2 points by Week 4
- Subjective sleep quality rated 'good' or 'fairly good' on PSQI component 1
- Sleep diary mean SOL < 30 minutes sustained over 2 weeks
- Sleep diary mean WASO < 30 minutes (if SMI phenotype)
- Patient-reported improvement in daytime functioning and energy
non_responder_pathway: 'At Week 4: If ISI reduction < 3 points — review diagnosis. Has OSA been excluded? Is there active
  untreated psychiatric comorbidity dominating sleep? Has medication review identified sleep-disruptive agents? If diagnosis
  confirmed — intensify CBT-I (sleep restriction protocol if not commenced). Consider psychiatry referral for pharmacotherapy
  (low-dose doxepin, trazodone, or suvorexant). For CES non-responders: titrate intensity upward if still at low dose; consider
  switch to taVNS adjunct trial for autonomic hyperarousal phenotype. For refractory insomnia (> 3 failed treatments): refer
  to sleep medicine specialist for polysomnography and comprehensive management including possible CBT-I intensive programme.'
evidence_summary: 'CRANIAL ELECTROTHERAPY STIMULATION (CES): The strongest evidence base among neurostimulation approaches
  for insomnia. Multiple RCTs and meta-analyses support modest-to-moderate efficacy for sleep latency, sleep quality, and
  daytime anxiety reduction. Feige et al. (2014) systematic review and prior meta-analyses consistently show effect sizes
  in the small-to-moderate range (d = 0.3-0.6) for insomnia severity measures. Safety profile is excellent with transient
  skin irritation as the most common adverse event. FDA-cleared Class III device. Evidence quality: MEDIUM (multiple RCTs
  but variable methodology, small samples).


  SLOW-OSCILLATION tDCS: Compelling mechanistic rationale based on entrainment of cortical slow oscillations. Marshall et
  al. (2006) landmark study in healthy subjects showed significant slow-wave activity enhancement and declarative memory consolidation
  benefit. Frase et al. (2019) pilot trial in primary insomnia showed preliminary sleep quality improvement. However, requires
  real-time EEG-triggered delivery in sleep laboratory — not feasible for routine clinical use. Home-based tDCS applied during
  presumed sleep lacks phase-coupling evidence. Evidence quality: LOW-INVESTIGATIONAL.


  taVNS FOR INSOMNIA: Limited direct evidence. Mechanistic rationale via autonomic modulation and limbic inhibition is sound.
  Small pilot studies in anxiety/insomnia comorbidity suggest benefit. Evidence quality: VERY LOW — adjunct use only.


  OVERALL EVIDENCE QUALITY: MEDIUM for CES; VERY LOW/INVESTIGATIONAL for tDCS and taVNS.'
evidence_quality: medium
evidence_gaps:
- Large-scale RCTs of CES for insomnia with rigorous sham controls (electrical perception confound)
- Head-to-head comparison of CES vs. CBT-I vs. pharmacotherapy in treatment-resistant insomnia
- Optimal CES parameters for insomnia (frequency, intensity, duration, timing — dose-response data lacking)
- Home-based slow-oscillation tDCS delivery without real-time EEG feedback
- Phase-coupled tDCS for insomnia in clinical (non-laboratory) settings
- Predictive biomarkers of CES response in insomnia (EEG phenotype, autonomic profile)
- Long-term maintenance outcomes for CES in chronic insomnia (> 6 months follow-up data sparse)
- taVNS randomised controlled trials specifically for insomnia disorder
- Optimal integration protocols combining CES with CBT-I (concurrent vs. sequential delivery)
- Paediatric and adolescent insomnia neurostimulation evidence is essentially absent
