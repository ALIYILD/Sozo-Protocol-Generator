  timing: baseline
  primary: false
  notes: Post-TBI depression screen. Score >=10 = moderate depression. Monitor at every session.
- scale_key: psqi
  timing: baseline
  primary: false
  notes: Sleep assessment critical in TBI — sleep disturbance worsens all PCS symptoms. Score >5 = poor sleep quality.
- scale_key: brief2
