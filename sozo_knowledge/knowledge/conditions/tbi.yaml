category: neurological
version: '1.0'
overview: 'Traumatic Brain Injury (TBI) encompasses a spectrum from mild concussion (mTBI) to severe injury, caused by external
  mechanical force to the head. Mild TBI (mTBI/concussion) is the most prevalent form, with 60-90% of all TBIs classified
  as mild. Post-Concussion Syndrome (PCS) describes persistent symptoms beyond the expected recovery window (>4 weeks), including
  cognitive impairment (brain fog, memory difficulties), headache, fatigue, sleep disturbance, emotional dysregulation, and
  mood disorders. PCS affects 10-30% of mTBI patients and is highly disabling.


  Neuromodulation in TBI/PCS targets the DLPFC to address cognitive and emotional sequelae. tDCS shows emerging evidence in
  several pilot studies for improving cognitive function, reducing fatigue, and improving mood post-TBI. taVNS is under investigation
  for vagal-mediated neuroplasticity and autonomic dysregulation (common in TBI).'
pathophysiology: 'TBI pathophysiology involves two injury phases. Primary injury occurs at impact: mechanical deformation
  causes neuronal cell death, axonal shear injury (diffuse axonal injury — DAI), vascular disruption, and contusions. Secondary
  injury cascade follows: excitotoxicity (glutamate release), calcium influx, mitochondrial dysfunction, oxidative stress,
  neuroinflammation (microglial activation), cerebral edema, and axonal degeneration.


  Mild TBI/concussion produces neurometabolic dysfunction without structural damage visible on standard MRI: ionic flux disturbance,
  impaired glucose metabolism (FDG-PET hypometabolism), and disruption of white matter connectivity (detectable on DTI). These
  metabolic changes explain the clinical symptom cluster.


  Chronic TBI pathophysiology involves: persistent neuroinflammation; white matter tract degeneration (reduced fractional
  anisotropy on DTI); cholinergic and dopaminergic disruption (particularly basal forebrain and frontal circuits); and network-level
  connectivity changes — CEN hypofunction, DMN hyperactivation, and impaired SN network switching. Post-TBI depression and
  anxiety reflect HPA axis dysregulation, limbic network changes, and adjustment disorder components.'
core_symptoms:
- Cognitive impairment — brain fog, slowed processing speed, working memory difficulties
- Headache — tension-type, migraine-like, or pressure-quality post-concussive
- Fatigue — disproportionate physical and mental fatigability
- Sleep disturbance — insomnia, hypersomnia, sleep architecture changes
- Dizziness and vestibular symptoms
- Sensory sensitivity — photophobia, phonophobia
- Concentration and attention difficulties
non_motor_symptoms:
- Depression (25-50% post-TBI)
- Anxiety and irritability
- Emotional dysregulation — low threshold for emotional reactions
- Apathy and reduced motivation
- Pain hypersensitivity (central sensitization component)
- Social and occupational functional impairment
brain_regions:
- Dorsolateral Prefrontal Cortex (DLPFC)
- Anterior Cingulate Cortex (ACC)
- Hippocampus
- White Matter Tracts (corpus callosum, uncinate fasciculus)
- Thalamus
- Anterior Insula / Salience Network Hubs
brain_region_details:
  Dorsolateral Prefrontal Cortex (DLPFC): Highly vulnerable to TBI-related white matter disruption and CEN hypofunction. Working
    memory, executive function, and emotion regulation impaired. Primary tDCS anodal target.
  Anterior Cingulate Cortex (ACC): Impaired conflict monitoring, error detection, and arousal regulation post-TBI. Contributes
    to attention deficits and emotional dysregulation.
  Hippocampus: Vulnerable to TBI excitotoxicity and corticosteroid-mediated damage. Memory encoding and contextual processing
    impaired. Volume reduction documented in moderate-severe TBI.
  White Matter Tracts (corpus callosum, uncinate fasciculus): Primary site of diffuse axonal injury (DAI) in mTBI. DTI fractional
    anisotropy reduction correlates with cognitive and emotional symptom severity.
  Thalamus: Thalamic involvement in moderate-severe TBI disrupts sensory gating, arousal, and cortical connectivity. Central
    to fatigue and sensory sensitivity post-TBI.
  Anterior Insula / Salience Network Hubs: Impaired interoceptive processing and network switching. Contributes to fatigue,
    pain sensitivity, and emotional dysregulation in PCS.
network_profiles:
- network: cen
  dysfunction: hypo
  severity: severe
  primary: true
  relevance: PRIMARY NETWORK IN TBI. CEN hypofunction — DLPFC and parietal — is the most consistent network finding in TBI
    neuroimaging. Impairs working memory, attention, executive function, and top-down emotional regulation. Correlates with
    post-concussive cognitive symptoms. Primary tDCS target for cognitive rehabilitation.
  evidence_note: Multiple resting-state fMRI studies of mTBI; CEN hypofunction correlates with PCS severity
- network: dmn
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: DMN hyperactivation and failure to deactivate during task performance is documented in mTBI. Abnormal CEN-DMN
    anticorrelation mirrors ADHD-like network pattern. Contributes to attentional intrusions, rumination, and cognitive fatigability.
  evidence_note: DMN disruption post-TBI; Mayer et al. — altered resting-state connectivity
- network: sn
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: SN dysregulation — reduced network switching efficiency — impairs the transition from DMN to CEN states. Anterior
    insula involvement drives fatigue, pain sensitivity, and altered interoceptive processing. Autonomic dysfunction reflects
    SN disruption.
  evidence_note: ''
- network: attention
  dysfunction: hypo
  severity: severe
  primary: false
  relevance: Sustained and divided attention deficits are core PCS complaints. Dorsal and ventral attention networks disrupted
    by frontal white matter tract injury. Correlates with occupational disability and return-to-sport/work delays.
  evidence_note: Attention network dysfunction in PCS; cognitive-fatigue interaction
- network: limbic
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: Post-TBI depression and anxiety reflect limbic hyperreactivity, HPA axis dysregulation, and reduced prefrontal
    inhibitory control. Amygdala hyperreactivity documented in TBI. Emotional dysregulation is one of the most disabling PCS
    consequences.
  evidence_note: Post-TBI limbic dysregulation; HPA axis disruption in TBI
primary_network: cen
fnon_rationale: In TBI/PCS, the primary dysfunctional network is the Central Executive Network (CEN), disrupted by diffuse
  axonal injury to prefrontal-parietal white matter tracts and DLPFC cortical metabolic dysfunction. The FNON framework targets
  left DLPFC anodal tDCS to upregulate CEN excitability and restore CEN-DMN anticorrelation, addressing cognitive-fatigue
  symptoms. taVNS provides complementary noradrenergic upregulation and autonomic regulation. CES addresses sleep disturbance
  and anxiety/mood components via limbic and SN modulation.
