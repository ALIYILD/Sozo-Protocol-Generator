# ── Generation Hints ─────────────────────────────────────────────────────────

clinical_tips:
  - "Require patients to maintain a headache diary for >=4 weeks before treatment to establish reliable baseline migraine frequency."
  - "Schedule stimulation sessions interictally — do not stimulate during an active migraine attack for preventive protocols."
  - "Screen for medication overuse headache before attributing poor response to stimulation failure."
  - "For migraine with aura, cathodal occipital tDCS is the preferred first-line protocol — do not use anodal polarity over occipital cortex."
  - "Assess for allodynia at each session — presence indicates central sensitisation and may predict poorer response to peripheral-target protocols."
  - "Consider triptan and CGRP medication timing relative to stimulation sessions — document consistently."
  - "For chronic migraine patients, expect slower response trajectory — extend assessment window to 8 weeks before declaring non-response."
  - "Comorbid depression and anxiety are common in chronic migraine — screen with PHQ-9 and GAD-7 at baseline and track throughout treatment."

governance_rules:
  - "All protocols require Doctor-level authorisation before initiation."
  - "Informed consent must be obtained and documented prior to first session."
  - "Outcome measures must be recorded at baseline, mid-treatment, and endpoint."
  - "Adverse events must be documented and reported within 24 hours."
  - "Protocol modifications require Doctor review and re-authorisation."

patient_journey_notes:
  stage_1: >-
    Confirm migraine diagnosis (ICHD-3 criteria). Exclude secondary headache
    with appropriate imaging. Review headache diary (>=4 weeks baseline). Screen
    for medication overuse, hemiplegic migraine, and comorbid conditions.
  stage_3: >-
    Administer HIT-6, MIDAS, VAS pain, Allodynia-12. Document migraine
    frequency, prophylactic medications, acute rescue medication use, and
    identify phenotype (aura, chronic, vestibular).
