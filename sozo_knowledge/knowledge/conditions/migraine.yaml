# ── Generation Hints ──────────────────────────────────────────────────────────

clinical_tips:
  - "Require patients to maintain a headache diary for >=4 weeks before treatment to establish reliable baseline migraine frequency."
  - "Schedule stimulation sessions interictally — do not stimulate during an active migraine attack for preventive protocols."
  - "Screen for medication overuse headache before attributing poor response to stimulation failure."

governance_rules:
  - "All protocols require Doctor-level authorisation before initiation."
  - "Informed consent must be obtained and documented prior to first session."
  - "Outcome measures must be recorded at baseline, mid-treatment, and endpoint."
  - "Adverse events must be documented and reported within 24 hours."
  - "Protocol modifications require Doctor review and re-authorisation."

patient_journey_notes:
  stage_1: "Confirm migraine diagnosis (ICHD-3 criteria). Exclude secondary headache. Review headache diary (>=4 weeks baseline). Screen for medication overuse."
  stage_3: "Administer HIT-6, MIDAS, VAS pain. Document migraine frequency, prophylactic medications, and acute rescue medication use."
