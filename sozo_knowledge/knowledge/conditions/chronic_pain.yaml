neuromod_profile:
  key_symptoms: >
    Persistent pain (>3 months), hyperalgesia, allodynia, fatigue, sleep disturbance, mood changes, catastrophizing, functional impairment
  qeeg_patterns: >
    ↑ theta (all regions), ↑ alpha (resting), ↓ alpha peak frequency (parieto-occipital), ↑ frontal beta (cortical hyperexcitability), thalamocortical dysrhythmia pattern, ↓ EO/EC reactivity, ↑ delta in migraine
  qeeg_electrodes: "Cz, C3, C4 (central theta/alpha), Pz, P3, P4 (parietal alpha slowing), F3, Fp1 (frontal reactivity), T3/T4 (temporal changes)"
  affected_regions: >
    S1 (somatosensory cortex), M1, ACC, anterior insula, thalamus, PFC, periaqueductal gray (PAG), amygdala
  primary_networks_disrupted: >
    Pain matrix/Salience (hyperactive — ACC, insula, S1, thalamus), DMN (disrupted in chronic pain), Descending pain modulatory network (impaired), CEN (altered)
  network_dysfunction_pattern: >
    Thalamocortical dysrhythmia → abnormal theta burst from thalamus → ↑ pain perception; ACC/insula hyperactivity → amplified nociceptive processing; descending PAG modulation impaired
  recommended_techniques: >
    tDCS anode M1 (C3/C4) cathode Fp2; TMS 10 Hz M1 contralateral; CES Alpha-Stim; taVNS 100 Hz; DBS thalamus/PAG; LIFU thalamus/ACC; PBM 810 nm; PEMF
  primary_stimulation_targets: "M1 contralateral (C3/C4), thalamus, ACC, PAG"
  stimulation_rationale: >
    M1 excitation activates descending pain modulatory pathways via corticothalamic feedback; VNS engages anti-nociceptive brainstem pathways; thalamic targets normalize dysrhythmia
