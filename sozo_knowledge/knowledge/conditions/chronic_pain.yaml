clinical_tips:
- Prioritize M1 bilateral anodal protocol for primary pain reduction — this has the strongest evidence
- Add left DLPFC anodal protocol for patients with significant depression or catastrophizing component
- Prescribe CES for home use to address sleep disturbance — sleep optimization markedly improves pain treatment response
- Monitor NRS pain at every session — document pain trajectory for outcome tracking and responder classification
- Reassure patients that initial sessions may not show immediate pain reduction — cumulative effects typically emerge at Week
  3-4
governance_rules:
- No Fellow or Clinical Assistant may independently modify treatment plans without Doctor authorization
- All TPS applications require explicit off-label informed consent and Doctor authorization
- Adverse events must be documented within 24 hours and escalated per clinic protocol
- Treatment records must be updated at every session
- Informed consent must be obtained and documented before initiating any modality
