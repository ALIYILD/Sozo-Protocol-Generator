contraindications:
- Active implanted devices (cochlear implants, deep brain stimulators, cardiac pacemakers/defibrillators) unless explicitly
  cleared by device manufacturer
- Metallic implants in the head or neck region within the stimulation field
- Active epilepsy with uncontrolled seizures (relative contraindication — requires neurologist clearance)
- Skull defects or craniectomy at stimulation sites
- Skin lesions, wounds, or dermatological conditions at electrode placement sites
- Active malignancy of the central nervous system
- Pregnancy (precautionary contraindication — insufficient safety data)
- Severe psychiatric crisis requiring immediate hospitalization
inclusion_criteria:
- Confirmed diagnosis of fibromyalgia (ACR 2010/2016 criteria) OR chronic pain >3 months
- NRS average pain >=4/10
- Age 18-70 years
- Stable analgesic medication for >=4 weeks (or medication-naive)
- Capacity to provide informed consent
- Adequate skin integrity at electrode placement sites
exclusion_criteria:
- Active inflammatory arthritis or pain with identifiable surgical cause requiring primary surgical treatment
- Active malignancy or cancer-related pain
- Severe psychiatric disorder (psychosis, active suicidality) as primary diagnosis
- Uncontrolled seizure disorder
- Pregnancy
- Active substance use disorder
responder_criteria:
- '>=30% reduction in NRS average pain from baseline (IMMPACT minimum clinically important difference)'
- '>=14% reduction in FIQR total score (fibromyalgia MCID)'
- Clinically meaningful SOZO PRS pain and fatigue domain improvement (>=3 points)
- PHQ-9 >=50% reduction (pain-depression subtype)
non_responder_pathway: 'For non-responders at Week 4:

  1. Assess and optimize sleep — untreated insomnia severely limits pain neuromodulation response

  2. Review medication stability — analgesic changes during treatment confound response

  3. Switch from DLPFC to M1 protocol (or vice versa) based on pain vs mood dominance

  4. Add CES for sleep and anxiety components if not already prescribed

  5. Extend to 20-session block if partial responder

  6. Screen for comorbid depression — undertreated depression amplifies pain

  7. Multidisciplinary pain review — confirm absence of treatable peripheral pain generator

  8. Doctor review for psychological pain management (CBT, ACT) adjunct'
evidence_summary: 'Chronic pain / fibromyalgia has the second-strongest tDCS evidence base (after stroke). M1 anodal tDCS:
  IFCN Level B (probable) for fibromyalgia. Fregni et al. (2006) seminal RCT. Marlow et al. (2013) meta-analysis confirms
  pain efficacy. Multiple subsequent positive trials. DLPFC tDCS for pain: moderate evidence — partially from MDD extrapolation.
  CES: FDA-cleared for anxiety, depression, insomnia — directly addressing FMS comorbidities. taVNS: investigational — limited
  pain-specific data.'
evidence_quality: high
evidence_gaps:
- Long-term pain relief beyond treatment block — limited follow-up data (>3 months)
- Head-to-head comparison of M1 vs DLPFC vs combined montages for fibromyalgia
- Predictors of tDCS response for chronic pain — phenotypic, psychological, or genetic markers
- Optimal session parameters (number, frequency, intensity) for chronic pain
- taVNS for chronic pain — no dedicated fibromyalgia RCT
