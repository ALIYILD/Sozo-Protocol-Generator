# Chronic Pain / Fibromyalgia — SOZO Clinical Knowledge
# Auto-extracted from condition generator. ICD-10: M79.3

slug: chronic_pain
display_name: Chronic Pain / Fibromyalgia
icd10: M79.3
aliases:
- fibromyalgia
- FMS
- chronic pain
- chronic widespread pain
- central sensitization
- CLBP
- chronic low back pain
category: mixed
version: '1.0'
overview: 'Chronic pain encompasses persistent pain lasting more than 3 months, including Fibromyalgia Syndrome (FMS), Chronic
  Low Back Pain (CLBP), and other central sensitization conditions. FMS affects 2-8% of the general population, predominantly
  women (7:1 ratio). Chronic pain represents a leading cause of disability globally.


  The transition from acute to chronic pain involves central sensitization — amplification of pain signals within the CNS
  — making neuromodulation particularly relevant. tDCS targeting M1 (motor cortex anodal — analgesic mechanism) and left DLPFC
  (emotional and cognitive aspects of pain) has the strongest evidence base among non-invasive neuromodulation for chronic
  pain. Fregni et al. (2006, Arthritis & Rheumatism) demonstrated significant pain reduction in fibromyalgia with M1 anodal
  tDCS in an RCT. CES (Alpha-Stim) provides complementary mood, anxiety, and sleep support.'
pathophysiology: 'Chronic pain involves central sensitization: amplification of nociceptive signals at spinal and supraspinal
  levels. Key mechanisms include: (1) Wind-up and long-term potentiation of dorsal horn neurons; (2) Descending facilitation
  from brainstem (rostroventromedial medulla — RVM); (3) Reduced descending inhibition (opioidergic, serotonergic, noradrenergic
  pathways); (4) Cortical reorganization — expansion of pain representations in S1 and motor cortex.


  Fibromyalgia pathophysiology: central sensitization is the core mechanism. fMRI studies demonstrate enhanced activity in
  pain-processing regions (insula, SII, anterior cingulate) with reduced descending inhibitory capacity. Abnormal DMN connectivity,
  with the DMN failing to suppress pain-related networks during rest, propagates chronicity. Neuroinflammatory mechanisms
  and glial activation contribute.


  tDCS M1 anodal mechanism: increases motor cortex excitability, which inhibits pain via corticospinal activation of brainstem
  pain modulation circuits (periaqueductal gray, nucleus raphe magnus). This ''motor cortex stimulation analgesia'' mechanism
  is well-established from invasive MCS (motor cortex stimulation) studies.'
core_symptoms:
- Widespread chronic pain — diffuse, often migratory (fibromyalgia)
- Fatigue — disproportionate, not relieved by rest
- Sleep disturbance — non-restorative sleep, morning stiffness
- Tender points / allodynia (fibromyalgia)
- Hyperalgesia — amplified pain response to normally painful stimuli
- Cognitive difficulties — fibro-fog (attention, memory, processing speed)
non_motor_symptoms:
- Depression (comorbid in 40-50% of fibromyalgia patients)
- Anxiety (comorbid in 50-60%)
- Headache (tension and migraine-type)
- Irritable bowel syndrome (comorbid visceral sensitization)
- Reduced quality of life and social/occupational function
brain_regions:
- Primary Motor Cortex (M1)
- Primary Somatosensory Cortex (S1)
- Anterior Cingulate Cortex (ACC) / dACC
- Anterior Insula
- Periaqueductal Gray (PAG)
- Dorsolateral Prefrontal Cortex (DLPFC)
brain_region_details:
  Primary Motor Cortex (M1): Primary tDCS anodal target for analgesia. M1 anodal stimulation activates corticospinal-brainstem
    pain modulation circuits (PAG, RVM). Invasive MCS evidence extrapolated to non-invasive tDCS.
  Primary Somatosensory Cortex (S1): Hyperactivated in chronic pain — enhanced representation of body pain maps. Central sensitization
    expresses as cortical reorganization in S1.
  Anterior Cingulate Cortex (ACC) / dACC: Affective-motivational component of pain. ACC hyperactivation drives the aversive
    emotional aspects of chronic pain. Connected to DLPFC via pain regulation circuits.
  Anterior Insula: Key SN node; interoceptive processing and pain salience. Hyperactive in fibromyalgia. Bilateral anterior
    insula hyperactivation is a robust FMS neuroimaging finding.
  Periaqueductal Gray (PAG): Brainstem pain modulation hub. Reduced PAG-frontal connectivity in chronic pain impairs descending
    inhibition. M1 tDCS may activate this pathway.
  Dorsolateral Prefrontal Cortex (DLPFC): Cognitive-evaluative pain component, emotion regulation, and mood. DLPFC anodal
    tDCS targets depression and catastrophizing that amplify pain experience.
network_profiles:
- network: sn
  dysfunction: hyper
  severity: severe
  primary: true
  relevance: PRIMARY NETWORK IN CHRONIC PAIN. Salience Network hyperactivation — particularly anterior insula and dACC — drives
    aberrant pain salience, emotional amplification of nociception, and catastrophizing. SN hyperactivity is the most consistent
    neuroimaging finding in fibromyalgia. M1 tDCS analgesia works partly via SN modulation.
  evidence_note: Multiple fMRI studies in FMS; Napadow et al. — FMS brain connectivity
- network: dmn
  dysfunction: hyper
  severity: severe
  primary: false
  relevance: DMN hyperactivation contributes to pain rumination, catastrophizing, and intrusive pain-related ideation. Reduced
    anticorrelation between DMN and anti-correlated network in fibromyalgia. DLPFC tDCS may reduce DMN-mediated pain rumination.
  evidence_note: Altered DMN connectivity in FMS; Napadow et al. 2010 — DMN-pain relationship
- network: limbic
  dysfunction: hyper
  severity: severe
  primary: false
  relevance: High comorbidity of depression (40-50%) and anxiety (50-60%) in fibromyalgia reflects limbic hyperreactivity.
    HPA axis dysregulation amplifies pain and emotional processing. Amygdala hyperactivity drives affective pain component.
  evidence_note: FMS-depression-anxiety triad; shared neurobiological mechanisms
- network: cen
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: CEN hypofunction impairs top-down pain inhibitory control, cognitive coping strategies, and emotional regulation
    of pain experience. Reduced prefrontal activity allows limbic and SN hyperactivity to dominate pain experience.
  evidence_note: ''
primary_network: sn
fnon_rationale: 'In chronic pain/fibromyalgia, the primary dysfunctional networks are the Salience Network (hyperactive —
  pain amplification) and the Limbic Network (hyperactive — affective pain component). The FNON framework deploys two parallel
  strategies: (1) M1 anodal tDCS for direct analgesic effect via corticospinal-brainstem pain modulation pathways; (2) Left
  DLPFC anodal tDCS to upregulate CEN pain inhibitory control and address comorbid depression. CES addresses sleep, anxiety,
  and mood via limbic modulation.'
