protocols:
- protocol_id: C-PAIN-M1
  label: M1 Analgesic — Fibromyalgia / Chronic Pain
  modality: tdcs
  target_region: Primary Motor Cortex (bilateral)
  target_abbreviation: M1
  target_electrodes: []
  phenotype_slugs:
  - fms
  - clbp
  - cs
  network_targets:
  - sn
  - dmn
  parameters:
    device: Newronika HDCkit or PlatoScience
    anode: C3 + C4 (bilateral M1) or C3 alone (left M1)
    cathode: Fp1 + Fp2 (bilateral supraorbital) or contralateral shoulder
    intensity: 2.0 mA
    duration: 20-30 min
    sessions: 10-20 over 4-5 weeks
    electrode_size: 35 cm2
    note: 'Fregni et al. montage: anode C3 (left M1), cathode right shoulder or Fp2'
  rationale: 'M1 anodal tDCS activates descending pain inhibitory pathways via corticospinal-PAG circuit, analogous to invasive
    motor cortex stimulation for pain. Fregni et al. (2006) Arthritis & Rheumatism RCT (N=32): significant pain reduction
    in fibromyalgia vs sham. Marlow et al. (2013) meta-analysis confirmed M1 tDCS efficacy for chronic pain. IFCN Level B.
    OFF-LABEL.'
  evidence_level: high
  off_label: true
  session_count: 20
  notes: ''
