  severity: moderate
  modalities:
  - tdcs
  - tps
  - tavns
  - ces
  source: ASD clinical best practice
- category: precaution
  description: Allow longer familiarisation period before first stimulation. Use social stories or visual schedules where
    appropriate.
  severity: moderate
  modalities:
  - tdcs
  - tps
  - tavns
  - ces
  source: ASD clinical best practice
- category: monitoring
  description: Monitor for increased anxiety, sensory overload, or behavioural distress during and after sessions.
  severity: moderate
  modalities:
  - tdcs
  - tps
  source: Clinical observation
- category: precaution
