# Autism Spectrum Disorder — SOZO Clinical Knowledge (Expanded)
# ICD-10: F84.0
# Content enriched from legacy generator prose and expanded to gold-standard depth.

slug: asd
display_name: Autism Spectrum Disorder
icd10: F84.0
aliases:
- ASD
- autism
- autism spectrum
- Asperger syndrome
category: neurodevelopmental
version: '1.1'

# ── Clinical ─────────────────────────────────────────────────────────────────

overview: >-
  Autism Spectrum Disorder (ASD) is a neurodevelopmental condition characterized
  by persistent differences in social communication and interaction, and
  restricted or repetitive patterns of behavior, interests, or activities.
  Prevalence is approximately 1 in 36 children (CDC 2023), with a male-to-female
  ratio of approximately 4:1 (though females are significantly underdiagnosed due
  to camouflaging and atypical presentation). Severity is classified into three
  DSM-5 levels: Level 1 (requiring support), Level 2 (requiring substantial
  support), and Level 3 (requiring very substantial support). The ASD
  neurobiological model centres on dysregulation of the social brain network,
  involving the temporal-parietal junction (TPJ), superior temporal sulcus (STS),
  amygdala, and medial prefrontal cortex (mPFC). Functional connectivity
  abnormalities — both local hyperconnectivity and long-range hypoconnectivity —
  are consistent neuroimaging findings across the spectrum. CLINICAL IMPORTANT
  NOTE: tDCS, TPS, and all neuromodulation in ASD is investigational and
  off-label. Evidence is based on small pilot studies and should only be
  delivered within a research-informed clinical framework with explicit informed
  consent, appropriate ethical review, and clear patient/family education about
  the investigational nature of the treatment. The heterogeneity of ASD
  necessitates careful phenotyping to guide target selection.

pathophysiology: >-
  ASD pathophysiology is heterogeneous, reflecting multiple genetic and
  environmental trajectories converging on shared neural phenotypes. Over 100
  genes have been implicated, with convergence on synaptic formation and
  maintenance pathways. Key neurobiological mechanisms include: (1) Excitation-
  Inhibition (E/I) imbalance — reduced GABAergic inhibition relative to
  glutamatergic excitation in cortical circuits, particularly sensory and
  prefrontal regions. This E/I imbalance explains sensory hypersensitivity,
  repetitive behaviors, and seizure vulnerability (epilepsy comorbidity 20-30%).
  (2) Social brain network dysregulation — reduced functional connectivity in the
  social brain network comprising TPJ, STS, amygdala, and mPFC. This underlies
  impaired theory of mind (mentalizing) capacity, reduced social attention, and
  face processing deficits. The fusiform face area shows reduced activation
  during face perception tasks. (3) Default Mode Network (DMN) atypicality — DMN
  shows altered connectivity patterns during social and mentalizing tasks,
  reflecting atypical self-referential processing and reduced social cognition
  network engagement. DMN-CEN coupling is disrupted. (4) Salience Network
  dysregulation — reduced social salience with atypical attention to social cues
  (faces, eyes, voices) drives core social communication deficits. Amygdala
  shows hypoactivation to social stimuli but hyperactivation to perceived
  threats, contributing to anxiety. (5) Long-range hypoconnectivity with local
  hyperconnectivity — reduced long-range cortical connectivity (fronto-temporal,
  fronto-parietal) limits integration of distributed processing networks needed
  for complex social cognition and executive function, while local
  hyperconnectivity may underlie detail-focused processing style and restricted
  interests. White matter microstructural differences in the corpus callosum
  and uncinate fasciculus further compromise interhemispheric and
  fronto-temporal integration.

epidemiology: >-
  Prevalence approximately 1 in 36 children (CDC 2023). Male-to-female ratio
  approximately 4:1 (though females are underdiagnosed due to camouflaging).
  Lifelong condition. Approximately 30-50% have co-occurring intellectual
  disability.

core_symptoms:
- Social communication and interaction deficits — reduced reciprocal social-emotional engagement
- Reduced sharing of interest, emotion, or affect with others
- Impaired nonverbal communication — reduced eye contact, facial expression, gesture use
- Deficits in developing, maintaining, and understanding relationships
- Restricted, repetitive behaviors — stereotypies, insistence on sameness, ritualized patterns
- Restricted interests with abnormal intensity or focus
- Hyper- or hyporeactivity to sensory input (visual, auditory, tactile, olfactory)
- Difficulty with transitions and changes to routine
- Pragmatic language deficits — literal interpretation, difficulty with conversational turn-taking
- Cognitive inflexibility — difficulty shifting between tasks or mental sets
- Theory of mind deficits — difficulty understanding others' mental states and perspectives
- Executive function impairment — planning, organisation, and working memory difficulties

non_motor_symptoms:
- Intellectual disability (co-occurring in ~30-50% of ASD)
- ADHD (co-occurring in ~50-70%)
- Anxiety disorders (co-occurring in ~40-80%)
- Sleep disturbance (co-occurring in ~50-80%)
- Depression (particularly adolescent and adult ASD)
- Epilepsy (co-occurring in ~20-30%)
- GI disorders (functional GI complaints common)

# ── Anatomy ──────────────────────────────────────────────────────────────────

brain_regions:
- dlpfc
- mpfc
- sts
- tpj
- fusiform
- amygdala
- ppc

brain_region_details:
  dlpfc: Executive function and cognitive flexibility. Hypoactive during planning and set-shifting tasks in ASD.
  mpfc: Medial prefrontal cortex — social cognition, mentalising, and self-referential processing. Key DMN node with atypical activation in ASD.
  sts: Superior temporal sulcus — biological motion perception, social perception, and voice processing. Hypoactive to social stimuli.
  tpj: Temporoparietal junction — theory of mind, perspective-taking, and social cognition. Key target for social communication protocols.
  fusiform: Face processing (fusiform face area). Reduced activation during face perception in ASD. Underlies face recognition difficulties.
  amygdala: Social salience and emotional processing. Atypical activation patterns — hypoactivation to social cues, hyperactivation to threat.
  ppc: Posterior parietal cortex — sensory integration and spatial processing. Involved in multisensory integration deficits.

# ── Networks (FNON) ─────────────────────────────────────────────────────────

network_profiles:
- network: dmn
  dysfunction: hypo
  severity: moderate
  primary: true
  relevance: >-
    DMN hypoconnectivity underlies social cognition deficits — impaired
    mentalising, self-other distinction, and social processing. The mPFC-TPJ
    axis of the DMN is particularly affected, driving theory of mind deficits
    that are central to ASD social communication impairment.
  evidence_note: Padmanabhan et al. 2017; DMN underconnectivity in ASD

- network: sn
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: >-
    Salience network hyperactivation to non-social stimuli contributes to sensory
    hypersensitivity and anxiety. Atypical salience attribution — reduced
    salience for social stimuli while over-attending to non-social environmental
    features. Anterior insula involvement drives interoceptive differences.
  evidence_note: Uddin & Menon 2009; SN in ASD

- network: cen
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: >-
    CEN hypoactivation during executive tasks contributes to cognitive
    inflexibility, planning difficulties, and working memory deficits. DLPFC
    hypofunction during set-shifting and planning tasks is consistently
    reported.
  evidence_note: ''

- network: limbic
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: >-
    Amygdala hyperreactivity to threat and unpredictable stimuli contributes to
    anxiety, emotional dysregulation, and social avoidance. Atypical amygdala
    connectivity with prefrontal cortex impairs emotion regulation.
  evidence_note: ''

- network: smn
  dysfunction: hyper
  severity: mild
  primary: false
  relevance: >-
    Somatomotor network alterations contribute to motor stereotypies, clumsiness,
    and atypical motor development. Sensory cortex hyperexcitability underlies
    tactile and auditory hypersensitivity.
  evidence_note: ''

- network: attention
  dysfunction: hypo
  severity: mild
  primary: false
  relevance: >-
    Attentional network differences contribute to atypical gaze patterns,
    reduced joint attention, and detail-focused processing style. Dorsal
    attention network shows reduced social orienting.
  evidence_note: ''

primary_network: dmn
fnon_rationale: >-
  In ASD, the primary dysfunctional network is the Social Brain/DMN —
  hypoactivation of the TPJ-STS-mPFC social processing circuit drives core
  social communication deficits. The FNON framework targets: (1) TPJ region via
  temporal electrodes for social cognition enhancement; (2) left DLPFC anodal
  tDCS for executive function and co-occurring ADHD features; (3) bilateral
  parietal cortex for sensory processing phenotype. Both tDCS and TPS
  applications are INVESTIGATIONAL — off-label research-level evidence only. All
  ASD neuromodulation must be framed within a research-informed clinical context
  with explicit informed consent regarding investigational status.

# ── Phenotypes ───────────────────────────────────────────────────────────────

phenotypes:
- slug: social
  label: SOC — Social Communication Deficit
  description: >-
    Primary social communication and interaction difficulties with relatively
    preserved cognitive function. Often corresponds to ASD Level 1. May include
    difficulty reading social cues, maintaining conversations, and developing
    peer relationships. Camouflaging and masking may be present.
  key_features:
  - Difficulty with social reciprocity and turn-taking
  - Nonverbal communication challenges (eye contact, gestures)
  - Relationship formation and maintenance difficulties
  - Pragmatic language deficits and literal interpretation
  - Theory of mind and perspective-taking impairment
  primary_networks:
  - dmn
  secondary_networks:
  - sn
  preferred_modalities:
  - tdcs
  - tps
  tdcs_target: L-DLPFC (F3) + right temporal (T4)
  tps_target: F3, F4, T4, T6

- slug: rrb
  label: RRB — Restricted/Repetitive Behaviour
  description: >-
    Prominent restricted interests, repetitive behaviours, and cognitive
    inflexibility as the primary functional impairment. May include motor
    stereotypies, insistence on sameness, and intense circumscribed interests.
    Executive dysfunction contributes to rigidity.
  key_features:
  - Stereotyped motor movements and repetitive behaviours
  - Rigid routines and insistence on sameness
  - Circumscribed and intense interests
  - Cognitive inflexibility and difficulty with transitions
  - Perseverative thinking patterns
  primary_networks:
  - cen
  - sn
  secondary_networks:
  - dmn
  preferred_modalities:
  - tdcs
  - tps
  tdcs_target: Bilateral DLPFC (F3/F4)
  tps_target: F3, FC3, FC4

- slug: sensory
  label: SEN — Sensory Processing
  description: >-
    Predominant sensory processing differences with hyper- or hypo-reactivity
    as the primary functional impairment. Sensory overload triggers distress,
    avoidance behaviours, and meltdowns. May affect multiple modalities
    (auditory, tactile, visual, olfactory, vestibular).
  key_features:
  - Sensory hypersensitivity (auditory, tactile, visual)
  - Sensory-seeking behaviours and stimming
  - Sensory overload leading to meltdowns or shutdowns
  - Auditory processing difficulties
  - Tactile defensiveness and clothing sensitivity
  primary_networks:
  - sn
  - smn
  secondary_networks:
  - attention
  preferred_modalities:
  - tdcs
  - ces
  - tavns
  tdcs_target: Bilateral parietal (P3/P4)
  tps_target: P3, P4, Pz

- slug: anxiety_asd
  label: ANX — Anxiety-Predominant ASD
  description: >-
    Significant anxiety and emotional dysregulation overlying ASD presentation.
    Anxiety may be the primary driver of functional impairment and social
    avoidance. Includes social anxiety, generalized anxiety, and specific
    phobias. Emotional meltdowns may be anxiety-driven rather than purely
    sensory.
  key_features:
  - Social anxiety and avoidance beyond ASD social difficulties
  - Generalised anxiety and excessive worry
  - Emotional meltdowns triggered by anxiety
  - Avoidance behaviours limiting participation
  - Rumination and perseverative worry
  primary_networks:
  - limbic
  - sn
  secondary_networks:
  - cen
  preferred_modalities:
  - tavns
  - ces
  - tdcs
  tdcs_target: R-DLPFC (F4)
  tps_target: F4, F3

# ── Assessments ──────────────────────────────────────────────────────────────

assessments:
- scale_key: srs2
  timing: baseline
  primary: true
  notes: Social Responsiveness Scale-2. Primary ASD symptom severity monitoring tool. T-score >=60 = mild-moderate range. Tracks social communication changes.

- scale_key: ados2
  timing: baseline
  primary: false
  notes: Autism Diagnostic Observation Schedule-2. Gold standard diagnostic tool. Not for monitoring — diagnosis confirmation only.

- scale_key: brief
  timing: baseline
  primary: false
  notes: Behavior Rating Inventory of Executive Function. Essential for ASD executive function profile. Tracks cognitive flexibility and planning changes.

- scale_key: vabs
  timing: baseline
  primary: false
  notes: Vineland Adaptive Behavior Scales. Key functional outcome measure in ASD. Assesses communication, daily living skills, socialisation, and motor skills.

- scale_key: gad7
  timing: baseline
  primary: false
  notes: Anxiety screening — prevalence 40-80% in ASD. Useful for Level 1 adults with insight. Monitor throughout treatment.

- scale_key: sensory_profile
  timing: baseline
  primary: false
  notes: Sensory Profile-2. Assesses sensory processing patterns across modalities. Essential for sensory phenotype characterisation.

- scale_key: abc
  timing: baseline
  primary: false
  notes: Aberrant Behavior Checklist. Monitors irritability, social withdrawal, stereotypic behaviour, hyperactivity, and inappropriate speech.

- scale_key: phq9
  timing: baseline
  primary: false
  notes: Patient Health Questionnaire-9. Depression screening for adult ASD. Prevalence of depression increases in adolescence and adulthood.

