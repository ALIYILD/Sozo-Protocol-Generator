clinical_tips:
- 'INVESTIGATIONAL: Ensure informed consent explicitly covers off-label investigational status — do not imply established treatment efficacy'
- Allow extra time for electrode preparation — sensory sensitivity requires gradual introduction of equipment and desensitisation
- Screen for epilepsy before treatment — ASD has 20-30% epilepsy comorbidity requiring neurology clearance
- 'For adult ASD: anxiety and sleep are often the primary functional burden — CES is the best-evidenced component for these symptoms'
- Co-occurring ADHD is common (50-70%) — if executive dysfunction predominates, ADHD protocols may be more appropriate
- Use visual schedules and social stories to prepare patients for each session — predictability reduces anxiety and improves compliance
- Consider lower stimulation intensities (1.0-1.5 mA) due to potential cortical E/I imbalance in ASD
- Involve carers in outcome assessment — self-report may be unreliable in ASD patients with limited insight or alexithymia

governance_rules:
- No Fellow or Clinical Assistant may independently modify treatment plans without Doctor authorization
- All TPS applications require explicit off-label informed consent and Doctor authorization
- Adverse events must be documented within 24 hours and escalated per clinic protocol
- Treatment records must be updated at every session
- Informed consent must be obtained and documented before initiating any modality
- All ASD neuromodulation is investigational — Doctor authorization mandatory for every patient
- Informed consent must explicitly specify investigational/off-label status
- Seizure history screening and neurology clearance required before treatment

