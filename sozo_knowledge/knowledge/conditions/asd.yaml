category: neurodevelopmental
version: '1.0'
overview: 'Autism Spectrum Disorder (ASD) is a neurodevelopmental condition characterized by persistent differences in social
  communication and interaction, and restricted or repetitive patterns of behavior, interests, or activities. ASD affects
  approximately 1 in 54 children (CDC 2020 data). Severity is classified into three DSM-5 levels: Level 1 (requiring support),
  Level 2 (requiring substantial support), and Level 3 (requiring very substantial support).


  ASD neurobiological model: dysregulation of the social brain network, involving the temporal-parietal junction (TPJ), superior
  temporal sulcus (STS), amygdala, and medial prefrontal cortex (mPFC). Functional connectivity abnormalities — both local
  hyperconnectivity and long-range hypoconnectivity — are consistent neuroimaging findings.


  CLINICAL IMPORTANT NOTE: tDCS and all neuromodulation in ASD is investigational and off-label. Evidence is based on small
  pilot studies. It should only be delivered within a research-informed clinical framework with explicit informed consent,
  appropriate ethical review where indicated, and clear patient/family education about the investigational nature of the treatment.'
pathophysiology: 'ASD pathophysiology is heterogeneous, reflecting multiple genetic and environmental trajectories converging
  on shared neural phenotypes. Key mechanisms:


  (1) Excitation-Inhibition (E/I) imbalance: reduced GABAergic inhibition relative to glutamatergic excitation in cortical
  circuits — particularly sensory and prefrontal. This explains sensory hypersensitivity, repetitive behaviors, and seizure
  vulnerability.


  (2) Social brain network dysregulation: reduced functional connectivity in the ''social brain'' network — TPJ, STS, amygdala,
  mPFC. Impaired ''theory of mind'' (mentalizing) capacity, reduced social attention, and face processing deficits.


  (3) Default Mode Network (DMN) atypicality: DMN hyperactivation during social and mentalizing tasks is documented in ASD,
  reflecting atypical self-referential processing and reduced social cognition network engagement.


  (4) Salience Network dysregulation: reduced social salience — atypical attention to social cues (faces, eyes, voices) —
  drives core social communication deficits. Amygdala hypoactivation to social stimuli contrasts with hyperactivation to threat.


  (5) Long-range hypoconnectivity: reduced long-range cortical connectivity (fronto-temporal, fronto-parietal) limits integration
  of distributed processing networks needed for complex social cognition and executive function.'
epidemiology: Prevalence approximately 1 in 36 children (CDC 2023). Male-to-female ratio approximately 4:1 (though females
  are underdiagnosed). Lifelong condition.
core_symptoms:
- Social communication and interaction deficits — reduced reciprocal social-emotional engagement
- Reduced sharing of interest, emotion, or affect
- Impaired nonverbal communication — reduced eye contact, facial expression, gesture use
- Deficits in developing, maintaining, and understanding relationships
- Restricted, repetitive behaviors — stereotypies, insistence on sameness, ritualized patterns
- Restricted interests with abnormal intensity or focus
- Hyper- or hyporeactivity to sensory input (visual, auditory, tactile)
non_motor_symptoms:
- Intellectual disability (co-occurring in ~30-50% of ASD)
- ADHD (co-occurring in ~50-70%)
- Anxiety disorders (co-occurring in ~40-80%)
- Sleep disturbance (co-occurring in ~50-80%)
- Depression (particularly adolescent and adult ASD)
- Epilepsy (co-occurring in ~20-30%)
- GI disorders (functional GI complaints common)
brain_regions:
- dlpfc
- mpfc
- sts
- tpj
- fusiform
- amygdala
- ppc
brain_region_details:
  dlpfc: Executive function and cognitive flexibility. Hypoactive during planning and set-shifting tasks.
  mpfc: Medial prefrontal cortex — social cognition, mentalising, and self-referential processing. Key DMN node.
  sts: Superior temporal sulcus — biological motion perception, social perception, and voice processing.
  tpj: Temporoparietal junction — theory of mind, perspective-taking, and social cognition.
  fusiform: Face processing (fusiform face area). Reduced activation during face perception in ASD.
  amygdala: Social salience and emotional processing. Atypical activation patterns in ASD.
  ppc: Posterior parietal cortex — sensory integration and spatial processing.
network_profiles:
- network: dmn
  dysfunction: hypo
  severity: moderate
  primary: true
  relevance: DMN hypoconnectivity underlies social cognition deficits — impaired mentalising, self-other distinction, and
    social processing.
  evidence_note: Padmanabhan et al. 2017; DMN underconnectivity in ASD
- network: sn
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: Salience network hyperactivation contributes to sensory hypersensitivity and anxiety. Atypical salience attribution
    to non-social stimuli.
  evidence_note: ''
- network: cen
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: CEN hypoactivation during executive tasks contributes to cognitive inflexibility, planning difficulties, and
    working memory deficits.
  evidence_note: ''
- network: limbic
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: Amygdala hyperreactivity and atypical limbic processing contribute to anxiety, emotional dysregulation, and social
    avoidance.
  evidence_note: ''
primary_network: dmn
fnon_rationale: 'In ASD, the primary dysfunctional network is the Social Brain/Salience Network — hypoactivation of TPJ-STS-mPFC
  social processing circuit drives core social communication deficits. The FNON framework targets: (1) TPJ anodal tDCS for
  social cognition enhancement; (2) left DLPFC anodal tDCS for executive function and co-occurring ADHD features. Both applications
  are INVESTIGATIONAL — off-label research-level evidence. All ASD neuromodulation must be framed within a research-informed
  clinical context with explicit informed consent.'
