clinical_tips:
- 'INVESTIGATIONAL: Ensure informed consent explicitly covers off-label investigational status — do not imply established
  treatment efficacy'
- Allow extra time for electrode preparation — sensory sensitivity requires gradual introduction of equipment
- Screen for epilepsy before treatment — ASD has 20-30% epilepsy comorbidity requiring neurology clearance
- 'For adult ASD: anxiety and sleep are often the primary functional burden — CES is the best-evidenced component'
- Co-occurring ADHD is common — if executive dysfunction predominates, ADHD protocols may be more appropriate
governance_rules:
- No Fellow or Clinical Assistant may independently modify treatment plans without Doctor authorization
- All TPS applications require explicit off-label informed consent and Doctor authorization
- Adverse events must be documented within 24 hours and escalated per clinic protocol
- Treatment records must be updated at every session
- Informed consent must be obtained and documented before initiating any modality
- All ASD neuromodulation is investigational — Doctor authorization mandatory for every patient
- Informed consent must explicitly specify investigational/off-label status
- Seizure history screening and neurology clearance required before treatment
patient_journey_notes:
  stage_1: Confirm ASD diagnosis (ADOS-2 or equivalent). Assess ASD level. Screen for epilepsy, anxiety, and sensory profile.
    Assess capacity to consent.
  stage_3: Administer SRS-2, BRIEF-2, Vineland. Document comorbidities, current medications, and sensory profile.
