# ── Protocols ────────────────────────────────────────────────────────────────

protocols:
- protocol_id: asd-tdcs-social
  label: tDCS Social Communication
  modality: tdcs
  target_region: Left DLPFC + Right Temporal
  target_abbreviation: DLPFC/STS
  target_electrodes:
  - F3
  - T4
  - Fp2
  phenotype_slugs:
  - social
  network_targets:
  - dmn
  parameters:
    current_mA: 1.5
    duration_min: 20
    ramp_up_sec: 30
    ramp_down_sec: 30
    anode: F3, T4
    cathode: Fp2
    sponge_size_cm2: 35
    sessions_per_week: 3
    total_sessions: 10
  rationale: DLPFC and temporal cortex stimulation enhances social communication circuits and social brain network excitability.
  evidence_level: low
  off_label: true
  session_count: 10
  notes: From protocol_data C1. Emerging evidence. All tDCS in ASD is off-label and investigational.

- protocol_id: asd-tdcs-rrb
  label: tDCS Repetitive Behaviours
  modality: tdcs
  target_region: Bilateral DLPFC
  target_abbreviation: DLPFC
  target_electrodes:
  - F3
  - F4
  - Fp1
  phenotype_slugs:
  - rrb
  network_targets:
  - cen
  parameters:
    current_mA: 1.5
    duration_min: 20
    ramp_up_sec: 30
    ramp_down_sec: 30
    anode: F3, F4
    cathode: Fp1
    sponge_size_cm2: 35
    sessions_per_week: 3
    total_sessions: 10
  rationale: Bilateral prefrontal stimulation targets cognitive inflexibility and executive dysfunction underlying repetitive behaviours.
  evidence_level: low
  off_label: true
  session_count: 10
  notes: From protocol_data C2. Off-label and investigational.

- protocol_id: asd-tdcs-exec
  label: tDCS Executive Function
  modality: tdcs
  target_region: Left DLPFC
  target_abbreviation: L-DLPFC
  target_electrodes:
  - F3
  - Fp2
  phenotype_slugs:
  - rrb
  - social
  network_targets:
  - cen
  parameters:
    current_mA: 1.5
    duration_min: 20
    ramp_up_sec: 30
    ramp_down_sec: 30
    anode: F3
    cathode: Fp2
    sponge_size_cm2: 35
    sessions_per_week: 3
    total_sessions: 10
  rationale: >-
    L-DLPFC anodal tDCS targets executive dysfunction that contributes to
    cognitive inflexibility, planning difficulties, and working memory deficits
    commonly co-occurring in ASD.
  evidence_level: low
  off_label: true
  session_count: 10
  notes: Targets co-occurring executive dysfunction. Concurrent cognitive flexibility training recommended.

- protocol_id: asd-tdcs-anxiety
  label: tDCS Anxiety Modulation
  modality: tdcs
  target_region: Right DLPFC
  target_abbreviation: R-DLPFC
  target_electrodes:
  - F4
  - F3
  phenotype_slugs:
  - anxiety_asd
  network_targets:
  - cen
  - limbic
  parameters:
    current_mA: 1.5
    duration_min: 20
    ramp_up_sec: 30
    ramp_down_sec: 30
    anode: F4
    cathode: F3
    sponge_size_cm2: 35
    sessions_per_week: 3
    total_sessions: 10
  rationale: >-
    R-DLPFC anodal stimulation enhances prefrontal regulation of amygdala-driven
    anxiety responses. Lower current (1.5 mA) used due to potential E/I
    imbalance sensitivity in ASD.
  evidence_level: low
  off_label: true
  session_count: 10
  notes: For anxiety-predominant ASD phenotype. Monitor anxiety levels closely during sessions.

- protocol_id: asd-tps-social
  label: TPS Social Communication Deficit
  modality: tps
  target_region: DLPFC bilateral + right temporal
  target_abbreviation: DLPFC/TPJ
  target_electrodes:
  - F3
  - F4
  - T4
  - T6
  phenotype_slugs:
  - social
  network_targets:
  - dmn
  parameters:
    pulses: 3000-5000
    frequency_hz: 5
    energy_mJ_mm2: 0.2
    pulse_duration_us: 3
    focal_depth_mm: 30
    treatment_area_cm2: 15
    sessions_per_week: 2
    total_sessions: 6
  rationale: TPS targeting social brain regions (DLPFC and TPJ area) to enhance social communication processing and functional connectivity.
  evidence_level: low
  off_label: true
  session_count: 6
  notes: From protocol_data T1. Emerging evidence. All TPS in ASD is off-label.

- protocol_id: asd-tps-sensory
  label: TPS Sensory Processing
  modality: tps
  target_region: Bilateral parietal
  target_abbreviation: PPC
  target_electrodes:
  - P3
  - P4
  - Pz
  phenotype_slugs:
  - sensory
  network_targets:
  - sn
  - smn
  parameters:
    pulses: 4000
    frequency_hz: 5
    energy_mJ_mm2: 0.2
    pulse_duration_us: 3
    focal_depth_mm: 25
    treatment_area_cm2: 12
    sessions_per_week: 2
    total_sessions: 6
  rationale: Parietal targeting modulates sensory integration circuits and may normalise sensory cortex excitability.
  evidence_level: low
  off_label: true
  session_count: 6
  notes: From protocol_data T3. Preliminary evidence. Off-label.

- protocol_id: asd-tps-exec
  label: TPS Executive Function
  modality: tps
  target_region: Bilateral DLPFC + premotor
  target_abbreviation: DLPFC/PMC
  target_electrodes:
  - F3
  - F4
  - FC3
  - FC4
  phenotype_slugs:
  - rrb
  - social
  network_targets:
  - cen
  parameters:
    pulses: 4000
    frequency_hz: 5
    energy_mJ_mm2: 0.2
    pulse_duration_us: 3
    focal_depth_mm: 30
    treatment_area_cm2: 15
    sessions_per_week: 2
    total_sessions: 6
  rationale: >-
    TPS targeting bilateral prefrontal and premotor cortex for executive
    dysfunction and cognitive inflexibility in ASD. Multi-region approach
    addresses distributed CEN hypofunction.
  evidence_level: low
  off_label: true
  session_count: 6
  notes: Experimental TPS protocol for executive function. Off-label.

- protocol_id: asd-tps-anxiety
  label: TPS Anxiety and Emotional Regulation
  modality: tps
  target_region: Right DLPFC + bilateral frontal
  target_abbreviation: R-DLPFC
  target_electrodes:
  - F4
  - F3
  - Fz
  phenotype_slugs:
  - anxiety_asd
  network_targets:
  - cen
  - limbic
  parameters:
    pulses: 3000
    frequency_hz: 5
    energy_mJ_mm2: 0.2
    pulse_duration_us: 3
    focal_depth_mm: 30
    treatment_area_cm2: 12
    sessions_per_week: 2
    total_sessions: 6
  rationale: >-
    TPS targeting prefrontal cortex for top-down regulation of amygdala-driven
    anxiety in ASD. Lower pulse count for anxious patients who may be more
    sensitive to stimulation.
  evidence_level: low
  off_label: true
  session_count: 6
  notes: Experimental TPS protocol for anxiety-predominant ASD. Off-label. Extra familiarisation session recommended.

# ── Safety ───────────────────────────────────────────────────────────────────

safety_rules:
- category: precaution
  description: Sensory environment must be adapted for ASD patients — minimise unexpected sensory stimuli (bright lights, loud sounds, unfamiliar textures) during sessions.
  severity: moderate
  modalities:
  - tdcs
  - tps
  - tavns
  - ces
  source: ASD clinical best practice

- category: precaution
  description: Allow longer familiarisation period before first stimulation. Use social stories, visual schedules, or video modelling where appropriate to prepare patients.
  severity: moderate
  modalities:
  - tdcs
  - tps
  - tavns
  - ces
  source: ASD clinical best practice

- category: monitoring
  description: Monitor for increased anxiety, sensory overload, or behavioural distress during and after sessions. Use visual or simplified rating scales for non-verbal patients.
  severity: moderate
  modalities:
  - tdcs
  - tps
  source: Clinical observation

- category: precaution
  description: Capacity to consent must be carefully assessed — consider supported decision-making for Level 2-3 ASD. Involve carers and use accessible consent materials.
  severity: high
  modalities:
  - tdcs
  - tps
  - tavns
  - ces
  source: Ethical guidelines

- category: stopping_rule
  description: Discontinue if significant behavioural regression or increased self-injurious behaviour occurs during treatment course.
  severity: high
  modalities:
  - tdcs
  - tps
  source: Clinical safety protocol

- category: precaution
  description: Screen for epilepsy before initiating any neuromodulation — ASD has 20-30% epilepsy comorbidity. Require neurology clearance if seizure history present.
  severity: high
  modalities:
  - tdcs
  - tps
  - tavns
  - ces
  source: Clinical guidelines

- category: monitoring
  description: Track repetitive behaviour frequency — stimulation may paradoxically increase stereotypies in some patients due to E/I imbalance sensitivity.
  severity: moderate
  modalities:
  - tdcs
  - tps
  source: Clinical observation

- category: precaution
  description: Use lower stimulation intensities (1.0-1.5 mA for tDCS) as ASD cortex may have altered excitability thresholds due to E/I imbalance.
  severity: moderate
  modalities:
  - tdcs
  source: Precautionary — based on E/I imbalance literature

contraindications:
- Active seizure disorder or epilepsy (comorbid in 20-30% of ASD)
- Metallic cranial implants in stimulation path
- Severe intellectual disability with inability to tolerate procedure
- Active self-injurious behaviour that could be exacerbated
- Pregnancy
- Severe behavioural dysregulation precluding safe session delivery

inclusion_criteria:
- Confirmed diagnosis of ASD (DSM-5 criteria, ADOS-2 or equivalent)
- ASD Level 1 or Level 2 (sufficient cooperation for stimulation)
- Age 16-65 years
- Stable medication regimen for >=4 weeks
- Able to provide informed consent (or supported decision-making with carer)
- Able to tolerate electrode/device placement and remain seated for session duration

exclusion_criteria:
- Active epilepsy (unless controlled and cleared by neurologist)
- ASD Level 3 with inability to tolerate stimulation procedure
- Active psychosis
- Severe intellectual disability (IQ <40) without supported decision-making pathway
- Unstable medical conditions
- Acute behavioural crisis or active self-injurious behaviour

# ── Responder ────────────────────────────────────────────────────────────────

responder_criteria:
- '>=5 point improvement on SRS-2 T-score'
- Clinician-rated CGI-I score of 'much improved' or 'very much improved'
- Improvement on Vineland Adaptive Behavior composite score
- Patient/carer-reported meaningful improvement in daily social functioning

non_responder_pathway: >-
  If no meaningful improvement on SRS-2 after 10 sessions: review phenotype
  assignment, consider adding sensory or anxiety-targeted protocol, adjust target
  regions, or intensify concurrent behavioural therapy. Consider whether a
  different phenotype better fits the presentation and re-assign protocol
  accordingly.

# ── Evidence ─────────────────────────────────────────────────────────────────

evidence_summary: >-
  ASD neuromodulation is INVESTIGATIONAL with very limited evidence. Amatachaya
  et al. (2015) pilot study demonstrated DLPFC tDCS improvements in ASD symptoms
  including hyperactivity and noncompliance. Schneider and Hopp (2011) showed
  tDCS effects on language acquisition in minimally verbal children with ASD.
  Enticott et al. (2014) conducted a double-blind RCT of deep rTMS targeting
  the medial prefrontal cortex in ASD, informing NIBS approaches. All studies
  are small (N<30) pilot studies. No adequately powered RCT for tDCS in ASD
  exists. TPS in ASD has no published evidence. CES is FDA-cleared for comorbid
  symptoms (anxiety, insomnia) and represents the best-evidenced component for
  ASD-related anxiety.

evidence_quality: emerging

evidence_gaps:
- Large-scale RCTs for tDCS in ASD
- TPS-specific evidence in ASD
- Optimal stimulation targets for different ASD phenotypes
- Long-term developmental effects of stimulation in younger patients
- Biomarkers for stimulation response prediction in ASD
- Effects of neuromodulation on E/I balance in ASD cortex

