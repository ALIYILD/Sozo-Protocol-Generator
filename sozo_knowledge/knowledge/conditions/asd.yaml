assessment_profile:
  primary_clinical_scales: >
    ADOS-2 (Autism Diagnostic Observation Schedule — gold standard diagnostic); ADI-R (Autism Diagnostic Interview-Revised — developmental history); SRS-2 (Social Responsiveness Scale); VABS-3 (Vineland Adaptive Behaviour Scales); SCQ (Social Communication Questionnaire); RBS-R (Repetitive Behaviour Scale); CBCL; Sensory Profile-2; PDDBI; ABC (Aberrant Behaviour Checklist)
  neuropsychological_battery: >
    ADOS-2 cognitive subscale; WASI-II/WPPSI (IQ); VABS-3 adaptive behaviour; NEPSY-II (social perception, face recognition, attention); BRIEF-2 (executive function); CANTAB social cognition battery; GARS-3; MoCA/MMSE (if adult); ToM tasks (Theory of Mind); Eyes Test (Baron-Cohen reading the mind in the eyes); Emotion recognition (Cambridge face memory)
  physiological_assessments: >
    Sensory assessment (sensory profile — tactile, auditory, vestibular); HRV (autonomic dysregulation in ASD); Actigraphy (sleep — significant insomnia comorbidity in 70% ASD); GI assessment (gut-brain axis in ASD); Eye tracking (gaze patterns — social preference); Cortisol (HPA in ASD)
  functional_assessments: >
    ADOS-2 social affect + RRB subscores; Vineland adaptive skills; ABC irritability subscale; Sleep diary (critical in ASD); Sensory diary; Social interaction log; School/work participation; CBCL challenging behaviour; Communication progress; Safety assessment (elopement)
  neuroimaging: >
    MRI structural (brain size/growth trajectories in ASD); DTI long-range white matter tracts (↓ FA fronto-temporal); fMRI social tasks (face processing, ToM — ↓ amygdala/STS activation); fMRI resting-state (atypical DMN); MRS (↓ GABA, ↑ glutamate in social brain areas); EEG mu paradigm (action observation)
  assessment_rationale: >
    Mu suppression is key ASD qEEG biomarker for mirror neuron circuit function. TPS RCT 2023 (Brain Commun, 21 cit) — multi-site frontal+parietal+temporal covers ASD social brain network nodes.
  primary_scale: >
    ADOS-2 (gold standard diagnostic — baseline); SRS-2 (weekly/monthly during intervention)
  screening_scales: >
    SCQ (Social Communication Questionnaire — 15 mins); GARS-3
  severity_staging: >
    VABS-3 (Vineland adaptive behaviour — 6-monthly); ABC (Aberrant Behaviour)
  qol_scale: >
    VABS-3 adaptive composite; ABC-C (subscales); CGAS (children)
  follow_up_frequency: >
    Monthly SRS-2 during intervention; 6-monthly VABS-3; 3-monthly ABC; ADOS-2 annually
  comorbidity_screens: >
    CBCL (co-occurring behaviour); BRIEF-2 (executive); Sensory Profile-2; ISI (sleep)
  safety_screens: >
    Safety assessment (elopement/self-harm); Sensory diet monitoring; Medication side effects
  score_thresholds: >
    SRS-2 T-score: 60-65 Mild; 66-75 Moderate; ≥76 Severe. VABS-3 <70 = significant adaptive deficit. ABC irritability subscale ≥18 = significant (primary outcome in many ASD trials).
  qeeg_primary_signature: >
    Mu rhythm suppression deficit at Cz/C3 (mirror neuron biomarker); ↓ Long-range coherence; ↑ Local connectivity; U-shaped power (↑ delta+gamma, ↓ alpha); ↑ Gamma sensory cortices (hyperreactivity)
  qeeg_key_electrodes: "Cz/C3/C4 (mu — mirror neuron); F3/F4 (frontal social); T3/T4 (temporal language/social); P3/P4 (parietal spatial); globally (long-range coherence)"
  qeeg_key_metrics: >
    Mu suppression at Cz (11-13 Hz band, action observation paradigm — ↓ suppression = mirror neuron deficit = ASD biomarker); Long-range coherence F3-P3/T3; Local coherence (↑ in ASD — opposite to long-range); 40 Hz ASSR (altered in ASD); N170 face ERP
  qeeg_eyes_open: >
    ↑ Gamma sensory cortices (sensory hyperreactivity); ↑ Beta; ↓ Alpha (EO — ↓ inhibitory control); ↑ Local frontal coherence
  qeeg_eyes_closed: >
    ↑ Delta/theta; ↑ Gamma (sensory); ↓ Alpha; ↓ Long-range connectivity; ↑ Local hyperconnectivity
  qeeg_event_related: >
    Mu paradigm (action observation — hand actions; ↓ suppression = mirror neuron deficit); N170 face ERP (delayed/reduced in ASD); MMN to social sounds; ASSR 40 Hz; P300 social-cognitive (theory of mind paradigm); ERP to social/non-social stimuli distinction
  qeeg_pathological_threshold: >
    Mu suppression <20% during action observation (ASD marker vs 40-50% in neurotypical); Long-range coherence F3-P3 <0.3 (↓ connectivity); 40 Hz ASSR <-10 dB vs controls
  qeeg_treatment_target: >
    Mu suppression ↑ (Cz — mirror neuron activation restoration); Long-range coherence ↑; 40 Hz gamma normalisation; Frontal alpha ↑; Social brain network connectivity
  qeeg_response_biomarker: >
    Mu suppression change (primary ASD qEEG biomarker); ADOS-2 social affect correlation with mu; N170 face ERP latency change; Long-range coherence restoration


