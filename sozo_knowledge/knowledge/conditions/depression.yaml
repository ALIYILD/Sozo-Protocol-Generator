clinical_tips:
- C-SSRS must be administered at every session — non-negotiable safety requirement
- 'Bipolar exclusion is absolute: document the bipolar screening result in the patient record before first session'
- For anxious MDD, add CES (Alpha-Stim) from Day 1 — it directly targets the anxiety component which may otherwise interfere
  with tDCS response
- For TRD, consider twice-daily tDCS (morning + afternoon with 4h gap) for the first week — emerging evidence supports accelerated
  protocols
- 'Medication stability: SSRI/SNRI combined with tDCS may have synergistic effects — avoid changing medications during treatment
  block'
governance_rules:
- No Fellow or Clinical Assistant may independently modify treatment plans without Doctor authorization
- All TPS applications require explicit off-label informed consent and Doctor authorization
- Adverse events must be documented within 24 hours and escalated per clinic protocol
- Treatment records must be updated at every session
- Informed consent must be obtained and documented before initiating any modality
- Bipolar disorder must be screened and exclusion documented in patient record before first session
- C-SSRS suicidality assessment is mandatory at every session — failure to administer is a protocol violation
- Any active suicidal ideation with intent or plan requires same-day Doctor review and crisis protocol activation
- TPS for MDD is explicitly OFF-LABEL — off-label consent documentation required
patient_journey_notes:
  stage_1: Pre-screen for MDD diagnosis. Screen for bipolar disorder — ABSOLUTE EXCLUSION. Administer PHQ-2 for preliminary
    severity. Check for active suicidality.
  stage_3: Administer C-SSRS (suicidality — mandatory). Complete structured clinical interview. Administer PHQ-9, HDRS-17,
    GAD-7.
