safety_rules:
- category: contraindication
  description: Bipolar disorder — risk of manic switch with L-DLPFC anodal tDCS. Screen carefully with MDQ or structured interview.
  severity: high
  modalities:
  - tdcs
  source: ELECT-TDCS safety data; Brunoni et al.
- category: stopping_rule
  description: Active suicidal ideation — HOLD all modalities. Immediate safety assessment and Doctor clearance required.
  severity: absolute
  modalities:
  - tdcs
  - tps
  - tavns
  - ces
  source: SOZO clinical safety protocol
- category: monitoring
  description: Administer C-SSRS (Columbia Suicide Severity Rating Scale) at every session for the first 4 weeks.
  severity: high
  modalities:
  - tdcs
  - tps
  - tavns
  - ces
  source: Clinical practice guidelines
- category: precaution
  description: Document current antidepressant regimen and ensure medication stability (>=4 weeks) before initiating stimulation.
  severity: moderate
  modalities:
  - tdcs
  - tps
  - tavns
  - ces
  source: SOZO clinical protocol
- category: precaution
  description: Monitor for hypomania symptoms during and between sessions, especially in patients with family history of bipolar
    disorder.
  severity: moderate
  modalities:
  - tdcs
  - tps
  source: Clinical observation; Brunoni safety review
contraindications:
- Bipolar disorder (manic risk with prefrontal anodal stimulation)
- Active psychosis
- Active seizure disorder or epilepsy
- Metallic cranial implants in stimulation path
- Pregnancy
inclusion_criteria:
- Confirmed diagnosis of MDD (DSM-5 criteria)
- PHQ-9 score >=10 (moderate severity or above)
- Age 18-75 years
- Stable medication regimen for >=4 weeks
- Able to provide informed consent
exclusion_criteria:
- Bipolar I or II disorder
- Active psychotic features
- Active suicidal ideation with plan or intent
- Substance use disorder (active, severe)
- Unstable medical conditions
responder_criteria:
- '>=50% reduction on PHQ-9 from baseline (response)'
- PHQ-9 score <5 (remission)
- '>=50% reduction on HDRS-17 from baseline'
- Patient-reported PGIC >= 'much improved'
non_responder_pathway: 'If <50% improvement on PHQ-9 after 15 sessions: review phenotype assignment, consider montage switch
  (e.g. bilateral vs unilateral), add taVNS or CES adjunctive modality, escalate to TRD protocol, or refer for rTMS/ECT evaluation.'
evidence_summary: 'MDD has the second-strongest tDCS evidence base after stroke rehabilitation. SELECT-TDCS (Brunoni et al.
  2013, JAMA Psychiatry, N=120): tDCS + sertraline > either alone; tDCS monotherapy significantly superior to sham. ELECT-TDCS
  (Blumberger et al. 2018, JAMA Psychiatry, N=245): non-inferior to escitalopram. Meta-analyses (Brunoni et al. 2016, N=289):
  response rate 34% tDCS vs 19% sham; remission 23% vs 12%. taVNS: multiple positive RCTs (Rong et al. 2016, JAMA Psychiatry).
  CES: FDA-cleared for depression; systematic review evidence. TPS in MDD: no published RCT data — OFF-LABEL, rationale extrapolated.'
evidence_quality: high
evidence_gaps:
- Optimal duration and frequency of maintenance tDCS
- Predictive biomarkers for tDCS response in MDD
- TPS-specific RCTs for MDD
- Head-to-head comparison of tDCS vs rTMS
