clinical_tips:
- >-
  C-SSRS must be administered at every session — this is a non-negotiable safety
  requirement. Document the result in the clinical record before initiating stimulation.
- >-
  Bipolar exclusion is absolute for anodal L-DLPFC protocols. Administer the Mood
  Disorder Questionnaire (MDQ) at screening and document the result. If MDQ is
  positive, request structured clinical interview before proceeding.
- >-
  For anxious depression (ANX phenotype), add CES (Alpha-Stim) from Day 1 — it
  directly targets the anxiety component which may otherwise interfere with tDCS
  response. Consider R-DLPFC anodal montage (C5 variant) if anxiety dominates.
- >-
  For TRD, consider twice-daily tDCS (morning + afternoon with minimum 4-hour gap)
  for the first week — emerging evidence supports accelerated protocols. Monitor for
  increased side effects with this dosing intensity.
- >-
  Medication stability is essential. SSRI/SNRI combined with tDCS may produce
  synergistic effects (SELECT-TDCS finding). Avoid changing antidepressant medications
  during the tDCS treatment block unless clinically urgent.
- >-
  PHQ-9 should be administered at every session to track trajectory. Early non-response
  (less than 20% improvement by session 5) predicts poor outcome — consider montage
  modification at this point rather than waiting until session 15.
- >-
  Patients with prominent insomnia (INS phenotype) may benefit from evening tDCS
  sessions at reduced intensity (1.5mA). Morning sessions at 2mA can occasionally
  exacerbate insomnia via cortical hyperarousal.
- >-
  Electrode placement accuracy matters. Use the Beam-F3 method or 10-20 EEG system
  measurements rather than the 5cm rule for F3 localisation. Inaccurate placement
  significantly reduces treatment efficacy.
- >-
  Explain to patients that tDCS response typically emerges gradually over 2-3 weeks,
  unlike the immediate effects some expect. Setting realistic expectations improves
  adherence and reduces premature dropout.
- >-
  For patients on benzodiazepines, note that these medications may reduce tDCS efficacy
  by raising cortical excitability thresholds. Document benzodiazepine use and consider
  gradual taper (if clinically appropriate) before or during the treatment course.

governance_rules:
- No Fellow or Clinical Assistant may independently modify treatment plans without Doctor authorization
- All TPS applications for MDD require explicit off-label informed consent and Doctor authorization
- Adverse events must be documented within 24 hours and escalated per clinic protocol
- Treatment records must be updated at every session with stimulation parameters, side effects, and assessment scores
- Informed consent must be obtained and documented before initiating any modality
- Bipolar disorder must be screened and exclusion documented in patient record before first session
- C-SSRS suicidality assessment is mandatory at every session — failure to administer is a protocol violation
- Any active suicidal ideation with intent or plan requires same-day Doctor review and crisis protocol activation
- TPS for MDD is explicitly OFF-LABEL — off-label consent documentation required
- Protocol modifications (montage change, parameter adjustment) require clinical justification documented in the record

patient_journey_notes:
  stage_1: >-
    Pre-screen for MDD diagnosis. Screen for bipolar disorder with MDQ — ABSOLUTE
    EXCLUSION. Administer PHQ-2 for preliminary severity. Check for active suicidality
    with brief C-SSRS screen. Verify age and medication stability criteria.
  stage_3: >-
    Administer full C-SSRS (suicidality — mandatory). Complete structured clinical
    interview for DSM-5 MDD diagnosis. Administer PHQ-9, HDRS-17, MADRS, GAD-7.
    Administer MoCA if cognitive complaints present. Administer PSQI if insomnia
    prominent. Assign phenotype classification. Discuss treatment plan and obtain
    informed consent (enhanced consent for off-label TPS).
  stage_5: >-
    Begin stimulation protocol per phenotype assignment. Monitor with C-SSRS at every
    session. Administer PHQ-9 at each visit. Full reassessment at session 5 (early
    response check), session 10 (mid-treatment), and session 15 (endpoint). Adjust
    protocol if early non-response detected.

tps_evidence:
  total_papers: 203
  high_quality_count: 53
  evidence_grade: "strong"
  key_papers:
    - doi: "10.1016/j.ajp.2023.103891"
      title: "The association of total pulses with the efficacy of repetitive transcranial magnetic stimulation for treatment-resistant depression"
      year: 2023
      study_type: "meta-analysis"
      citations: 15
      takeaway: "Higher doses of transcranial pulse stimulation are not always associated with increased improvement of depressive symptoms; pulse calibration is critical."
    - doi: "10.3390/neurolint17110188"
      title: "Neuromodulatory Effects of Transcranial Pulse Stimulation (TPS) in Neurological and Psychiatric Disorders — A Systematic Review"
      year: 2025
      study_type: "meta-analysis"
      citations: 0
      takeaway: "TPS shows positive effects on cognitive, motor, and mental health outcomes including depression with a high safety profile."
    - doi: "10.1007/s13534-024-00369-0"
      title: "A review of functional neuromodulation in humans using low-intensity transcranial focused ultrasound"
      year: 2024
      study_type: "systematic review"
      citations: 32
      takeaway: "Low-intensity tFUS shows promising potential for non-invasive brain stimulation in patients with central nervous system disorders."
    - doi: "10.1111/cns.14372"
      title: "Transcranial pulse stimulation in Alzheimer's disease"
      year: 2023
      study_type: "systematic review"
      citations: 12
      takeaway: "TPS shows promise in improving cognitive performance and reducing depressive symptoms, with translational implications for primary depression."
  clinical_note: >
    Depression has the largest TPS-adjacent evidence base with 203 papers and 53 high-quality studies.
    Meta-analyses confirm the importance of pulse dosing calibration, and TPS studies in Alzheimer's
    consistently report significant reductions in comorbid depressive symptoms.


fnon_protocol:
  primary_network: "ECN (L-DLPFC) + DMN"
  secondary_network: "DMN PCC rumination"
  f_band: "Alpha asymmetry + Theta suppression"
  eeg_nodes: "F3(L-DLPFC)+Pz(PCC/DMN)+T3/T4 (limbic)"
  oscillation_goal: >
    Correct L>R DLPFC alpha asymmetry (FAA); suppress frontal theta; reduce DMN rumination hyperactivity
  primary_modality_params: >
    TPS: 6000 pulses, EFD 0.20 mJ/mm², 5 Hz PRF, 6-12 sessions. OR TMS 10Hz L-DLPFC (120%rMT, 3000 pulses, 30 sessions)
  addon_modality: >
    CES (Alpha-Stim 0.5Hz, 60min daily) for frontal alpha; taVNS (25Hz, 30-60min) for limbic theta
  sessions: "6–30"
  evidence_level: "Pilot RCT+2025 RCTs (TPS); FDA Cleared (TMS)"
  lit_count: "14+ TPS; 500+ TMS; 200+ tDCS"
  key_references: "Keeser 2023 IJERPH (34 cit); O'Reardon 2007; CINP 2025 3x TPS RCTs"
  fnon_notes: >
    FAA (F4-F3 alpha) = primary qEEG biomarker for MDD. TPS offers faster treatment (6 vs 30 sessions).

qeeg_biomarkers:
  primary_biomarker: "FAA R>L; ↑Theta"
  f_band_target: "Alpha asymmetry + Theta"

