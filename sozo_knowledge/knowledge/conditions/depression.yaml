# Major Depressive Disorder — SOZO Clinical Knowledge (Enriched)
# ICD-10: F32
# Content enriched from legacy generator prose.

slug: depression
display_name: Major Depressive Disorder
icd10: F32
aliases:
- MDD
- major depression
- unipolar depression
- clinical depression
category: psychiatric
version: '1.0'
overview: Major Depressive Disorder (MDD) is a highly prevalent, recurrent psychiatric disorder characterized by persistent
  low mood, anhedonia, and a range of cognitive, somatic, and neurovegetative symptoms. MDD affects approximately 264 million
  people globally (WHO), with lifetime prevalence of 15-20% in high-income countries. It is a leading cause of disability
  worldwide. Approximately 30-40% of MDD patients fail to respond to two or more adequate antidepressant trials, meeting criteria
  for Treatment-Resistant Depression (TRD). tDCS targeting the left DLPFC represents one of the best-evidenced non-invasive
  neuromodulation approaches in psychiatry, supported by multiple sham-controlled RCTs and meta-analyses.
pathophysiology: 'MDD involves dysfunction across multiple neurobiological systems. The monoaminergic hypothesis implicates
  serotonin, noradrenaline, and dopamine deficits, forming the basis of pharmacological treatment. Neuroimaging studies reveal
  a consistent pattern of left DLPFC hypoactivation and subgenual anterior cingulate cortex (sgACC/Cg25) hyperactivation in
  MDD. The sgACC serves as a critical node linking cortical and limbic circuits; its hyperactivity propagates depressogenic
  tone throughout the default mode network.


  The network-level model of MDD identifies three core network disruptions: (1) Default Mode Network (DMN) hyperactivation
  — excessive self-referential rumination; (2) Central Executive Network (CEN/FPN) hypoactivation — impaired cognitive control
  and emotion regulation; (3) Salience Network (SN) dysregulation — aberrant switching between networks.


  Neuroplasticity impairment is increasingly recognized: reduced BDNF signaling, hippocampal volume loss (particularly in
  recurrent MDD), and impaired synaptic plasticity in prefrontal circuits. HPA axis hyperactivity drives glucocorticoid-mediated
  prefrontal and hippocampal damage. Neuroinflammatory markers (elevated IL-6, TNF-alpha, CRP) are elevated in a significant
  subset of MDD patients.'
epidemiology: Affects approximately 264 million people globally (WHO); lifetime prevalence 15-20% in high-income countries.
  Leading cause of disability worldwide.
core_symptoms:
- Persistent depressed mood (most of the day, nearly every day)
- Anhedonia — markedly diminished interest or pleasure in activities
- Significant weight change or appetite disturbance
- Insomnia or hypersomnia
- Psychomotor agitation or retardation
- Fatigue or loss of energy nearly every day
- Feelings of worthlessness or excessive guilt
- Diminished ability to think, concentrate, or make decisions
- Recurrent thoughts of death or suicidal ideation
non_motor_symptoms:
- Cognitive impairment (attention, working memory, executive function)
- Anxiety symptoms (comorbid anxiety in 60-70% of MDD patients)
- Somatic complaints (headache, chronic pain, GI symptoms)
- Social withdrawal and functional impairment
- Irritability (more prevalent in younger patients and males)
- Emotional blunting (common with antidepressant treatment)
brain_regions:
- dlpfc
- sgacc
- acc
- amygdala
- hippocampus
- vmpfc
- insula
brain_region_details:
  dlpfc: Consistently hypoactive in MDD; primary tDCS anodal target. Mediates cognitive control and emotion regulation.
  sgacc: Hyperactive hub in MDD; downstream target of DLPFC stimulation. sgACC hyperactivity correlates with rumination.
  acc: Involved in error monitoring, conflict processing, and mood regulation. Dorsal ACC activity predicts antidepressant
    response.
  amygdala: Hyperreactive to negative stimuli in MDD. Reduced DLPFC-amygdala connectivity underlies emotion dysregulation.
  hippocampus: Volume loss in recurrent MDD; impaired neurogenesis.
  vmpfc: Part of DMN; involved in self-referential processing. Hyperactive in ruminative MDD.
  insula: Key SN node; interoceptive processing. Hyperactive in MDD, contributing to somatic complaints.
network_profiles:
- network: dmn
  dysfunction: hyper
  severity: severe
  primary: true
  relevance: Primary dysfunctional network in MDD. DMN hyperactivation underlies pathological self-referential rumination
    and failure to task-disengage.
  evidence_note: Most replicated finding in MDD neuroimaging; Greicius et al. 2007, Hamilton et al. 2011
- network: cen
  dysfunction: hypo
  severity: severe
  primary: false
  relevance: Left DLPFC hypoactivation impairs cognitive control and top-down emotion regulation. CEN upregulation via anodal
    tDCS is the primary treatment mechanism.
  evidence_note: Robust fMRI evidence; foundational basis for DLPFC tDCS in MDD
- network: sn
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: Anterior insula and dACC hyperactivity drives aberrant salience attribution to negative stimuli. Impaired network
    switching perpetuates DMN hyperactivation.
  evidence_note: Menon (2011) triple network model
- network: limbic
  dysfunction: hyper
  severity: severe
  primary: false
  relevance: Amygdala hyperreactivity and reduced prefrontal-limbic connectivity underpin emotional dysregulation and persistent
    negative mood.
  evidence_note: Drevets et al., multiple meta-analyses of MDD neuroimaging
- network: attention
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: Attention and concentration impairment are core cognitive features of MDD, reflecting frontal dopamine depletion.
  evidence_note: ''
primary_network: dmn
fnon_rationale: In MDD, the triple network model identifies DMN hyperactivation and CEN hypoactivation as the core pathological
  network pattern. FNON framework targets left DLPFC (CEN node) for anodal upregulation to restore CEN-DMN balance, while
  right DLPFC cathodal placement reduces relative right hemispheric hyperactivation. Secondary limbic network targeting addresses
  treatment-resistant and melancholic subtypes. All network interventions aim to restore the physiological CEN-SN-DMN anticorrelated
  balance.
