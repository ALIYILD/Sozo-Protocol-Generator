assessment_profile:
  primary_clinical_scales: >
    PHQ-9, HAM-D (Hamilton Depression Rating), MADRS, BDI-II, Columbia Suicide Severity Rating (C-SSRS), GAD-7 (comorbid anxiety), IDS-SR, QIDS-SR, Anhedonia Scale (SHAPS)
  neuropsychological_battery: >
    Stroop Color-Word (cognitive inhibition), TMT-A&B (executive), RAVLT (verbal memory), WAIS Processing Speed, WSCT (cognitive flexibility), FAS verbal fluency, MoCA (global screen), CANTAB emotional battery
  physiological_assessments: >
    HRV (↓ RMSSD, vagal tone index); Sleep study/actigraphy (insomnia pattern — early morning waking); Cortisol awakening response; QIDS sleep subscale; HPA axis markers
  functional_assessments: >
    PHQ-9 depression severity; WSAS (work/social functioning); WHODAS disability; Columbia C-SSRS (safety); Mood diary/app
  neuroimaging: >
    MRI volumetrics (hippocampal volume, PFC grey matter); fMRI resting-state (DMN hyperconnectivity); FDG-PET (↓ prefrontal metabolism, ↑ subgenual ACC)
  assessment_rationale: >
    FAA is the primary qEEG biomarker for MDD severity and TMS response prediction. F3 is primary TMS/TPS stimulation site.
  primary_scale: >
    PHQ-9 (weekly/monthly baseline & follow-up)
  screening_scales: >
    PHQ-2 (screening); ZUNG; CES-D
  severity_staging: >
    HAM-D-17; MADRS; IDS-SR; QIDS-SR
  qol_scale: >
    WHODAS-2; WSAS; Q-LES-Q (Quality of Life Enjoyment and Satisfaction)
  follow_up_frequency: >
    Weekly PHQ-9 during treatment; Monthly follow-up
  comorbidity_screens: >
    GAD-7 (anxiety); ISI (insomnia); AUDIT (alcohol); DAST-10
  safety_screens: >
    C-SSRS (suicide risk — every session); PHQ-9 Q9 screen
  score_thresholds: >
    PHQ-9: 0-4 None; 5-9 Mild; 10-14 Moderate; 15-19 Mod-Severe; ≥20 Severe. MADRS ≥20 = treatment candidate. HAM-D ≥17 = moderate.
  qeeg_primary_signature: >
    ↑ Frontal theta (Fz); Frontal alpha asymmetry (FAA: F4>F3 = ↓ L-DLPFC activity); ↑ Beta eyes-open; ↓ Alpha globally; ↑ Delta+Theta broad
  qeeg_key_electrodes: "F3, F4 (FAA primary); Fz (theta); Fp1/Fp2 (prefrontal); Cz; C4 (R-central AEC)"
  qeeg_key_metrics: >
    FAA (F4-F3 alpha, mV²); Absolute theta Fz; APF; TBR; Alpha/theta ratio; wPLI coherence F3-Fz
  qeeg_eyes_open: >
    ↑ Beta globally; ↑ Frontal alpha asymmetry (R>L activity); ↑ Frontal theta; ↓ Alpha asymmetry
  qeeg_eyes_closed: >
    ↑ Frontal theta (Fz) — most consistent marker; ↓ Global alpha; ↑ Delta; Asymmetric frontal alpha
  qeeg_event_related: >
    P300 at Cz/Pz (cognitive load); N200 (error monitoring); Emotional Stroop ERP; Reward ERP (ERN at FCz)
  qeeg_pathological_threshold: >
    FAA >0.3 log units (F4>F3 alpha = L-hypoactivity); Theta Fz >6 μV²; APF <9.5 Hz globally
  qeeg_treatment_target: >
    FAA normalisation: L≥R alpha (restore L-DLPFC excitability); Frontal theta ↓ toward <4 μV² at Fz; APF ↑ toward 10 Hz; TMS/TPS F3 target
  qeeg_response_biomarker: >
    FAA change pre/post session (F4-F3 alpha); Frontal theta power Fz change; APF shift; PHQ-9 score correlation with qEEG improvement


neuromod_profile:
  key_symptoms: >
    Persistent sadness, anhedonia, fatigue, concentration difficulties, sleep disturbance, psychomotor retardation/agitation, suicidal ideation, appetite changes, guilt
  qeeg_patterns: >
    ↑ frontal theta (Fz), frontal alpha asymmetry (F3<F4 = ↓ L frontal activity), ↑ delta+theta, ↑ beta (eyes-open), ↓ alpha globally, ↑ theta/beta ratio (some subtypes), hyperconnectivity PLV/AEC, ↓ wPLI
  qeeg_electrodes: "F3, F4 (frontal asymmetry), Fp1/Fp2 (prefrontal slowing), Fz (midline theta), Cz (alpha/beta node), C4 (R centro-parietal AEC hyperconnectivity)"
  affected_regions: >
    DLPFC (L: hypoactive), subgenual ACC/Cg25 (hyperactive), OFC, medial PFC, amygdala (hyperactive), hippocampus (↓ volume)
  primary_networks_disrupted: >
    DMN (hyperactive/hyperconnected — rumination), CEN/Executive (hypoactive — poor executive control), Salience (impaired DMN↔CEN switching), Frontoparietal (↓ connectivity)
  network_dysfunction_pattern: >
    DMN fails to deactivate → persistent rumination; SN cannot switch CEN on to suppress DMN; L-DLPFC hypoactivity impairs top-down regulation
  recommended_techniques: >
    rTMS 10 Hz L-DLPFC (F3); iTBS L-DLPFC; tDCS anode F3 cathode Fp2; taVNS left ear 25 Hz; CES 0.5 Hz; tACS 10 Hz alpha or 77.5 Hz; PBM 810 nm bilateral DLPFC; DBS SCC/Cg25, VC/VS, MFB
  primary_stimulation_targets: "L-DLPFC (F3), subgenual ACC (Cg25), VC/VS, MFB"
  stimulation_rationale: >
    Excitatory L-DLPFC to counteract hypoactivity → restore CEN-DMN balance; inhibitory SCC/DBS to ↓ hyperactive subgenual ACC ruminative drive
