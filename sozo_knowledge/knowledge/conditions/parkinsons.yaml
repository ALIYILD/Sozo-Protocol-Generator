# ── Generation Hints ──────────────────────────────────────────────────────────

clinical_tips:
  - "Always document medication state (ON vs OFF) at time of stimulation — motor assessments should be conducted in the practically-defined OFF state when possible."
  - "Combine tDCS with concurrent physiotherapy or motor practice for synergistic neuroplastic effects."
  - "Establish Hoehn & Yahr stage and levodopa equivalent dose (LED) at baseline for outcome benchmarking."

governance_rules:
  - "All protocols require Doctor-level authorisation before initiation."
  - "Informed consent must be obtained and documented prior to first session."
  - "Outcome measures must be recorded at baseline, mid-treatment, and endpoint."
  - "Adverse events must be documented and reported within 24 hours."
  - "Protocol modifications require Doctor review and re-authorisation."

patient_journey_notes:
  stage_1: "Pre-screen for PD diagnosis (confirmed by neurologist). Confirm medication stability (>=4 weeks). Screen for absolute contraindications."
  stage_3: "Administer MDS-UPDRS III, MoCA, PHQ-9. Document H&Y stage, LED, and medication timing."
