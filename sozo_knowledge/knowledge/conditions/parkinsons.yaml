clinical_tips:
- Always confirm consistent medication state before treatment — document ON or OFF and levodopa dose timing at every session
- For tremor-dominant PD, consider cerebellar tDCS/TPS as adjunct to M1 protocols (emerging evidence)
- 'Dyskinesia monitoring: anodal M1 tDCS may temporarily increase dyskinesias in patients on high LED — reduce intensity if
  necessary'
- Dual-task paradigms during tDCS delivery may enhance gait outcomes (concurrent motor task during stimulation)
- PIGD phenotype patients benefit from combining tDCS with active physiotherapy during the same session window
governance_rules:
- No Fellow or Clinical Assistant may independently modify treatment plans without Doctor authorization
- All TPS applications require explicit off-label informed consent and Doctor authorization
- Adverse events must be documented within 24 hours and escalated per clinic protocol
- Treatment records must be updated at every session
- Informed consent must be obtained and documented before initiating any modality
- Levodopa medication state must be documented at every PD session — this is mandatory
- TPS for PD is explicitly OFF-LABEL — off-label consent documentation required in patient file before every treatment block
- Any worsening of dyskinesia following tDCS must be documented and reported to the treating Doctor same day
patient_journey_notes:
  stage_1: Pre-screen for PD diagnosis (confirmed by neurologist). Confirm medication stability (>=4 weeks). Screen for absolute
    contraindications.
  stage_3: Administer MDS-UPDRS III, MoCA, PHQ-9. Document H&Y stage, LED, and medication timing.
