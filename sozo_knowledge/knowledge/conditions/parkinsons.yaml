clinical_tips:
- >-
  Always confirm and document consistent medication state before treatment. Record ON or OFF status and
  exact levodopa dose timing at every session. Inconsistent medication state is the single biggest
  confounder in PD neuromodulation outcomes.
- >-
  For tremor-dominant PD, consider adding cerebellar tDCS (C5) or cerebellar TPS (T2) as adjunct to M1
  protocols. The cerebello-thalamo-cortical tremor circuit requires targeted modulation beyond standard
  M1 stimulation. Emerging evidence supports this dual-target approach.
- >-
  Dyskinesia monitoring is essential. Anodal M1 tDCS may temporarily increase dyskinesias in patients
  on high levodopa equivalent doses. If dyskinesias worsen during stimulation, reduce intensity to 1.5 mA
  or shorten session duration. Document dyskinesia severity using MDS-UPDRS Part IV at each visit.
- >-
  Dual-task paradigms during tDCS delivery enhance gait outcomes for PIGD phenotype. Have patients
  perform a cognitive task (serial subtraction, verbal fluency) while walking during or immediately
  after stimulation. This leverages activity-dependent plasticity to maximise functional transfer.
- >-
  PIGD phenotype patients benefit most from combining tDCS with active physiotherapy during the same
  session window (within 30 minutes of stimulation). The post-stimulation plasticity window is time-limited,
  so coordinate scheduling with the physiotherapy team.
- >-
  Screen all PD patients for depression and anxiety at baseline using both HAM-D and BDI-II — non-motor
  symptoms are frequently under-diagnosed and significantly impact treatment engagement. A patient with
  untreated severe depression may not engage adequately with concurrent rehabilitation tasks.
- >-
  For cognitive protocols (C3, T3), combine with structured cognitive training during stimulation. N-back
  tasks, Trail Making Test practice, and computerised cognitive training programmes (e.g. BrainHQ) are
  suitable concurrent activities that engage the target DLPFC/PPC networks during the stimulation window.
- >-
  Document Hoehn and Yahr stage at baseline and every 3 months. Phenotype can shift over time (TD to PIGD
  conversion is common in disease progression). Protocol selection should be reassessed if phenotype changes
  — do not continue the original protocol unchanged if the clinical picture has evolved.
- >-
  TPS sessions should ideally be conducted in the ON medication state for patient comfort and to allow
  meaningful motor assessment. However, document any OFF-state assessments as these provide the most
  sensitive measure of stimulation-specific (medication-independent) benefit.
- >-
  Manage patient expectations explicitly. Neuromodulation in PD is an adjunct therapy — it does not replace
  dopaminergic medication, and effects are typically modest (30% UPDRS improvement is a realistic best case).
  Frame treatment as enhancing the benefit of existing medication and rehabilitation, not as a standalone cure.

governance_rules:
- No Fellow or Clinical Assistant may independently modify PD treatment plans or protocol parameters without explicit Doctor authorization
- All TPS applications for PD require explicit off-label informed consent documentation and Doctor authorization before first session
- Adverse events (including dyskinesia worsening, falls, syncope, or new neurological symptoms) must be documented within 24 hours and escalated per clinic protocol
- Treatment records including medication state, LED, session parameters, and outcome measures must be updated at every session without exception
- Informed consent must be obtained and documented before initiating any stimulation modality — PD-specific risks (dyskinesia, falls, medication interaction) must be explicitly discussed
- Levodopa medication state (ON/OFF), exact dose, and timing relative to session must be documented at every PD session — this is mandatory for clinical governance and outcome interpretation
- TPS for PD is explicitly OFF-LABEL — off-label consent documentation required in patient file before every treatment block, renewed at each new treatment block
- Any worsening of dyskinesia following tDCS or TPS must be documented and reported to the treating Doctor on the same day — do not wait for the next scheduled review
- Protocol deviations (missed sessions, parameter modifications, schedule changes) must be documented with reason and approved by the treating Doctor within 48 hours
- Phenotype reassessment must be conducted formally every 3 months or whenever clinical presentation changes significantly — protocol selection depends on accurate phenotype classification

patient_journey_notes:
  stage_1: >-
    Pre-screening: Confirm PD diagnosis by movement disorder specialist (MDS Clinical Diagnostic Criteria
    or UK Brain Bank Criteria). Confirm medication stability (>=4 weeks stable regimen). Screen for absolute
    contraindications (DBS, metallic implants, cardiac devices, epilepsy, pregnancy). Obtain neurologist
    referral letter. Check Hoehn and Yahr stage eligibility (1-4).
  stage_2: >-
    Initial consultation: Full medical history review including PD duration, medication regimen (calculate
    LED), surgical history (DBS candidacy status), comorbidities. Phenotype classification (TD, AR, PIGD,
    COG, DEP, Mixed) based on comprehensive motor and non-motor assessment. Discuss treatment options,
    expected outcomes, off-label status for TPS, and obtain informed consent.
  stage_3: >-
    Baseline assessment: Administer MDS-UPDRS Parts I-IV (document medication state), MoCA, HAM-D, BDI-II,
    FOG-Q, TUG (single and dual-task), PDQ-39, SOZO PRS. Document H&Y stage, LED, medication timing.
    Assign phenotype and select protocol based on dominant symptom cluster and phenotype-protocol matching.
  stage_4: >-
    Treatment delivery: Deliver protocol per parameters. Monitor for adverse effects at each session
    (dyskinesia, skin irritation, headache, dizziness, mood change). Document medication state at every
    session. Conduct mid-treatment assessment (session 5 for tDCS, session 3 for TPS) with abbreviated
    outcome measures (MDS-UPDRS III, MoCA if cognitive protocol, HAM-D if mood protocol).
  stage_5: >-
    Endpoint and follow-up: Full reassessment battery at treatment endpoint. Compare to baseline.
    Apply responder criteria. For responders: discuss maintenance schedule (monthly booster sessions).
    For non-responders: follow non-responder pathway. Schedule 1-month and 3-month follow-up assessments
    to evaluate durability of benefit. Communicate outcomes to referring neurologist.
