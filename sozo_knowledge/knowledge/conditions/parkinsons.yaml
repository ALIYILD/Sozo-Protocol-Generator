# SOZO Brain Center — Clinical Knowledge File
# Condition: Parkinson's Disease (G20)
# Version: 1.0
# Schema: KnowledgeCondition (schemas.py)
# ──────────────────────────────────────────────────────────────────────────────

slug: parkinsons
display_name: "Parkinson's Disease"
icd10: "G20"
aliases:
  - PD
  - Parkinson disease
  - "Parkinson's"
category: neurodegenerative
version: "1.0"

# ── Clinical ──────────────────────────────────────────────────────────────────

overview: >-
  Parkinson's Disease is a progressive neurodegenerative disorder characterised
  by motor symptoms (bradykinesia, resting tremor, rigidity, postural instability)
  arising from dopaminergic neuron loss in the substantia nigra pars compacta.
  Non-motor symptoms including cognitive impairment, depression, and autonomic
  dysfunction significantly impact quality of life.

pathophysiology: >-
  Progressive loss of dopaminergic neurons in the substantia nigra pars compacta
  leads to striatal dopamine depletion, disrupting the basal ganglia-thalamocortical
  circuit and impairing voluntary movement initiation. Lewy body pathology
  (alpha-synuclein aggregation) spreads in a Braak staging pattern.

epidemiology: "Affects approximately 1-2% of the population over 60 years of age; second most common neurodegenerative disorder after Alzheimer's disease."

core_symptoms:
  - "Bradykinesia (slowness of movement) — cardinal symptom required for diagnosis"
  - "Resting tremor (4-6 Hz, pill-rolling character) — present in ~70% of patients"
  - "Rigidity (cogwheel or lead-pipe) — increased tone throughout range of movement"
  - "Postural instability — late feature, significant fall risk"
  - "Freezing of gait (FOG) — sudden, transient inability to initiate steps"
  - "Hypomimia (reduced facial expression)"

non_motor_symptoms:
  - "Cognitive impairment and dementia (PD-MCI in 25-30%)"
  - "Depression (prevalence 40-50%)"
  - "Anxiety (prevalence 30-40%)"
  - "Apathy (prevalence 40%)"
  - "REM sleep behaviour disorder"
  - "Autonomic dysfunction (orthostatic hypotension, constipation)"

# ── Anatomy ───────────────────────────────────────────────────────────────────

brain_regions:
  - m1
  - sma
  - dlpfc
  - acc
  - cerebellum
  - thalamus
  - striatum

brain_region_details:
  m1: "Reduced activation due to impaired thalamocortical drive; primary tDCS anodal target"
  sma: "Hypoactive in PD; involved in movement initiation and sequence learning"
  dlpfc: "Impaired in executive and cognitive PD subtypes; target for cognitive and mood protocols"
  acc: "Involved in apathy, motivation, and error monitoring"
  cerebellum: "Compensatory hyperactivation in PD motor circuitry; tremor target"
  thalamus: "Receives basal ganglia output; reduced thalamocortical drive due to GPi overactivity"
  striatum: "Primary target of nigrostriatal dopaminergic projections; dopamine depletion disrupts pathway balance"

# ── Networks (FNON) ──────────────────────────────────────────────────────────

network_profiles:
  - network: smn
    dysfunction: hypo
    severity: severe
    primary: true
    relevance: "Primary network in PD. Dopaminergic depletion disrupts basal ganglia thalamocortical motor loop. Reduced M1 and SMA activation."
    evidence_note: "Established; foundational PD pathophysiology"

  - network: cen
    dysfunction: hypo
    severity: moderate
    primary: false
    relevance: "Executive dysfunction is the most common cognitive impairment in PD. DLPFC hypoactivation on functional imaging."
    evidence_note: "Multiple fMRI and neuropsychological studies"

  - network: dmn
    dysfunction: hyper
    severity: moderate
    primary: false
    relevance: "DMN hyperactivation and failure to deactivate during task performance is associated with PD-related cognitive decline and visual hallucinations."
    evidence_note: "Lewy body cortical pathology; resting-state fMRI studies"

  - network: limbic
    dysfunction: hypo
    severity: moderate
    primary: false
    relevance: "Serotonergic and noradrenergic depletion underlies depression (40-50%), anxiety (30%), and apathy (40%) in PD."
    evidence_note: "Neuroimaging and neurochemical studies in PD depression"

  - network: sn
    dysfunction: hypo
    severity: mild
    primary: false
    relevance: "Reduced autonomic reactivity, apathy, and impaired network switching reflect salience network dysfunction."
    evidence_note: ""

primary_network: smn

fnon_rationale: >-
  In PD the primary dysfunctional network is the Sensorimotor Network (SMN),
  driven by basal ganglia-thalamocortical circuit disruption. FNON directs primary
  stimulation at SMN (M1/SMA targets) while addressing CEN for cognitive subtypes,
  limbic network for depression/apathy, and attention networks for PD-MCI.

# ── Phenotypes ────────────────────────────────────────────────────────────────

phenotypes:
  - slug: td
    label: "TD — Tremor-Dominant"
    description: "Predominantly tremor with minimal bradykinesia and rigidity. Slower progression."
    key_features:
      - "Resting tremor 4-6 Hz"
      - "Pill-rolling tremor"
      - "Minimal bradykinesia"
      - "Slower disease progression"
    primary_networks: [smn, attention]
    secondary_networks: [cen]
    preferred_modalities: [tdcs, tps]
    tdcs_target: "M1 bilateral (C3/C4 anodal)"
    tps_target: "M1 / Cerebellar cortex (bilateral)"

  - slug: ar
    label: "AR — Akinetic-Rigid"
    description: "Predominant bradykinesia and rigidity without significant tremor. More rapid motor progression."
    key_features:
      - "Bradykinesia"
      - "Lead-pipe rigidity"
      - "Minimal tremor"
      - "Hypomimia"
    primary_networks: [smn, cen]
    secondary_networks: [limbic]
    preferred_modalities: [tdcs, tps]
    tdcs_target: "M1 bilateral + SMA (C3/C4/Cz anodal)"
    tps_target: "M1 + SMA bilateral"

  - slug: pigd
    label: "PIGD — Postural Instability / Gait Difficulty"
    description: "Prominent gait freezing, falls, and postural instability. Poorer prognosis."
    key_features:
      - "Postural instability"
      - "Freezing of gait"
      - "Falls"
      - "Dual-task interference"
    primary_networks: [smn, attention]
    secondary_networks: [cen]
    preferred_modalities: [tdcs, tps]
    tdcs_target: "SMA (Cz) + L-DLPFC (F3)"
    tps_target: "SMA + M1 bilateral"

  - slug: cog
    label: "COG — Cognitive-Predominant (PD-MCI)"
    description: "Executive dysfunction, attention deficits, and memory impairment predominate."
    key_features:
      - "Executive dysfunction"
      - "Working memory impairment"
      - "Attention deficits"
      - "Visuospatial difficulties"
    primary_networks: [cen, dmn]
    secondary_networks: [attention]
    preferred_modalities: [tdcs, tps]
    tdcs_target: "L-DLPFC (F3 anodal)"
    tps_target: "L-DLPFC + bilateral PPC"

# ── Assessments ───────────────────────────────────────────────────────────────

assessments:
  - scale_key: updrs
    timing: baseline
    primary: true
    notes: "MDS-UPDRS Part III (Motor Examination) is the primary motor outcome measure."

  - scale_key: moca
    timing: baseline
    primary: false
    notes: "Montreal Cognitive Assessment for PD-MCI screening. Score <26 warrants further evaluation."

  - scale_key: phq9
    timing: baseline
    primary: false
    notes: "Screen for comorbid depression — prevalence 40-50% in PD."

  - scale_key: fog_q
    timing: baseline
    primary: false
    notes: "Freezing of Gait Questionnaire for PIGD phenotype monitoring."

# ── Modalities ────────────────────────────────────────────────────────────────

applicable_modalities:
  - tdcs
  - tps
  - tavns
  - ces

# ── Protocols ─────────────────────────────────────────────────────────────────

protocols:
  - protocol_id: pd-tdcs-motor
    label: "tDCS Motor (Bradykinesia & Rigidity)"
    modality: tdcs
    target_region: "Primary Motor Cortex bilateral"
    target_abbreviation: M1
    target_electrodes: [C3, C4, Fp1, Fp2]
    phenotype_slugs: [td, ar, pigd]
    network_targets: [smn]
    parameters:
      current_mA: 2.0
      duration_min: 20-30
      anode: "C3, C4"
      cathode: "Fp1, Fp2 (supraorbital)"
    rationale: "Bilateral anodal M1 tDCS enhances motor cortex excitability and reduces bradykinesia severity."
    evidence_level: high
    off_label: false
    session_count: 10
    notes: "From protocol_data C1. Combine with physiotherapy."

  - protocol_id: pd-tdcs-cognition
    label: "tDCS Cognition & Executive Function"
    modality: tdcs
    target_region: "Left Dorsolateral Prefrontal Cortex"
    target_abbreviation: L-DLPFC
    target_electrodes: [F3, Fp2]
    phenotype_slugs: [cog]
    network_targets: [cen]
    parameters:
      current_mA: 2.0
      duration_min: 20
      anode: F3
      cathode: "Fp2 (contralateral supraorbital)"
    rationale: "L-DLPFC anodal tDCS enhances working memory and executive control in PD-MCI."
    evidence_level: medium
    off_label: false
    session_count: 10
    notes: "From protocol_data C3."

  - protocol_id: pd-tps-motor
    label: "TPS Motor (Bradykinesia & Rigidity)"
    modality: tps
    target_region: "Bilateral M1 + SMA"
    target_abbreviation: "M1/SMA"
    target_electrodes: [C3, C4, FCz]
    phenotype_slugs: [td, ar]
    network_targets: [smn]
    parameters:
      pulses: 3000-5000
      frequency_hz: 5
      energy_mJ_mm2: 0.2
    rationale: "M1 bilateral targeting reduces motor cortex hyperexcitability; SMA supports initiation circuits."
    evidence_level: medium
    off_label: true
    session_count: 6
    notes: "From protocol_data T1. Emerging evidence."

  - protocol_id: pd-tps-cognition
    label: "TPS Cognition (PD-MCI)"
    modality: tps
    target_region: "L-DLPFC + bilateral PPC"
    target_abbreviation: "DLPFC/PPC"
    target_electrodes: [F3, F4, P3]
    phenotype_slugs: [cog]
    network_targets: [cen, attention]
    parameters:
      pulses: 4000
      frequency_hz: 5
      energy_mJ_mm2: 0.2
    rationale: "DLPFC facilitates working memory; PPC supports spatial-attentional integration."
    evidence_level: low
    off_label: true
    session_count: 6
    notes: "From protocol_data T3. Preliminary evidence."

  - protocol_id: pd-tdcs-mood
    label: "tDCS Depression & Apathy"
    modality: tdcs
    target_region: "Bilateral DLPFC"
    target_abbreviation: "DLPFC"
    target_electrodes: [F3, F4]
    phenotype_slugs: [cog, ar]
    network_targets: [cen, limbic]
    parameters:
      current_mA: 2.0
      duration_min: 20-30
      anode: F3
      cathode: F4
    rationale: "Left prefrontal facilitation with right inhibition mirrors rTMS antidepressant montage."
    evidence_level: medium
    off_label: false
    session_count: 10
    notes: "From protocol_data C4."

# ── Safety ────────────────────────────────────────────────────────────────────

safety_rules:
  - category: contraindication
    description: "Deep Brain Stimulator (DBS) implanted — absolute contraindication for TPS and tDCS due to DBS interaction risk."
    severity: absolute
    modalities: [tps, tdcs]
    source: "Device manufacturer guidelines"

  - category: precaution
    description: "Unstable ON/OFF fluctuations — time sessions during stable ON window for TPS."
    severity: moderate
    modalities: [tps]
    source: "Clinical practice"

  - category: monitoring
    description: "Monitor for dyskinesia exacerbation during and after stimulation sessions."
    severity: moderate
    modalities: [tdcs, tps]
    source: "Clinical observation"

  - category: precaution
    description: "Document levodopa equivalent dose (LED) and medication timing relative to sessions."
    severity: moderate
    modalities: [tdcs, tps, tavns, ces]
    source: "SOZO clinical protocol"

  - category: stopping_rule
    description: "Discontinue if new or worsened dyskinesia persists >24 hours post-stimulation."
    severity: high
    modalities: [tdcs, tps]
    source: "Clinical safety protocol"

contraindications:
  - "Deep Brain Stimulator (DBS) implanted"
  - "Active seizure disorder or epilepsy"
  - "Metallic cranial implants in stimulation path"
  - "Unstable medical conditions (e.g. recent stroke <3 months)"
  - "Pregnancy"

inclusion_criteria:
  - "Confirmed diagnosis of idiopathic PD by neurologist (UK Brain Bank criteria)"
  - "Hoehn & Yahr stage 1-4"
  - "Stable medication regimen for >=4 weeks"
  - "Age 18-85 years"
  - "Able to provide informed consent"

exclusion_criteria:
  - "Deep Brain Stimulator or other implanted neurostimulation device"
  - "Parkinsonism secondary to medication, stroke, or other cause"
  - "Hoehn & Yahr stage 5 (wheelchair-bound/bedridden)"
  - "Severe dementia (MoCA <10)"
  - "Active psychosis or severe hallucinations"

# ── Responder ─────────────────────────────────────────────────────────────────

responder_criteria:
  - ">=30% improvement on MDS-UPDRS Part III motor score"
  - ">=2 point improvement on MoCA (cognitive protocol)"
  - ">=50% reduction on PHQ-9 (mood protocol)"
  - "Patient-reported Global Impression of Change (PGIC) >= 'much improved'"

non_responder_pathway: >-
  If <30% improvement on MDS-UPDRS III after 10 sessions: review phenotype
  assignment, consider protocol switch (e.g. add cerebellar target for tremor),
  escalate to multi-modal combination, or refer for DBS evaluation.

# ── Evidence ──────────────────────────────────────────────────────────────────

evidence_summary: >-
  tDCS targeting M1 for motor symptoms in PD is supported by multiple RCTs and
  meta-analyses (Level A-B evidence). Cognitive tDCS targeting DLPFC has moderate
  evidence. TPS for PD is emerging with pilot data supporting motor and cognitive
  outcomes.

evidence_quality: high

evidence_gaps:
  - "Long-term maintenance effects of tDCS in PD"
  - "TPS-specific RCTs in PD (currently pilot-level)"
  - "Optimal stimulation parameters for different PD phenotypes"
  - "Interaction between stimulation and levodopa pharmacokinetics"

