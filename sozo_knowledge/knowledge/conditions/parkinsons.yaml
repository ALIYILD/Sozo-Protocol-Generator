# Parkinson's Disease — SOZO Clinical Knowledge (Enriched)
# ICD-10: G20
# Content enriched from legacy generator prose.

slug: parkinsons
display_name: Parkinson's Disease
icd10: G20
aliases:
- PD
- Parkinson disease
- Parkinson's
category: neurodegenerative
version: '1.0'
overview: Parkinson's Disease (PD) is a progressive neurodegenerative disorder characterized primarily by motor symptoms including
  bradykinesia, resting tremor, rigidity, and postural instability, arising from the degeneration of dopaminergic neurons
  in the substantia nigra pars compacta and subsequent dysfunction of the basal ganglia thalamocortical circuit. PD is the
  second most common neurodegenerative disorder after Alzheimer's disease, affecting approximately 1-2% of the population
  over 60 years of age. Non-motor symptoms — including cognitive impairment, depression, anxiety, autonomic dysfunction, sleep
  disorders, and fatigue — are highly prevalent and significantly impact quality of life.
pathophysiology: 'PD pathophysiology involves the progressive loss of dopaminergic neurons in the substantia nigra pars compacta
  (SNpc), leading to dopamine depletion in the striatum (caudate nucleus and putamen). This disrupts the balance of direct
  and indirect pathways in the basal ganglia-thalamocortical circuit, resulting in reduced thalamo-cortical drive and impaired
  voluntary movement initiation.


  Lewy body pathology (alpha-synuclein aggregation) spreads through the nervous system in a staging pattern (Braak stages
  1-6), with early involvement of the dorsal motor nucleus of the vagus nerve and olfactory bulb, progressing to substantia
  nigra (Stage 3-4) and eventually neocortex (Stage 5-6).


  Neuroinflammation, mitochondrial dysfunction, oxidative stress, and impaired protein clearance (ubiquitin-proteasome system,
  autophagy) are implicated in neuronal death. Non-motor symptoms reflect pathology beyond the nigrostriatal system: cortical
  Lewy bodies contribute to cognitive decline; serotonergic and noradrenergic depletion underpins depression and anxiety;
  hypothalamic and autonomic nervous system involvement drives autonomic symptoms.'
epidemiology: Affects approximately 1-2% of the population over 60 years of age; second most common neurodegenerative disorder
  after Alzheimer's disease.
core_symptoms:
- Bradykinesia (slowness of movement) — cardinal symptom required for diagnosis
- Resting tremor (4-6 Hz, pill-rolling character) — present in ~70% of patients
- Rigidity (cogwheel or lead-pipe) — increased tone throughout range of movement
- Postural instability — late feature, significant fall risk
- Freezing of gait (FOG) — sudden, transient inability to initiate steps
- Hypomimia (reduced facial expression)
- Hypophonia and dysarthria
- Micrographia
non_motor_symptoms:
- Cognitive impairment and dementia (PD-MCI in 25-30%; PDD in 80% at 20 years)
- Depression (prevalence 40-50%)
- Anxiety (prevalence 30-40%)
- Apathy (prevalence 40%)
- REM sleep behaviour disorder (RBD) — prodromal marker
- Autonomic dysfunction (orthostatic hypotension, constipation, urinary urgency)
- Olfactory dysfunction (anosmia — early prodromal feature)
- Pain and sensory disturbances (40-85%)
- Fatigue
- Psychosis and hallucinations (dopaminergic treatment effect + disease progression)
- Impulse control disorders (dopamine agonist-related)
brain_regions:
- m1
- sma
- dlpfc
- acc
- cerebellum
- thalamus
- striatum
brain_region_details:
  m1: Reduced activation due to impaired thalamocortical drive; primary tDCS anodal target
  sma: Hypoactive in PD; involved in movement initiation and sequence learning
  dlpfc: Impaired in executive and cognitive PD subtypes; target for cognitive and mood protocols
  acc: Involved in apathy, motivation, and error monitoring
  cerebellum: Compensatory hyperactivation in PD motor circuitry; tremor target
  thalamus: Receives basal ganglia output; reduced thalamocortical drive due to GPi overactivity
  striatum: Primary target of nigrostriatal dopaminergic projections; dopamine depletion disrupts pathway balance
network_profiles:
- network: smn
  dysfunction: hypo
  severity: severe
  primary: true
  relevance: Primary network in PD. Dopaminergic depletion disrupts basal ganglia thalamocortical motor loop. Reduced M1 and
    SMA activation.
  evidence_note: Established; foundational PD pathophysiology
- network: cen
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: Executive dysfunction is the most common cognitive impairment in PD. DLPFC hypoactivation on functional imaging.
  evidence_note: Multiple fMRI and neuropsychological studies
- network: dmn
  dysfunction: hyper
  severity: moderate
  primary: false
  relevance: DMN hyperactivation and failure to deactivate during task performance is associated with PD-related cognitive
    decline and visual hallucinations.
  evidence_note: Lewy body cortical pathology; resting-state fMRI studies
- network: limbic
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: Serotonergic and noradrenergic depletion underlies depression (40-50%), anxiety (30%), and apathy (40%) in PD.
  evidence_note: Neuroimaging and neurochemical studies in PD depression
- network: sn
  dysfunction: hypo
  severity: mild
  primary: false
  relevance: Reduced autonomic reactivity, apathy, and impaired network switching reflect salience network dysfunction.
  evidence_note: ''
primary_network: smn
fnon_rationale: In Parkinson's Disease, the primary dysfunctional network is the Sensorimotor Network (SMN), driven by basal
  ganglia-thalamocortical circuit disruption from nigrostriatal dopamine depletion. The FNON framework directs primary stimulation
  efforts at the SMN (M1/SMA targets) while addressing secondary networks — CEN for cognitive subtypes, limbic network for
  depression/apathy subtypes, and attention networks for PD-MCI presentations.
phenotypes:
- slug: td
  label: TD — Tremor-Dominant
  description: Predominantly tremor with minimal bradykinesia and rigidity. Slower progression.
  key_features:
  - Resting tremor 4-6 Hz
  - Pill-rolling tremor
  - Minimal bradykinesia
  - Slower disease progression
  primary_networks:
  - smn
  - attention
  secondary_networks:
  - cen
  preferred_modalities:
  - tdcs
  - tps
  tdcs_target: M1 bilateral (C3/C4 anodal)
  tps_target: M1 / Cerebellar cortex (bilateral)
- slug: ar
  label: AR — Akinetic-Rigid
  description: Predominant bradykinesia and rigidity without significant tremor. More rapid motor progression.
  key_features:
  - Bradykinesia
  - Lead-pipe rigidity
  - Minimal tremor
  - Hypomimia
  primary_networks:
  - smn
  - cen
  secondary_networks:
  - limbic
  preferred_modalities:
  - tdcs
  - tps
  tdcs_target: M1 bilateral + SMA (C3/C4/Cz anodal)
  tps_target: M1 + SMA bilateral
- slug: pigd
  label: PIGD — Postural Instability / Gait Difficulty
  description: Prominent gait freezing, falls, and postural instability. Poorer prognosis.
  key_features:
  - Postural instability
  - Freezing of gait
  - Falls
  - Dual-task interference
  primary_networks:
  - smn
  - attention
  secondary_networks:
  - cen
  preferred_modalities:
  - tdcs
  - tps
  tdcs_target: SMA (Cz) + L-DLPFC (F3)
  tps_target: SMA + M1 bilateral
- slug: cog
  label: COG — Cognitive-Predominant (PD-MCI)
  description: Executive dysfunction, attention deficits, and memory impairment predominate.
  key_features:
  - Executive dysfunction
  - Working memory impairment
  - Attention deficits
  - Visuospatial difficulties
  primary_networks:
  - cen
  - dmn
  secondary_networks:
  - attention
  preferred_modalities:
  - tdcs
  - tps
  tdcs_target: L-DLPFC (F3 anodal)
  tps_target: L-DLPFC + bilateral PPC
