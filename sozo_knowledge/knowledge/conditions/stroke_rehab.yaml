category: neurological
version: '1.0'
overview: 'Post-stroke rehabilitation uses neuromodulation to enhance neuroplasticity and accelerate functional recovery after
  ischemic or hemorrhagic stroke. Stroke affects approximately 15 million people annually worldwide, with up to 5 million
  surviving with permanent disability. Post-stroke deficits include motor impairment (hemiparesis/plegia), aphasia/language
  impairment, visuospatial neglect, cognitive impairment, and post-stroke depression.


  tDCS is among the best-evidenced non-invasive neuromodulation approaches for stroke motor and language rehabilitation. A
  2016 Cochrane review (Elsner et al., N=1272 across 26 trials) confirmed positive effects on motor function, activities of
  daily living, and aphasia outcomes. IFCN evidence-based guidelines (Lefaucheur et al. 2017) endorse tDCS for stroke motor
  rehabilitation (Level A evidence for ischemic stroke motor recovery when delivered concurrently with physical therapy).


  The fundamental mechanism is exploitation of interhemispheric imbalance: anodal tDCS upregulates the hypoexcitable ipsilesional
  hemisphere; cathodal tDCS suppresses the hyperexcitable contralesional hemisphere. Both approaches enhance use-dependent
  motor plasticity when delivered concurrent with rehabilitation exercises.'
pathophysiology: 'Stroke causes focal ischemia (80% of strokes) or hemorrhage (20%), resulting in necrosis of the infarct
  core surrounded by a metabolically impaired penumbra that may recover with reperfusion. Post-stroke neuroplasticity involves
  several mechanisms: unmasking of latent transcallosal and corticocortical connections, axonal sprouting, dendritic remodeling,
  synaptogenesis, and cortical map reorganization (perilesional and contralesional plasticity).


  Interhemispheric imbalance is a central mechanism of post-stroke motor impairment: the injured hemisphere undergoes cortical
  hypoexcitability (reduced TMS motor evoked potential amplitude); the intact contralesional hemisphere becomes relatively
  hyperexcitable and exerts maladaptive transcallosal inhibition (via corpus callosum) on the injured hemisphere via GABA-mediated
  mechanisms, further suppressing ipsilesional motor cortex. This interhemispheric competition model underpins tDCS protocol
  design.


  Neuroimaging studies demonstrate bilateral SMN changes post-stroke: altered connectivity within ipsilesional sensorimotor
  network, recruitment of contralesional motor cortex and cerebellum as compensatory mechanisms. The degree of residual ipsilesional
  SMN connectivity predicts motor recovery potential.'
core_symptoms:
- Contralateral hemiparesis or hemiplegia — upper and/or lower limb
- Spasticity — velocity-dependent increased muscle tone
- Dysphagia — swallowing impairment (bulbar involvement)
- Aphasia — expressive (Broca's), receptive (Wernicke's), or global (left hemisphere strokes)
- Hemispatial neglect — visuospatial inattention (right hemisphere strokes)
- Sensory impairment — hemianesthesia, proprioceptive deficits
- Gait impairment and balance dysfunction
- Post-stroke fatigue (highly prevalent, often limiting rehabilitation capacity)
non_motor_symptoms:
- Post-stroke depression (prevalence 30-40%; peaks 3-12 months post-stroke)
- Post-stroke cognitive impairment (PSCI — 30-40%; memory, attention, executive function)
- Central post-stroke pain (thalamic and cortical pain)
- Anxiety and emotional lability / emotionalism
- Sleep disturbance
- Reduced quality of life and social participation
brain_regions:
- Ipsilesional Primary Motor Cortex (M1)
- Contralesional Primary Motor Cortex (M1)
- Ipsilesional Supplementary Motor Area (SMA)
- Left Inferior Frontal Gyrus — Broca's Area (IFG/BA44-45)
- Corticospinal Tract (CST)
- Dorsolateral Prefrontal Cortex (DLPFC) — post-stroke cognitive
brain_region_details:
  Ipsilesional Primary Motor Cortex (M1): Hypoexcitable post-stroke; primary anodal tDCS target to increase cortical excitability
    and facilitate use-dependent motor plasticity during concurrent physiotherapy.
  Contralesional Primary Motor Cortex (M1): Relatively hyperexcitable post-stroke; exerts maladaptive transcallosal inhibition
    on ipsilesional hemisphere. Cathodal tDCS target to reduce contralesional inhibition.
  Ipsilesional Supplementary Motor Area (SMA): Involved in bilateral motor coordination and gait initiation. Important for
    gait rehabilitation protocols.
  Left Inferior Frontal Gyrus — Broca's Area (IFG/BA44-45): Expressive language production. Anodal tDCS over ipsilesional
    Broca's or cathodal over contralesional homologue enhances speech therapy outcomes.
  Corticospinal Tract (CST): Integrity of ipsilesional CST is the strongest predictor of motor recovery — document with DTI
    if available.
  Dorsolateral Prefrontal Cortex (DLPFC) — post-stroke cognitive: Target for post-stroke cognitive rehabilitation (attention,
    executive function, working memory). Often involved in large MCA territory strokes.
network_profiles:
- network: smn
  dysfunction: hypo
  severity: severe
  primary: true
  relevance: PRIMARY NETWORK IN POST-STROKE REHABILITATION. Ipsilesional SMN hypoexcitability is the direct consequence of
    motor cortex and corticospinal tract injury. Combined with maladaptive contralesional SMN hyperexcitability, interhemispheric
    imbalance maintains ipsilesional hypofunction. Restoration of SMN connectivity drives motor recovery.
  evidence_note: Foundational stroke neuroplasticity; Nudo et al.; interhemispheric competition model
- network: cen
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: Post-stroke cognitive impairment (PSCI) reflects CEN disruption from frontal-subcortical pathway involvement
    in large MCA territory strokes and lacunar strokes. DLPFC tDCS protocols target executive function, attention, and working
    memory recovery.
  evidence_note: PSCI prevalence 30-40%; frontal-executive networks most affected
- network: limbic
  dysfunction: hypo
  severity: moderate
  primary: false
  relevance: Post-stroke depression (PSD — 30-40% prevalence) reflects limbic and frontal network disruption, reduced serotonergic/dopaminergic
    tone, and adjustment disorder components. PSD severely impairs rehabilitation participation and outcomes if untreated.
  evidence_note: Robinson RG et al. — post-stroke depression biopsychosocial model
- network: attention
  dysfunction: hypo
  severity: moderate-severe
  primary: false
  relevance: Hemispatial neglect and attentional deficits reflect right parietal network disruption (right hemisphere strokes
    most commonly). Dorsal and ventral attention networks affected. Neglect is an independent predictor of poor rehabilitation
    outcome.
  evidence_note: Right parietal cortex as attention network hub; neglect prognosis literature
- network: sn
  dysfunction: hypo
  severity: mild-moderate
  primary: false
  relevance: Post-stroke fatigue may reflect SN dysregulation — impaired interoceptive processing and altered effort-based
    decision-making. Anterior insula involvement in large cortical strokes.
  evidence_note: ''
primary_network: smn
fnon_rationale: 'Post-stroke rehabilitation targets the ipsilesional SMN for upregulation (anodal tDCS) and contralesional
  hemisphere for downregulation (cathodal tDCS) to restore interhemispheric excitability balance. The fundamental principle
  is concurrent delivery with active rehabilitation exercises to exploit activity-dependent neuroplasticity: tDCS lowers the
  threshold for Hebbian synaptic plasticity during task-specific motor training. Protocol selection is guided by: (1) lesion
  laterality (left vs right hemisphere); (2) dominant deficit (motor vs language vs cognitive); (3) time post-stroke (subacute
  vs chronic). Ipsilesional anodal vs contralesional cathodal approaches may be differentially effective based on degree of
  residual ipsilesional CST integrity.'
