  rationale: 'Bilateral M1 tDCS restores interhemispheric excitability balance: ipsilesional anodal upregulates hypoexcitable
    hemisphere; contralesional cathodal reduces maladaptive transcallosal inhibition. Cochrane review (Elsner et al. 2016,
    N=1272) confirms positive motor and ADL outcomes. IFCN Level A evidence for ischemic stroke motor rehabilitation. Hummel
