safety_rules:
- category: contraindication
  description: Active implanted electronic devices in the head/neck region
  severity: absolute
  modalities: []
  source: Manufacturer guidelines and consensus safety statements
- category: stopping_rule
  description: 'Discontinue immediately for Grade 3 adverse events: new seizure, severe headache, syncope, skin burn, worsening
    of psychiatric symptoms requiring acute intervention'
  severity: high
  modalities: []
  source: ''
- category: monitoring
  description: Assess and document adverse events at every session using a standardized monitoring checklist
  severity: moderate
  modalities: []
  source: ''
- category: precaution
  description: Ensure consistent medication state (ON or OFF) throughout treatment blocks to avoid false responder/non-responder
    classification
  severity: moderate
  modalities: []
  source: ''
- category: contraindication
  description: 'HEMORRHAGIC STROKE: tDCS is contraindicated within 6 months of hemorrhagic stroke (intracerebral hemorrhage,
    subarachnoid hemorrhage). Minimum 6 months post-hemorrhage with explicit physician neurology clearance. Document clearance
    in clinical record before treatment.'
  severity: high
  modalities: []
  source: Consensus safety guidelines for neuromodulation in hemorrhagic stroke; risk of vasodilation and re-bleeding in immature
    hemosiderin deposits
- category: precaution
  description: Review neuroimaging (CT/MRI) before electrode placement. Avoid placing electrodes directly over large cortical
    lesion cores. Determine lesion laterality to correctly identify ipsilesional vs contralesional hemisphere for montage
    selection.
  severity: high
  modalities: []
  source: Clinical safety requirement — incorrect montage selection can impair rather than facilitate recovery
- category: monitoring
  description: Monitor for seizure — post-stroke cortex has elevated seizure susceptibility. Any new onset seizure during
    tDCS is an absolute stopping rule. Ensure seizure management protocol is available at session location.
  severity: high
  modalities: []
  source: Post-stroke epilepsy risk; tDCS-seizure risk in susceptible cortex
- category: precaution
  description: tDCS MUST be delivered concurrent with the relevant rehabilitation task (motor exercises, speech therapy, cognitive
    training) — simultaneous NOT sequential. Idle tDCS without concurrent task engagement substantially reduces neuroplasticity
    benefit.
  severity: moderate
  modalities: []
  source: Activity-dependent plasticity model; Nitsche & Paulus 2000; Hummel et al. 2005
contraindications:
- Active implanted devices (cochlear implants, deep brain stimulators, cardiac pacemakers/defibrillators) unless explicitly
  cleared by device manufacturer
- Metallic implants in the head or neck region within the stimulation field
- Active epilepsy with uncontrolled seizures (relative contraindication — requires neurologist clearance)
- Skull defects or craniectomy at stimulation sites
- Skin lesions, wounds, or dermatological conditions at electrode placement sites
- Active malignancy of the central nervous system
- Pregnancy (precautionary contraindication — insufficient safety data)
- Severe psychiatric crisis requiring immediate hospitalization
- Post-hemorrhagic stroke <6 months — risk of stimulation-induced vasodilation and re-bleeding; minimum 6 months with physician
  clearance
- Active anticoagulation with supratherapeutic levels near TPS application site
inclusion_criteria:
- Confirmed ischemic or hemorrhagic stroke by neuroimaging (CT or MRI)
- 'Subacute or chronic stroke: >=4 weeks post-ischemic stroke; >=6 months post-hemorrhagic stroke (see safety notes)'
- Residual motor, language, or cognitive deficit amenable to rehabilitation
- Medically stable — no acute decompensation
- Age 18-85 years
- Capacity to provide informed consent or substitute decision-maker available
- Adequate skin integrity at electrode placement sites
exclusion_criteria:
- Acute stroke (<4 weeks post-ischemic) — unstable neurological status
- Hemorrhagic stroke <6 months — insufficient hematoma resolution; physician clearance required
- Severe cognitive impairment precluding informed consent or active rehabilitation participation
- Active epilepsy — stroke significantly increases seizure risk
- Large skull defect at stimulation site (craniectomy)
- Bilateral hemispheric lesions — interhemispheric balance model does not apply
responder_criteria:
- '>=6-point improvement in FMA-UE from baseline (minimal clinically important difference for stroke motor)'
- '>=5-point improvement in Barthel Index (ADL functional independence)'
- Clinically meaningful SOZO PRS improvement in primary deficit domain (>=3 points on 0-10 scale)
- PHQ-9 >=50% reduction (PSD phenotype)
non_responder_pathway: 'For patients classified as non-responders at Week 4:

  1. Review lesion laterality from neuroimaging — confirm correct ipsilesional vs contralesional montage

  2. Confirm stimulation is concurrent with active rehabilitation task — not pre or post therapy

  3. Re-evaluate phenotype — switch from motor to language or cognitive protocol if missed deficit

  4. Consider switching from bilateral to unilateral (ipsilesional anodal only) montage

  5. Screen for post-stroke depression — undertreated PSD severely limits rehabilitation engagement

  6. Neurological review — rule out progression or new ischemic events

  7. Consider extending to 20-session block for chronic stroke patients

  8. Refer to multidisciplinary stroke rehabilitation team for comprehensive assessment'
evidence_summary: 'Post-stroke rehabilitation has the strongest tDCS evidence base of all conditions. Cochrane review (Elsner
  et al. 2016, 26 trials, N=1272): tDCS improves motor function, ADLs, and aphasia outcomes vs sham. IFCN evidence-based guidelines
  (Lefaucheur et al. 2017): Level A recommendation for tDCS in ischemic stroke motor rehabilitation. Nitsche & Paulus (2000)
  established foundational dose-response. Hummel et al. (2005) demonstrated ipsilesional M1 anodal tDCS improved motor function
  in stroke patients. Aphasia tDCS: multiple positive RCTs including Fregni et al. (2005) and subsequent studies. Post-stroke
  depression tDCS: limited dedicated RCTs — evidence extrapolated from primary MDD.'
evidence_quality: high
evidence_gaps:
- Optimal timing post-stroke for tDCS initiation (acute vs subacute vs chronic) — no large comparative RCT
- Optimal concurrent rehabilitation task type (active vs passive; task-specific vs general) — limited comparative data
- TPS for stroke motor rehabilitation — very limited published data
- Post-stroke depression tDCS — dedicated adequately powered RCT needed
- Predictors of tDCS response in stroke — CST integrity, lesion volume, chronicity
