clinical_tips:
- tDCS MUST be delivered concurrent with the rehabilitation task — simultaneous NOT sequential. This is the most critical
  implementation detail.
- Always identify lesioned hemisphere from neuroimaging before selecting montage. Incorrect montage selection (cathode on
  ipsilesional hemisphere) will impair recovery.
- 'Hemorrhagic stroke: minimum 6 months with explicit neurology physician clearance before tDCS — document clearance in clinical
  record.'
- Screen for post-stroke depression at baseline (PHQ-9) — untreated PSD halves rehabilitation outcomes and is highly treatable
  with DLPFC tDCS + antidepressants.
- For aphasia protocols, coordinate with speech-language therapist to perform naming/repetition tasks during stimulation.
governance_rules:
- No Fellow or Clinical Assistant may independently modify treatment plans without Doctor authorization
- All TPS applications require explicit off-label informed consent and Doctor authorization
- Adverse events must be documented within 24 hours and escalated per clinic protocol
- Treatment records must be updated at every session
- Informed consent must be obtained and documented before initiating any modality
- Hemorrhagic stroke cases require explicit physician neurology clearance before tDCS initiation — document in clinical record
- Post-stroke depression monitoring (PHQ-9, C-SSRS) mandatory at every session for PSD phenotype
