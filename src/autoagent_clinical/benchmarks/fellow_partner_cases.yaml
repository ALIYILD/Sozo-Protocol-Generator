      relaxed_citation_check: true
    fixture_markdown: |
      # Partner operations brief

      ## Implementation
      Clinic workflow for device checkout, scheduling, and FNON communication templates.

      PMID: 60000002
    expectations:
      expect_pass: true

  - id: audience_mismatch_fellow_with_ops_only_v1
    category: fellow_partner
    title: Claimed fellow doc but only partner idioms
    inputs:
      audience: fellow
      relaxed_citation_check: true
    fixture_markdown: |
      # Misaligned audience fixture

      Billing throughput, operator scheduling, and FNON-only checklists for
      clinic throughput metrics (no trainee teaching objectives).

      PMID: 60000003
