    category: fellow_partner
    title: Fellow draft emphasizes mechanism / background
    inputs:
      audience: fellow
      relaxed_citation_check: true
    fixture_markdown: |
      # Fellow-oriented synopsis

      *Internal drafting only.*

      ## Pathophysiology and mechanism background
      Introductory summary of loop circuitry for learners; discusses what is known vs
      uncertain before any stimulation recipe.

      PMID: 60000001
