# Alembic configuration for Sozo Protocol Generator
#
# Connection string priority:
#   1. DATABASE_URL env var (production / CI)
#   2. Fallback below (local SQLite for dev)

[alembic]
script_location = alembic
prepend_sys_path = src
# SQLite fallback for local dev; overridden by env.py when DATABASE_URL is set.
sqlalchemy.url = sqlite+aiosqlite:///./sozo_dev.db

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
